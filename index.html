// ── PDF fetch with Signed URL (방안 B) + Retry (방안 A) ──
function _fetchWithTimeout(fetchFn, timeoutMs){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(), timeoutMs);
  return fetchFn(ctrl.signal).finally(()=>clearTimeout(timer));
}

async function _fetchPdfBytes(noticeId){
  const MAX_RETRIES=4;
  const RETRY_DELAYS=[2000,4000,6000]; // escalating: cold start needs time
  const URL_TIMEOUT=15000;  // 15s for signed URL API call
  const PDF_TIMEOUT=30000;  // 30s for PDF download
  const loadingSpan=document.querySelector('#pdfLoading span');

  for(let attempt=0; attempt<MAX_RETRIES; attempt++){
    const isLast=(attempt===MAX_RETRIES-1);
    try{
      // Always try Signed URL first (bypasses server as PDF relay)
      try{
        if(loadingSpan) loadingSpan.textContent=attempt>0
          ?`PDF 로딩 중... (재시도 ${attempt}/${MAX_RETRIES-1})`
          :'PDF 로딩 중...';
        const urlResp=await _fetchWithTimeout(
          sig=>authFetch(`${API}/api/notices/${noticeId}/pdf-url`,{signal:sig}),
          URL_TIMEOUT);
        if(urlResp.ok){
          const {url}=await urlResp.json();
          if(url){
            if(loadingSpan) loadingSpan.textContent='PDF 다운로드 중...';
            const pdfResp=await _fetchWithTimeout(
              sig=>fetch(url,{signal:sig}), PDF_TIMEOUT);
            if(pdfResp.ok) return await pdfResp.arrayBuffer();
          }
        }
      }catch(e){
        console.warn(`Signed URL attempt ${attempt+1} failed:`, e.message);
      }
      // Fallback: fetch PDF bytes through server (last resort)
      if(loadingSpan) loadingSpan.textContent='PDF 직접 로딩 중...';
      const resp=await _fetchWithTimeout(
        sig=>authFetch(`${API}/api/notices/${noticeId}/pdf`,{signal:sig}),
        PDF_TIMEOUT);
      if(resp.ok) return await resp.arrayBuffer();
      if(resp.status===404) throw new Error('PDF not found (404)');
    }catch(e){
      if(e.message.includes('404')) throw e;
      console.warn(`PDF fetch attempt ${attempt+1}/${MAX_RETRIES} failed:`, e.message);
    }
    // Retry delay with UI feedback
    if(!isLast){
      const delay=RETRY_DELAYS[attempt]||4000;
      if(loadingSpan) loadingSpan.textContent=`서버 응답 대기 중... (${Math.round(delay/1000)}초 후 재시도)`;
      await new Promise(r=>setTimeout(r, delay));
    }
  }
  throw new Error(`PDF 로드 실패 (${MAX_RETRIES}회 시도)`);
}

async function pdfRenderPage(pageNum){
  if(!_pdfNoticeId) return;
  const canvas = document.getElementById('pdfCanvas');
  const loading = document.getElementById('pdfLoading');

  // Show loading overlay, hide canvas content
  if(canvas) canvas.style.opacity='0';
  if(loading){
    loading.innerHTML='<div class="spin-s" style="width:24px;height:24px;border-width:2.5px"></div><span style="color:var(--t3);font-size:12px">PDF 렌더링 중...</span>';
    loading.style.display='flex';
  }

  try{
    await window._pdfjsReady;

    // Check LRU cache first (1차: 메모리)
    const cached=_pdfCacheGet(_pdfNoticeId);
    if(cached){
      _pdfDoc=cached;
      _pdfPageCount=_pdfDoc.numPages;
    } else {
      // 2차: IndexedDB (디스크 영구 캐시)
      let buf=await _idbGet(_pdfNoticeId);
      if(!buf){
        // 3차: 네트워크 (Signed URL + fallback)
        buf=await _fetchPdfBytes(_pdfNoticeId);
        _idbSet(_pdfNoticeId, buf); // fire-and-forget 저장
      }
      _pdfDoc = await pdfjsLib.getDocument({data: buf}).promise;
      _pdfDoc._noticeId = _pdfNoticeId;
      _pdfPageCount = _pdfDoc.numPages;
      // Store in memory cache
      _pdfCacheSet(_pdfNoticeId, _pdfDoc);
    }

    const page = await _pdfDoc.getPage(pageNum);
    if(!canvas) return;

    // Calculate scale: fit canvas to container width
    const container = canvas.parentElement;
    const containerWidth = container?.clientWidth || 600;
    const baseViewport = page.getViewport({scale: 1});
    const scale = (containerWidth / baseViewport.width) * (window.devicePixelRatio || 1);
    const viewport = page.getViewport({scale});

    canvas.width = viewport.width;
    canvas.height = viewport.height;
    canvas.style.width = '100%';
    canvas.style.height = 'auto';

    const ctx = canvas.getContext('2d');
    await page.render({canvasContext: ctx, viewport}).promise;

    // Render complete — reveal canvas, hide overlay
    if(loading) loading.style.display='none';
    canvas.style.opacity='1';
  }catch(e){
    console.error('PDF.js render error:', e);
    if(loading){
      const isTimeout=e.name==='AbortError'||e.message.includes('abort');
      const msg=isTimeout?'서버 응답 시간 초과':'PDF 로드 실패';
      loading.innerHTML=`<span style="color:var(--red);font-size:12px">${msg}</span>
        <button class="btn btn-sm btn-s" onclick="_pdfDoc=null;_pdfCache.delete('${_pdfNoticeId}');pdfRenderPage(${_pdfPage})" style="margin-top:8px;font-size:11px">↻ 다시 시도</button>`;
    }
  }
}

/* Drag toolbar to move the expanded window */
let _dragWin=null;
function initPdfDrag(){
  document.addEventListener('mousedown',e=>{
    if(!_pdfExpanded) return;
    const tb=e.target.closest('.pdf-toolbar');
    const wrap=document.getElementById('pdfWrap');
    if(!tb||!wrap||e.target.closest('button')||e.target.closest('input')) return;
    e.preventDefault();
    const rect=wrap.getBoundingClientRect();
    _dragWin={el:wrap, ox:e.clientX-rect.left, oy:e.clientY-rect.top};
  });
  document.addEventListener('mousemove',e=>{
    if(!_dragWin) return;
    _dragWin.el.style.left=(e.clientX-_dragWin.ox)+'px';
    _dragWin.el.style.top=(e.clientY-_dragWin.oy)+'px';
    _dragWin.el.style.right='auto';
  });
  document.addEventListener('mouseup',()=>{_dragWin=null;});
}
initPdfDrag();

/* Drag inside canvas-wrap to pan/scroll the PDF image */
let _panState=null;
function initPdfPan(){
  document.addEventListener('mousedown',e=>{
    if(!_pdfExpanded) return;
    const cw=e.target.closest('.pdf-canvas-wrap');
    if(!cw||e.target.closest('button')||e.target.closest('.pdf-toolbar')) return;
    e.preventDefault();
    _panState={el:cw, sx:cw.scrollLeft, sy:cw.scrollTop, mx:e.clientX, my:e.clientY};
  });
  document.addEventListener('mousemove',e=>{
    if(!_panState) return;
    _panState.el.scrollLeft=_panState.sx+(e.clientX-_panState.mx)*-1;
    _panState.el.scrollTop=_panState.sy+(e.clientY-_panState.my)*-1;
  });
  document.addEventListener('mouseup',()=>{_panState=null;});
}

function highlightPdfItem(itemIdx){
  const n=S.notices.find(x=>x.id===S.activeNoticeId);
  if(!n) return;
  const items=realItems(n.lineItems);
  const it=items[itemIdx];
  if(!it||!it._pdf_loc) return;
  if(it._pdf_loc.match_score<60) return;
  const loc=it._pdf_loc;

  // Don't auto-switch away from ILPA or Q&A — only activate if already on PDF
  if(S.rightPanel!=='pdf') return;

  _applyHL(loc);
}

function _applyHL(loc){
  const canvas=document.getElementById('pdfCanvas');
  const hl=document.getElementById('pdfHL');
  if(!canvas||!hl) return;

  if(loc.page!==_pdfPage){
    _pdfPage=loc.page;
    const loading=document.getElementById('pdfLoading');
    if(loading){loading.textContent='PDF 로딩 중...';loading.style.display='flex';}
    pdfRenderPage(_pdfPage).then(()=>setTimeout(()=>_positionHL(loc,hl),100));
    const nav=document.querySelector('.pdf-nav span');
    if(nav) nav.textContent=`${_pdfPage} / ${_pdfPageCount}`;
    return;
  }

  _positionHL(loc,hl);
}

function _positionHL(loc,hl){
  const rowLeft=Math.max(0, Math.min(loc.x_pct, 3));
  hl.style.left=rowLeft+'%';
  hl.style.top=Math.max(0, loc.y_pct - 0.3)+'%';
  hl.style.width=(97 - rowLeft)+'%';
  hl.style.height=Math.max(1.5, loc.h_pct + 1)+'%';
  hl.style.display='block';
  hl.classList.remove('active');
  void hl.offsetWidth;
  hl.classList.add('active');

  setTimeout(()=>{
    const wrap=document.getElementById('pdfCanvasWrap');
    if(wrap&&hl.offsetTop){wrap.scrollTop=hl.offsetTop-wrap.clientHeight/3;}
  },80);
}

function clearPdfHL(){
  const hl=document.getElementById('pdfHL');
  if(hl){hl.classList.remove('active');hl.style.display='none';}
}

async function sendQa(){
  const inp=document.getElementById('qaIn');
  if(!inp||!inp.value.trim()||S.qaLoading) return;
  const q=inp.value.trim();
  S.qaMessages.push({role:'user',text:q});
  S.qaLoading=true;
  inp.value='';R();
  setTimeout(()=>{const el=document.getElementById('qaMsgs');if(el)el.scrollTop=el.scrollHeight;},50);

  try{
    const resp=await authFetch(`${API}/api/qa`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({notice_id:S.activeNoticeId, messages:S.qaMessages.slice(0,-1), question:q})});
    if(!resp.ok) throw new Error(`서버 오류 ${resp.status}`);
    const data=await resp.json();
    S.qaMessages.push({role:'ai',text:data.answer});
  }catch(e){
    S.qaMessages.push({role:'ai',text:'⚠️ 오류: '+e.message});
  }
  S.qaLoading=false;R();
  setTimeout(()=>{const el=document.getElementById('qaMsgs');if(el)el.scrollTop=el.scrollHeight;},50);
}

function rDashboard(h,items){
  const ri=realItems(items);
  let totalCall=0,totalDist=0;
  ri.forEach(it=>{
    const a=pN(it.LP_signed_amount);if(a==null)return;
    if(it.Transaction_type==='call')totalCall+=a; else totalDist+=a;
  });
  // Commitment-affecting subtotals
  let caCallSum=0,caDistSum=0;
  ri.forEach(it=>{
    if(!it.Commitment_affecting) return;
    const a=pN(it.LP_signed_amount);if(a==null)return;
    if(it.Transaction_type==='call')caCallSum+=a; else caDistSum+=a;
  });
  const caSubTotal=rd(caCallSum+caDistSum);

  const netAmt=pN(h.LP_net_amount);
  const unfPrior=pN(h.Unfunded_prior);
  const unfAfter=pN(h.Unfunded_after);
  const commit=pN(h.Commitment_original);
  // Donut %: 1 - (Unfunded / Commitment) = called-up ratio
  const afterPct=commit&&unfAfter!=null?((1-unfAfter/commit)*100):null;
  const priorPct=commit&&unfPrior!=null?((1-unfPrior/commit)*100):null;
  const deltaPct=(afterPct!=null&&priorPct!=null)?rd(afterPct-priorPct):null;
  const afterPctStr=afterPct!=null?afterPct.toFixed(1):null;

  // Due date urgency
  const dueDate=h.due_date?new Date(h.due_date):null;
  const today=new Date();today.setHours(0,0,0,0);
  const daysLeft=dueDate?Math.ceil((dueDate-today)/(1000*60*60*24)):null;
  const dueDot=daysLeft!==null?(daysLeft<=0?'<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red)"></span>'
    :daysLeft<=7?'<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber)"></span>':''):'';
  const dueText=daysLeft!==null&&daysLeft>0?(daysLeft<=7?`<span style="color:var(--amber);font-weight:600">D-${daysLeft}</span>`:`D-${daysLeft}`):'';

  const heroClass=h.notice_type==='Call'?'c-call':h.notice_type==='Distribution'?'c-dist':'c-adj';
  const typeBadge=h.notice_type==='Call'?'tg-c':h.notice_type==='Distribution'?'tg-d':'tg-a';

  // Donut chart SVG
  const donutSvg=(()=>{
    if(afterPct==null||priorPct==null||!commit) return '';
    const R=52,SW=9,CX=65,CY=65;
    const C=2*Math.PI*R;
    const pPct=Math.max(0,Math.min(priorPct,100));
    const dPct=deltaPct||0;
    const absDelta=Math.abs(dPct);
    const isIncrease=dPct>=0;
    const deltaColor=isIncrease?'#7B9DB7':'#8ECBA0';
    const deltaTextColor=isIncrease?'var(--indigo)':'var(--emerald)';
    const deltaSign=isIncrease?'+':'';
    const priorArc=(pPct/100)*C;
    const deltaArc=(absDelta/100)*C;
    let seg1Len,seg2Len,seg2Offset;
    if(isIncrease){
      seg1Len=priorArc;
      seg2Len=deltaArc;
      seg2Offset=C-priorArc;
    } else {
      seg1Len=Math.max(0,priorArc-deltaArc);
      seg2Len=deltaArc;
      seg2Offset=C-seg1Len;
    }
    return`<svg viewBox="0 0 130 130" style="flex-shrink:0;width:130px;max-width:30%;height:auto">
      <circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="var(--bdr)" stroke-width="${SW}"/>
      <circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="var(--indigo)" stroke-width="${SW}" stroke-dasharray="${seg1Len} ${C-seg1Len}" stroke-dashoffset="${C/4}" stroke-linecap="round"/>
      ${absDelta>0.05?`<circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="${deltaColor}" stroke-width="${SW}" stroke-dasharray="${seg2Len} ${C-seg2Len}" stroke-dashoffset="${seg2Offset+C/4}" stroke-linecap="round"/>`:''}
      <text x="${CX}" y="${CY-6}" text-anchor="middle" dominant-baseline="central" style="font-family:var(--f);font-size:20px;font-weight:700;fill:var(--t1)">${afterPctStr}%</text>
      ${absDelta>0.05?`<text x="${CX}" y="${CY+16}" text-anchor="middle" dominant-baseline="central" style="font-family:var(--f);font-size:12px;font-weight:600;fill:${deltaTextColor}">${deltaSign}${absDelta.toFixed(1)}%</text>`:''}
    </svg>`;
  })();

  return`<div class="dash">
    <div class="dash-hero">
      <div class="hero-card ${heroClass}">
        <div style="display:flex;align-items:flex-start;gap:12px">
          <div style="flex:1">
            <div class="hero-label">Net Amount <span class="tg ${typeBadge}" style="border-radius:10px;padding:1px 7px;font-size:10px">${h.notice_type||'N/A'}</span></div>
            <div class="hero-val">${fA(netAmt)}</div>
            <div class="hero-meta">
              ${S.editMode
                ?`<span>Issue: <input type="date" value="${fmtDate(h.issue_date)||''}" onchange="editHeaderDate('issue_date',this.value)" style="font-size:11px;border:1px solid var(--bdr);border-radius:3px;padding:1px 4px;background:var(--bg0);color:var(--t1)"/></span>
                  <span>Due: <input type="date" value="${fmtDate(h.due_date)||''}" onchange="editHeaderDate('due_date',this.value)" style="font-size:11px;border:1px solid var(--bdr);border-radius:3px;padding:1px 4px;background:var(--bg0);color:var(--t1)"/></span>`
                :`${dueDot} Issue: ${fmtDate(h.issue_date)||'N/A'}<br/>Due: ${fmtDate(h.due_date)||'N/A'} ${dueText}`}
            </div>
          </div>
          ${donutSvg}
        </div>
      </div>
      <div class="sec-grid">
        <div class="sec-card">
          <div class="sc-label">Total Call</div>
          <div class="sc-val">${fA(totalCall)}</div>
        </div>
        <div class="sec-card">
          <div class="sc-label">Total Distribution</div>
          <div class="sc-val">${fA(totalDist)}</div>
        </div>
        <div class="sec-card">
          <div class="sc-label">Commitment</div>
          <div class="sc-val">${fA(commit)}</div>
        </div>
        <div class="sec-card">
          <div class="sc-label">Unfunded Prior</div>
          <div class="sc-val">${fA(unfPrior)}</div>
        </div>
        <div class="sec-card">
          <div class="sc-label">Sub Total (약정 영향)</div>
          <div class="sc-val">${fA(caSubTotal)}</div>
        </div>
        <div class="sec-card">
          <div class="sc-label">Unfunded After</div>
          <div class="sc-val">${fA(unfAfter)}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleEditMode(){
  if(_userRole==='viewer') return;
  S.editMode=!S.editMode;
  if(!S.editMode){
    // Save to backend when exiting edit mode
    const n=S.notices.find(x=>x.id===S.activeNoticeId);
    if(n){
      // Save line items
      authFetch(`${API}/api/notices/${n.id}/items`,{method:'PUT',headers:{'Content-Type':'application/json'},
        body:JSON.stringify(n.lineItems)}).catch(e=>console.warn('Save failed:',e));
      // Save header dates if modified during edit
      if(n._headerDirty){
        authFetch(`${API}/api/notices/${n.id}/header`,{method:'PUT',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({issue_date:n.header.issue_date, due_date:n.header.due_date})}).catch(e=>console.warn('Header save failed:',e));
        delete n._headerDirty;
      }
    }
  }
  R();
}

function editHeaderDate(field,value){
  const n=S.notices.find(x=>x.id===S.activeNoticeId);if(!n)return;
  n.header[field]=value||'N/A';
  n._headerDirty=true;
  n._statusCache=null;
}

function editItem(idx,field,value){
  const n=S.notices.find(x=>x.id===S.activeNoticeId);if(!n)return;
  n.lineItems[idx][field]=value;
  n._statusCache=null;
}

function editItemAmt(idx,value){
  const n=S.notices.find(x=>x.id===S.activeNoticeId);if(!n)return;
  const num=parseFloat(String(value).replace(/[,$()]/g,'').replace(/^\((.+)\)$/,'-$1'));
  if(!isNaN(num)){
    n.lineItems[idx].LP_signed_amount=num;
    n.lineItems[idx].LP_absolute_amount=Math.abs(num);
    n.lineItems[idx].Transaction_type=num>=0?'call':'distribution';
    n.lineItems[idx].LP_cashDirection=num>=0?'outflow':'inflow';
  }
  n._statusCache=null;
}

function rValid(h,items){
  const v1=cV1(h,items),v2=cV2(h,items);
  const anyFail=v1.s==='fail'||v2.s==='fail';
  const anySkip=v1.s==='skip'||v2.s==='skip';
  const allPass=v1.s==='pass'&&v2.s==='pass';
  return`<div class="sec"><div class="sh"><div class="st">검증</div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:11px">${!anyFail?(anySkip?'<span style="color:var(--t3)">— SKIP</span>':'<span style="color:var(--emerald)">PASS</span>'):'<span style="color:var(--red)">FAIL</span>'}</span>
      ${anyFail?`<button class="btn btn-sm" style="background:var(--amber-d);color:var(--amber);border:none" onclick="runAutoCorrection()">보정 제안</button>`:''}
    </div></div>
    <details${allPass?'':' open'}>
      <summary style="cursor:pointer;font-size:12px;color:var(--t2);padding:4px 0;user-select:none">V1: <b style="color:${v1.s==='pass'?'var(--emerald)':v1.s==='fail'?'var(--red)':'var(--t3)'}">${v1.s==='pass'?'PASS':v1.s==='fail'?'FAIL':'SKIP'}</b> · V2: <b style="color:${v2.s==='pass'?'var(--emerald)':v2.s==='fail'?'var(--red)':'var(--t3)'}">${v2.s==='pass'?'PASS':v2.s==='fail'?'FAIL':'SKIP'}</b></summary>

        <div class="vc ${v1.s}"><div class="vh"><div class="vt">V1 — Net Amount</div><div class="vs">${v1.s==='pass'?'PASS':v1.s==='fail'?'FAIL':'SKIP'}</div></div>
          <div class="vb" style="font-size:11px;color:var(--t3);margin-bottom:4px">Σ(Call) + Σ(Dist) = Net</div>
          <div class="vf"><div>Σ Call: <b>${fA(v1.sc)}</b></div><div>Σ Dist: <b>${fA(v1.sd)}</b></div><div style="border-top:1px solid var(--bdr);margin:4px 0"></div><div>합계: <b>${fA(v1.c)}</b></div><div>Net: <b>${fA(v1.e)}</b></div><div>차이: <b style="color:${v1.d===0?'var(--emerald)':'var(--red)'}">${fA(v1.d)}</b></div></div>
        </div>
        <div class="vc ${v2.s}"><div class="vh"><div class="vt">V2 — Unfunded</div><div class="vs">${v2.s==='pass'?'PASS':v2.s==='fail'?'FAIL':'SKIP'}</div></div>
          <div class="vb" style="font-size:11px;color:var(--t3);margin-bottom:4px">Prior − Σ(Commit) = After</div>
          <div class="vf"><div>Prior: <b>${fA(v2.uP)}</b></div><div>Σ Commit: <b>${fA(v2.sca)}</b></div><div style="border-top:1px solid var(--bdr);margin:4px 0"></div><div>계산: <b>${fA(v2.c)}</b></div><div>After: <b>${fA(v2.e)}</b></div><div>차이: <b style="color:${v2.d===0?'var(--emerald)':'var(--red)'}">${fA(v2.d)}</b></div></div>

      </div>
    </details>

}

/* ===== EXPOSURE TAB: Asset-level Call/Dist matrix across Fund+LP notices ===== */
function rExposure(n){
  const h=n.header;
  const fundKey=getFundKey(h);
  const lpCode=h.LP_code||'';
  const lpFull=h.LP_Name_full||'';

  // Collect all notices for same Fund + LP
  const allFundLp=S.notices.filter(x=>{
    if(getFundKey(x.header)!==fundKey) return false;
    if(lpCode) return (x.header.LP_code||'')===lpCode;
    return (x.header.LP_Name_full||'')===lpFull;
  }).sort((a,b)=>{
    const da=fmtDate(a.header.issue_date||a.header.due_date||'');
    const db=fmtDate(b.header.issue_date||b.header.due_date||'');
    return da.localeCompare(db);
  });

  if(!allFundLp.length) return`<div style="text-align:center;padding:40px;color:var(--t3)">데이터 없음</div>`;

  // Collect all raw items first
  const rawItems=[]; // [{raw, amt, ni}]
  const nLen=allFundLp.length;
  allFundLp.forEach((notice,ni)=>{
    if(notice.is_voided) return;
    realItems(notice.lineItems||[]).forEach(it=>{
      const raw=it.item_name||'';
      if(!raw) return;
      const amt=pN(it.LP_signed_amount);
      rawItems.push({raw, amt:amt||0, ni});
    });
  });

  // Determine grouping: user overrides > AI groups > regex fallback
  const aiGroups=S._assetGroups[fundKey]||null;
  const overrides=S._assetGroupOverrides[fundKey]||{};
  const aiReverse={}; // rawName → canonical (from AI)
  if(aiGroups){
    Object.entries(aiGroups).forEach(([canonical, members])=>{
      (members||[]).forEach(m=>{ aiReverse[m]=canonical; });
    });
  }

  function getCanonical(rawName){
    if(overrides[rawName]) return overrides[rawName];
    if(aiReverse[rawName]) return aiReverse[rawName];
    return normalizeAssetName(rawName)||rawName;
  }

  // Build investMap and rawNamesMap
  const investMap={};   // canonicalName → [amount per notice index]
  const rawNamesMap={}; // canonicalName → Set<original item_name>

  rawItems.forEach(({raw, amt, ni})=>{
    const key=getCanonical(raw);
    if(!investMap[key]){ investMap[key]=new Array(nLen).fill(0); rawNamesMap[key]=new Set(); }
    investMap[key][ni]+=amt;
    rawNamesMap[key].add(raw);
  });

  const assetKeys=Object.keys(investMap).sort((a,b)=>a.localeCompare(b,undefined,{sensitivity:'base'}));
  if(!assetKeys.length) return`<div style="text-align:center;padding:40px;color:var(--t3)">Line item이 없습니다.</div>`;

  // Summary totals (non-voided only)
  let totalCall=0, totalDist=0;
  assetKeys.forEach(k=>{
    investMap[k].forEach((v,ni)=>{
      if(allFundLp[ni].is_voided) return;
      if(v>0) totalCall+=v; else totalDist+=v;
    });
  });

  function fAE(v){
    if(v==null||Math.abs(v)<0.005) return`<span style="color:var(--t3)">—</span>`;
    const abs=Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    if(v>0) return`<span style="color:var(--indigo)">${abs}</span>`;
    return`<span style="color:var(--indigo)">(${abs})</span>`;
  }

  const lpDisp=S.nameReg.lp[lpFull]||h.LP_Name_short||lpCode||'N/A';
  const fundDisp=S.nameReg.fund[h.Underlying_Fund_Name_full]||h.Underlying_Fund_Name_short||'Fund';
  const activeCount=allFundLp.filter(x=>!x.is_voided).length;

  // Collect all unique raw names for AI grouping button
  const allRawNames=[...new Set(rawItems.map(r=>r.raw))];

  // AI button state
  const isLoading=S._aeLoading===fundKey;
  const hasAiGroups=!!aiGroups;
  const aiBtn=isLoading
    ?`<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--amber)"><div class="spin-s" style="width:14px;height:14px;border-width:2px"></div>AI 그룹화 중...</div>`
    :`<div style="display:flex;align-items:center;gap:6px">
        ${hasAiGroups?`<span style="font-size:10px;color:var(--teal);background:var(--teal-d);padding:1px 6px;border-radius:3px">AI 그룹 적용 중</span>`:''}
        ${_userRole!=='viewer'?`<button class="btn btn-sm btn-s${hasAiGroups?'':' ae-glow-btn'}" style="font-size:11px;padding:3px 10px;position:relative" onclick="runAssetGroupAI('${escH(fundKey)}')">자산명 AI 그룹화 <span style="font-size:12px">↻</span></button>
        ${hasAiGroups?'<button class="btn btn-sm btn-s" style="font-size:10px;padding:2px 8px;color:var(--t3)" onclick="clearAssetGroups(\''+escH(fundKey)+'\')">초기화</button>':''}`:''}
      </div>`;


  // Matrix table
  const colHeaders=allFundLp.map((notice,ni)=>{
    const d=fmtDate(notice.header.issue_date||notice.header.due_date||'');
    const shortD=d&&d!=='N/A'?d:'?';
    const tp=notice.header.notice_type;
    const isVoid=notice.is_voided;
    const isCur=notice.id===n.id;
    return`<th style="font-size:9px;white-space:nowrap;padding:6px 4px;min-width:78px;text-align:right;${isVoid?'opacity:.35;':''}${isCur?'background:rgba(45,127,249,.06);':''}">${isVoid?'<span style="font-size:8px;color:var(--t3);display:block">VOID</span>':''}${shortD}<br><span style="font-size:9px;color:${tp==='Call'?'var(--indigo)':tp==='Distribution'?'var(--teal)':'var(--t3)'}">${tp==='Call'?'Call':'Dist.'}</span></th>`;
  }).join('');

  const rows=assetKeys.map(key=>{
    const raw=rawNamesMap[key];
    const merged=raw.size>1;
    const tooltip=merged?[...raw].join('\\n'):'';
    const badge=merged?`<span onclick="aeScrollToGroup('${escH(key).replace(/'/g,"\\'")}')" style="font-size:9px;color:var(--teal);background:var(--teal-d);padding:0 4px;border-radius:3px;margin-left:4px;cursor:pointer" title="${escH(tooltip)}">${raw.size}</span>`:'';

    const cells=investMap[key].map((v,ni)=>{
      const isVoid=allFundLp[ni].is_voided;
      const isCur=allFundLp[ni].id===n.id;
      return`<td class="amt" style="font-size:11px;padding:4px 6px;${isVoid?'opacity:.35;':''}${isCur?'background:rgba(45,127,249,.04);':''}">${fAE(v)}</td>`;
    }).join('');

    let net=0;
    investMap[key].forEach((v,ni)=>{ if(!allFundLp[ni].is_voided) net+=v; });
    const netCell=`<td class="amt" style="font-size:11px;font-weight:700;padding:4px 8px;background:var(--bg4)">${fAE(net)}</td>`;

    return`<tr style="border-bottom:1px solid var(--bdr)">

      ${cells}${netCell}
    </tr>`;
  }).join('');

  const footCells=allFundLp.map((notice,ni)=>{
    let colTotal=0;
    assetKeys.forEach(k=>{ if(!notice.is_voided) colTotal+=investMap[k][ni]; });
    const isVoid=notice.is_voided;
    const isCur=notice.id===n.id;
    return`<td class="amt" style="font-size:11px;font-weight:600;padding:4px 6px;${isVoid?'opacity:.35;':''}${isCur?'background:rgba(45,127,249,.04);':''}">${fAE(isVoid?0:colTotal)}</td>`;
  }).join('');
  const grandNet=totalCall+totalDist;
  const footNet=`<td class="amt" style="font-size:11px;font-weight:700;padding:4px 8px;background:var(--bg4)">${fAE(grandNet)}</td>`;

  return`<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div>
        <div style="font-size:14px;font-weight:700">Asset Exposure Matrix</div>
        <div style="font-size:11px;color:var(--t3);margin-top:2px">${escH(fundDisp)} · LP: ${escH(lpDisp)}${lpCode?' · '+lpCode:''}</div>
      </div>
      ${aiBtn}
    </div>
    <div class="tw" style="overflow-x:auto">
      <table class="it" style="min-width:100%">
        <thead><tr style="position:sticky;top:0;z-index:2;background:var(--bg1)">
          <th style="font-size:11px;padding:6px 8px;text-align:left;position:sticky;left:0;background:var(--bg1);z-index:3;min-width:160px">Asset</th>
          ${colHeaders}
          <th style="font-size:11px;padding:6px 8px;text-align:right;background:var(--bg4);min-width:80px">Net</th>
        </tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr style="border-top:2px solid var(--bdr);background:var(--bg3)">
          <td style="font-size:11px;font-weight:700;padding:6px 8px;position:sticky;left:0;background:var(--bg3);z-index:1">Total</td>
          ${footCells}${footNet}
        </tr></tfoot>
      </table>
    </div>
    ${rHierarchyPanel(fundKey, rawNamesMap)}
  </div>`;
}

/* ===== HIERARCHY PANEL: Drag-drop group editing ===== */
function rHierarchyPanel(fundKey, rawNamesMap){
  const hasGroups=Object.keys(rawNamesMap).some(k=>rawNamesMap[k].size>1) || S._assetGroups[fundKey];
  const isOpen=S._aePanel;

  // Build effective groups: { canonical: Set<raw> }
  const groups={};
  Object.entries(rawNamesMap).forEach(([canonical, rawSet])=>{
    if(!groups[canonical]) groups[canonical]=new Set();
    rawSet.forEach(r=>groups[canonical].add(r));
  });

  const sortedKeys=Object.keys(groups).sort((a,b)=>a.localeCompare(b,undefined,{sensitivity:'base'}));
  const overrideTargets=new Set(Object.values(S._assetGroupOverrides[fundKey]||{}));
  const namedGroups=sortedKeys.filter(k=>{
    if(groups[k].size>1) return true;
    if(overrideTargets.has(k)) return true;
    if(groups[k].size===1){ const sole=[...groups[k]][0]; return sole!==k; }
    return false;
  });
  const singleGroups=sortedKeys.filter(k=>!namedGroups.includes(k));

  return`<div style="margin-top:14px;border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden">
    <div onclick="S._aePanel=!S._aePanel;R()" style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg3);cursor:pointer;user-select:none">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:10px;color:var(--t3);transition:transform .2s;display:inline-block;${isOpen?'transform:rotate(90deg)':''}">▶</span>
        <span style="font-size:12px;font-weight:600;color:var(--t1)">Asset Grouping</span>
        <span style="font-size:10px;color:var(--t3)">${sortedKeys.length} groups · ${namedGroups.length} merged</span>
      </div>
      <span style="font-size:10px;color:var(--t3)">${isOpen?'접기':'펼치기'}</span>
    </div>
    ${isOpen?`<div id="aePanel" style="padding:10px;max-height:420px;overflow-y:auto;background:var(--bg1);position:relative">
      ${namedGroups.length?`<div style="margin-bottom:10px">
        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px;flex-wrap:wrap">
          <span style="font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em">Groups (${namedGroups.length})</span>
          <span style="font-size:10px;color:var(--t3);opacity:.7">개별 자산 항목을 다른 그룹으로 드래그하면 새로운 그룹으로 이동합니다</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px">
          ${namedGroups.map((canonical,gi)=>{
            const members=[...groups[canonical]];
            return _aeGroupCard(fundKey, canonical, members, gi);
          }).join('')}
        </div>
      </div>`:''}
      ${singleGroups.length?`<div style="margin-bottom:10px;position:relative">
        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px;flex-wrap:wrap">
          <span style="font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em">그룹 미지정 (${singleGroups.length})</span>
          <span style="font-size:10px;color:var(--indigo);opacity:.7">그룹 미지정 항목을 아래의 + New Group으로 드래그하면 새로운 그룹이 생성됩니다</span>
        </div>
        <div id="aeStandaloneArea" style="border:1px dashed var(--bdr);border-radius:var(--r);padding:6px;display:flex;flex-wrap:wrap;gap:3px"
          ondragover="event.preventDefault();this.style.borderColor='var(--blue)';this.style.background='rgba(45,127,249,.04)'"
          ondragleave="this.style.borderColor='var(--bdr)';this.style.background=''"
          ondrop="this.style.borderColor='var(--bdr)';this.style.background='';aeDropToStandalone(event,'${escH(fundKey)}')">
          ${singleGroups.map((canonical,si)=>{
            const raw=[...groups[canonical]][0];
            return`<span ${si===0?'id="aeFirstChip" ':''} draggable="true" ondragstart="aeDragStart(event,'${escH(raw)}','${escH(canonical)}')" style="font-size:10px;padding:2px 6px;border-radius:3px;background:var(--bg4);color:var(--t2);cursor:grab;white-space:nowrap;transition:all .12s" onmouseover="this.style.background='var(--blue-d)';this.style.color='var(--blue)'" onmouseout="this.style.background='var(--bg4)';this.style.color='var(--t2)'" title="${escH(raw)}">${escH(canonical)}</span>`;
          }).join('')}
        </div>
      </div>`:''}
      <div id="aeNewGroupArea" style="border:2px dashed var(--bdr);border-radius:var(--r);padding:8px;text-align:center;color:var(--t3);font-size:10px;transition:all .12s"
        ondragover="event.preventDefault();this.style.borderColor='var(--blue)';this.style.background='rgba(45,127,249,.04)';this.style.color='var(--blue)'"
        ondragleave="this.style.borderColor='var(--bdr)';this.style.background='';this.style.color='var(--t3)'"
        ondrop="this.style.borderColor='var(--bdr)';this.style.background='';this.style.color='var(--t3)';aeDropNewGroup(event,'${escH(fundKey)}')">+ New Group</div>
      ${singleGroups.length?`<div id="aeDemoCursor" style="position:absolute;pointer-events:none;z-index:10;opacity:0;font-size:20px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3));transition:opacity .3s">🖱️</div>`
      :namedGroups.length>=2?`<div id="aeDemoCursor" style="position:absolute;pointer-events:none;z-index:10;opacity:0;font-size:20px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3));transition:opacity .3s">🖱️</div>`:''}
    </div>`:''}
  </div>`;
}

function _aeGroupCard(fundKey, canonical, members, gi){
  const fk=escH(fundKey);
  const cn=escH(canonical);
  const cardId=`ae-card-${cn.replace(/[^a-zA-Z0-9]/g,'_')}`;
  return`<div id="${cardId}" ${gi===1?'data-ae-grp2="1" ':''} style="border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg2);transition:border-color .3s;overflow:hidden"
    ondragover="event.preventDefault();this.style.borderColor='var(--blue)'"
    ondragleave="this.style.borderColor='var(--bdr)'"
    ondrop="this.style.borderColor='var(--bdr)';aeDropToGroup(event,'${fk}','${cn}')">
    <div style="display:flex;align-items:center;gap:4px;padding:4px 8px;background:var(--bg3);border-bottom:1px solid var(--bdr)">
      <span id="ae-cn-${cn.replace(/[^a-zA-Z0-9]/g,'_')}" onclick="aeStartRename(this,'${fk}','${cn}')" style="font-size:10px;font-weight:600;color:var(--t1);cursor:pointer;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="클릭하여 이름 변경: ${cn}">${cn}</span>
      <span style="font-size:9px;color:var(--t3);background:var(--bg0);padding:0 4px;border-radius:6px;flex-shrink:0">${members.length}</span>
    </div>
    <div style="padding:4px 6px;display:flex;flex-wrap:wrap;gap:2px;max-height:80px;overflow-y:auto">
      ${members.map((raw,ri)=>{
        const isCanonical=(raw===canonical);
        const bg=isCanonical?'var(--indigo-d)':'var(--bg4)';
        const col=isCanonical?'var(--indigo)':'var(--t2)';
        const fw=isCanonical?'600':'400';
        const chipId=(gi===0&&ri===0)?'id="aeGrpChip0" ':'';
        return`<span ${chipId}draggable="true" ondragstart="aeDragStart(event,'${escH(raw)}','${cn}')" style="font-size:9px;padding:1px 5px;border-radius:3px;background:${bg};color:${col};font-weight:${fw};cursor:grab;white-space:nowrap;transition:all .12s;max-width:200px;overflow:hidden;text-overflow:ellipsis;line-height:1.5" onmouseover="this.style.background='var(--blue-d)';this.style.color='var(--blue)'" onmouseout="this.style.background='${bg}';this.style.color='${col}'" title="${escH(raw)}">${escH(raw)}</span>`;
      }).join('')}
    </div>
  </div>`;
}

/* ===== HIERARCHY PANEL: Drag-Drop Handlers ===== */
let _aeDragScrollTimer=null;
function aeDragStart(e, rawName, fromGroup){
  e.dataTransfer.setData('text/plain', JSON.stringify({raw:rawName, from:fromGroup}));
  e.dataTransfer.effectAllowed='move';
  // Enable auto-scroll on the panel during drag
  const panel=document.getElementById('aePanel');
  if(panel){
    const _onDragOver=(ev)=>{
      const rect=panel.getBoundingClientRect();
      const y=ev.clientY;
      const edge=30; // px from edge to trigger scroll
      if(y<rect.top+edge) panel.scrollTop-=6;
      else if(y>rect.bottom-edge) panel.scrollTop+=6;
    };
    panel.addEventListener('dragover',_onDragOver);
    const _cleanup=()=>{panel.removeEventListener('dragover',_onDragOver);document.removeEventListener('dragend',_cleanup);};
    document.addEventListener('dragend',_cleanup);
  }
}

function aeDropToGroup(e, fundKey, targetCanonical){
  e.preventDefault();
  e.stopPropagation();
  let data;
  try{ data=JSON.parse(e.dataTransfer.getData('text/plain')); }catch(err){ return; }
  const {raw, from}=data;
  if(!raw || from===targetCanonical) return;

  // Set override: this raw name now maps to targetCanonical
  if(!S._assetGroupOverrides[fundKey]) S._assetGroupOverrides[fundKey]={};
  S._assetGroupOverrides[fundKey][raw]=targetCanonical;
  _aeSaveOverrides(fundKey);
  R();
}

function aeDropToStandalone(e, fundKey){
  e.preventDefault();
  e.stopPropagation();
  let data;
  try{ data=JSON.parse(e.dataTransfer.getData('text/plain')); }catch(err){ return; }
  const {raw, from}=data;
  if(!raw) return;

  // Override: map this raw to itself (standalone)
  if(!S._assetGroupOverrides[fundKey]) S._assetGroupOverrides[fundKey]={};
  S._assetGroupOverrides[fundKey][raw]=raw;
  _aeSaveOverrides(fundKey);
  R();
}

function aeDropNewGroup(e, fundKey){
  e.preventDefault();
  e.stopPropagation();
  let data;
  try{ data=JSON.parse(e.dataTransfer.getData('text/plain')); }catch(err){ return; }
  const {raw}=data;
  if(!raw) return;

  // Ask for new group name
  const newName=prompt('새 그룹 이름:', normalizeAssetName(raw)||raw);
  if(!newName) return;

  // Override: map this raw to the new name
  if(!S._assetGroupOverrides[fundKey]) S._assetGroupOverrides[fundKey]={};
  S._assetGroupOverrides[fundKey][raw]=newName;
  _aeSaveOverrides(fundKey);
  R();
}

/* ===== COMMITMENT TAB: Timeline of commitment utilization across Fund+LP notices ===== */
function rCommitment(n){
  const h=n.header;
  const fundKey=getFundKey(h);
  const lpCode=h.LP_code||'';
  const lpFull=h.LP_Name_full||'';

  // Same Fund+LP notices sorted by date
  const allNotices=S.notices.filter(x=>{
    if(getFundKey(x.header)!==fundKey) return false;
    if(lpCode) return (x.header.LP_code||'')===lpCode;
    return (x.header.LP_Name_full||'')===lpFull;
  }).sort((a,b)=>(fmtDate(a.header.issue_date||'')).localeCompare(fmtDate(b.header.issue_date||'')));

  const rows=allNotices.filter(x=>!x.is_voided).map((notice,i)=>{
    const hh=notice.header;
    const commit=pN(hh.Commitment_original);
    const unfPrior=pN(hh.Unfunded_prior);
    const unfAfter=pN(hh.Unfunded_after);
    const funded=(commit!=null&&unfAfter!=null)?commit-unfAfter:null;
    const pct=(commit&&unfAfter!=null)?(1-unfAfter/commit)*100:null;
    let caAmount=0;
    realItems(notice.lineItems||[]).forEach(it=>{
      if(it.Commitment_affecting){const a=pN(it.LP_signed_amount);if(a!=null)caAmount+=a;}
    });
    return{notice,idx:i+1,commit,unfPrior,unfAfter,funded,pct,caAmount:rd(caAmount),
      date:fmtDate(hh.issue_date||''),type:hh.notice_type,isCurrent:notice.id===n.id};
  });

  // Compute deltas
  rows.forEach((r,i)=>{
    r.deltaPct=(i>0&&r.pct!=null&&rows[i-1].pct!=null)?rd(r.pct-rows[i-1].pct):(i===0&&r.pct!=null?rd(r.pct):null);
  });

  if(!rows.length) return`<div style="text-align:center;padding:40px;color:var(--t3)">유효한 Notice가 없습니다.</div>`;

  const latestCommit=rows.reduce((v,r)=>r.commit||v,null);
  const latest=rows[rows.length-1];
  const latestUnf=latest.unfAfter;
  const latestFunded=(latestCommit!=null&&latestUnf!=null)?latestCommit-latestUnf:null;
  const latestPct=(latestCommit&&latestUnf!=null)?(1-latestUnf/latestCommit)*100:null;

  // Period info
  const dates=rows.map(r=>r.date).filter(d=>d&&d!=='N/A');
  const firstDate=dates.length?dates[0]:'';
  const lastDate=dates.length?dates[dates.length-1]:'';
  let periodStr='';
  if(firstDate&&lastDate){
    const d1=new Date(firstDate),d2=new Date(lastDate);
    const months=Math.round((d2-d1)/(1000*60*60*24*30));
    periodStr=`${firstDate.substring(0,7)} → ${lastDate.substring(0,7)}${months>=12?' (약 '+Math.round(months/12)+'년)':months>0?' (약 '+months+'개월)':''}`;
  }
  const currency=h.Currency&&h.Currency!=='N/A'?h.Currency:'USD';

  // ── SECTION A: Summary Cards ──
  const secA=`<div class="sec" style="margin-bottom:16px">
    <div style="font-size:12px;color:var(--t2);margin-bottom:10px;line-height:1.7">
      <div style="font-weight:600;color:var(--t1)">${escH(h.Underlying_Fund_Name_full||h.Underlying_Fund_Name_short||'')}</div>
      <div>LP: ${escH(h.LP_Name_full||h.LP_Name_short||'N/A')}${h.LP_code&&h.LP_code!=='N/A'?' · '+escH(h.LP_code):''} · ${escH(currency)}</div>
      ${periodStr?`<div style="color:var(--t3)">${periodStr}, ${rows.length}건</div>`:''}
    </div>
    <div class="sec-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="sec-card"><div class="sc-label">Commitment</div><div class="sc-val">${fA(latestCommit)}</div></div>
      <div class="sec-card"><div class="sc-label">Funded</div><div class="sc-val">${fA(latestFunded)}</div></div>
      <div class="sec-card"><div class="sc-label">Unfunded</div><div class="sc-val">${fA(latestUnf)}</div></div>
      <div class="sec-card"><div class="sc-label">소진율</div><div class="sc-val">${latestPct!=null?latestPct.toFixed(1)+'%':'N/A'}</div></div>
    </div>
  </div>`;

  // ── SECTION B: Progress Bar + Tick Marks + Chevron Timeline ──
  const barPct=latestPct!=null?Math.min(Math.max(latestPct,0),100):0;

  // Tick marks
  let ticksHtml='';
  rows.forEach((r,i)=>{
    if(r.pct==null) return;
    const left=Math.min(Math.max(r.pct,0),100);
    const col=r.isCurrent?'var(--blue)':r.type==='Call'?'var(--indigo)':r.type==='Distribution'?'var(--emerald)':'var(--amber)';
    const sz=r.isCurrent?'8px':'6px';
    const tipType=r.type==='Call'?'Call':r.type==='Distribution'?'Dist':'Adj';
    const tipAmt=r.caAmount!=null?fA(Math.abs(r.caAmount)):'';
    ticksHtml+=`<div style="position:absolute;left:${left}%;transform:translateX(-50%);text-align:center;cursor:default" title="${tipType} #${r.idx}: ${r.caAmount>=0?'+':''}${tipAmt} (${r.date})">
      <div style="width:0;height:0;border-left:${sz} solid transparent;border-right:${sz} solid transparent;border-top:${sz} solid ${col};margin:0 auto"></div>
    </div>`;
  });

  // Chevron timeline
  const maxDelta=Math.max(...rows.map(r=>Math.abs(r.caAmount||0)),1);
  let chevHtml='';
  rows.forEach((r,i)=>{
    const w=Math.round(72+(Math.abs(r.caAmount||0)/maxDelta)*88);
    const cls=r.type==='Call'?'cmit-call':r.type==='Distribution'?'cmit-dist':'cmit-adj';
    const arrow=r.type==='Distribution'?'◄':'►';
    const dCol=r.deltaPct!=null?(r.deltaPct>=0?'color:var(--indigo)':'color:var(--emerald)'):'color:var(--t3)';
    const dSign=r.deltaPct!=null&&r.deltaPct>=0?'+':'';
    const dText=r.deltaPct!=null?`${dSign}${r.deltaPct.toFixed(1)}%`:'—';
    const typeBadge=r.type==='Call'?'tg-c':r.type==='Distribution'?'tg-d':'tg-a';
    if(i>0) chevHtml+=`<div class="cmit-conn">──▶</div>`;
    chevHtml+=`<div class="cmit-chev ${cls} ${r.isCurrent?'cmit-cur':''}" style="width:${w}px" onclick="viewNotice('${r.notice.id}')" id="cmit-chev-${i}">
      <div class="cmit-arrow">${arrow}</div>
      <div class="cmit-amt">${fA(Math.abs(r.caAmount||0))}</div>
      <div class="cmit-delta" style="${dCol}">${dText}</div>
      <div style="margin:2px 0"><span class="tg ${typeBadge}" style="font-size:9px;padding:1px 5px;border-radius:6px">${r.type==='Call'?'Call':r.type==='Distribution'?'Dist':'Adj'}</span></div>
      <div class="cmit-date">${r.date?r.date.substring(2):''}</div>
    </div>`;
  });

  // Find current index for scrollIntoView
  const curIdx=rows.findIndex(r=>r.isCurrent);

  const secB=`<div class="sec" style="margin-bottom:16px">
    <div class="sh"><div class="st">소진 흐름</div></div>
    <div style="position:relative;margin-bottom:16px">
      <div style="position:relative;height:14px;margin-bottom:2px">${ticksHtml}</div>
      <div style="height:28px;background:var(--bg4);border-radius:6px;overflow:hidden;position:relative">
        <div style="width:${barPct}%;height:100%;background:var(--indigo);border-radius:${barPct>=100?'6px':'6px 0 0 6px'};transition:width .3s"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:11px">
        <span style="color:var(--indigo);font-weight:600">Funded: ${fA(latestFunded)} (${barPct.toFixed(1)}%)</span>
        <span style="color:var(--t3)">Unfunded: ${fA(latestUnf)} (${latestPct!=null?(100-latestPct).toFixed(1)+'%':''})</span>
      </div>
    </div>
    <div id="cmitTimeline" style="overflow-x:auto;padding:8px 0">
      <div style="display:flex;align-items:center;min-width:fit-content;gap:0">
        ${chevHtml}
      </div>
    </div>
  </div>`;

  // scrollIntoView for current notice chevron
  if(curIdx>=0) setTimeout(()=>{const el=document.getElementById('cmit-chev-'+curIdx);if(el)el.scrollIntoView({inline:'center',behavior:'smooth',block:'nearest'});},100);

  // ── SECTION C: Detail Table ──
  let tRows='';
  rows.forEach((r,i)=>{
    const isCur=r.isCurrent;
    const trStyle=isCur?'background:rgba(29,53,87,.04);border-left:3px solid var(--indigo)':'border-left:3px solid transparent';
    const typeBadge=r.type==='Call'?'tg-c':r.type==='Distribution'?'tg-d':'tg-a';
    const dCol=r.deltaPct!=null?(r.deltaPct>=0?'var(--indigo)':'var(--emerald)'):'var(--t3)';
    const dSign=r.deltaPct!=null&&r.deltaPct>=0?'+':'';
    const dText=r.deltaPct!=null?`${dSign}${r.deltaPct.toFixed(1)}%`:'—';
    tRows+=`<tr style="${trStyle};cursor:pointer" onclick="viewNotice('${r.notice.id}')">
      <td style="padding:6px 8px;font-size:11px;color:var(--t2)">${isCur?'▶ ':' '}${r.idx}</td>
      <td style="padding:6px 8px;font-size:11px">${r.date||'N/A'}</td>
      <td style="padding:6px 8px"><span class="tg ${typeBadge}" style="font-size:10px;padding:1px 6px;border-radius:6px">${r.type==='Call'?'Call':r.type==='Distribution'?'Dist':'Adj'}</span></td>
      <td style="padding:6px 8px;text-align:right;font-size:12px">${fA(r.unfPrior)}</td>
      <td style="padding:6px 8px;text-align:right;font-size:12px">${fA(r.caAmount,true)}</td>
      <td style="padding:6px 8px;text-align:right;font-size:12px">${fA(r.unfAfter)}</td>
      <td style="padding:6px 8px;text-align:right;font-size:12px">${fA(r.funded)}</td>
      <td style="padding:6px 8px;text-align:right;font-size:12px;font-weight:600">${r.pct!=null?r.pct.toFixed(1)+'%':'—'}</td>
      <td style="padding:6px 8px;text-align:right;font-size:11px;font-weight:600;color:${dCol}">${dText}</td>
    </tr>`;
  });

  const secC=`<div class="sec" style="margin-bottom:16px">
    <div class="sh"><div class="st">Notice별 상세</div></div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:700px">
        <thead><tr style="border-bottom:2px solid var(--bdr)">
          <th style="padding:6px 8px;text-align:left;color:var(--t3);font-size:10px;font-weight:600">#</th>
          <th style="padding:6px 8px;text-align:left;color:var(--t3);font-size:10px;font-weight:600">Date</th>
          <th style="padding:6px 8px;text-align:left;color:var(--t3);font-size:10px;font-weight:600">Type</th>
          <th style="padding:6px 8px;text-align:right;color:var(--t3);font-size:10px;font-weight:600">Unfunded Prior</th>
          <th style="padding:6px 8px;text-align:right;color:var(--t3);font-size:10px;font-weight:600">약정 영향</th>
          <th style="padding:6px 8px;text-align:right;color:var(--t3);font-size:10px;font-weight:600">Unfunded After</th>
          <th style="padding:6px 8px;text-align:right;color:var(--t3);font-size:10px;font-weight:600">Funded After</th>
          <th style="padding:6px 8px;text-align:right;color:var(--t3);font-size:10px;font-weight:600">소진율</th>
          <th style="padding:6px 8px;text-align:right;color:var(--t3);font-size:10px;font-weight:600">Δ</th>
        </tr></thead>
        <tbody>${tRows}</tbody>
      </table>
    </div>
  </div>`;

  // ── SECTION D: Insights ──
  let insights=[];

  // D-C1: Commitment 변경 감지
  const commitVals=[...new Set(rows.map(r=>r.commit).filter(v=>v!=null))];
  if(commitVals.length>1){
    let changes=[];
    for(let i=1;i<rows.length;i++){
      if(rows[i].commit!=null&&rows[i-1].commit!=null&&rows[i].commit!==rows[i-1].commit){
        changes.push(`Notice #${rows[i-1].idx} (${fA(rows[i-1].commit)}) → #${rows[i].idx} (${fA(rows[i].commit)})`);
      }
    }
    if(changes.length){
      insights.push(`<div class="al warn"><span class="ai">⚠️</span><div><strong>Commitment 변경 감지</strong><br>${changes.join('<br>')}
        <br><span style="color:var(--t3)">Subsequent Close 등에 의한 약정 변경 여부를 확인하세요.</span></div></div>`);
    }
  }

  // D-C2: Unfunded 연속성 확인
  if(rows.length>=2){
    const mismatches=[];
    for(let i=1;i<rows.length;i++){
      const prevAfter=rows[i-1].unfAfter;
      const curPrior=rows[i].unfPrior;
      if(prevAfter!=null&&curPrior!=null&&Math.abs(prevAfter-curPrior)>0.01){
        mismatches.push({from:rows[i-1].idx,to:rows[i].idx,prevAfter,curPrior});
      }
    }
    if(!mismatches.length){
      insights.push(`<div style="padding:10px 14px;border-radius:var(--r);background:rgba(78,154,109,.06);font-size:12px;margin-bottom:12px;line-height:1.7">
        <span style="color:var(--emerald);font-weight:600">✓</span>
        <span style="color:var(--t2)"> Notice 간 약정소진액 현황이 모두 연결되고 있습니다.</span>
        <span style="color:var(--t3);font-size:11px"> (${rows.length}건 중 ${rows.length-1}개 구간 확인)</span>
      </div>`);
    } else {
      let mmList=mismatches.map(m=>`<div style="margin-left:12px;color:var(--t2)">· Notice #${m.from} → #${m.to}: After ${fA(m.prevAfter)} ≠ Prior ${fA(m.curPrior)}</div>`).join('');
      insights.push(`<div style="padding:10px 14px;border-radius:var(--r);background:var(--bg3);font-size:12px;margin-bottom:12px;line-height:1.8">
        <div style="color:var(--t1);font-weight:500">Notice 간 약정소진액 현황 불일치가 감지되었습니다.</div>
        <div style="margin-top:4px">${mmList}</div>
      </div>`);
    }
  } else {
    insights.push(`<div style="padding:10px 14px;border-radius:var(--r);background:var(--bg3);font-size:12px;margin-bottom:12px;color:var(--t3)">
      — Notice가 2건 이상이면 연속성 확인이 가능합니다.
    </div>`);
  }

  // D-P1: Call 빈도
  const callRows=rows.filter(r=>r.type==='Call'&&r.date);
  if(callRows.length>=2){
    const callDates=callRows.map(r=>new Date(r.date));
    let totalMonths=0;
    for(let i=1;i<callDates.length;i++) totalMonths+=(callDates[i]-callDates[i-1])/(1000*60*60*24*30);
    const avgMonths=totalMonths/(callDates.length-1);
    if(avgMonths>0){
      insights.push(`<div style="padding:10px 14px;border-radius:var(--r);background:var(--bg3);font-size:12px;margin-bottom:12px;color:var(--t2);line-height:1.7">
        ℹ️ 평균 <strong>${avgMonths.toFixed(1)}개월</strong> 간격으로 Capital Call이 발생하고 있습니다.
      </div>`);
    }
  }

  // D-P2: 평균 Call 규모
  if(callRows.length>=2&&latestCommit){
    const avgCall=callRows.reduce((s,r)=>s+Math.abs(r.caAmount||0),0)/callRows.length;
    const avgPct=(avgCall/latestCommit)*100;
    insights.push(`<div style="padding:10px 14px;border-radius:var(--r);background:var(--bg3);font-size:12px;margin-bottom:12px;color:var(--t2);line-height:1.7">
      ℹ️ 평균 Capital Call 규모: <strong>${fA(avgCall)}</strong> (Commitment의 ${avgPct.toFixed(1)}%)
    </div>`);
  }

  // D-P3: 최근 비활동
  if(lastDate){
    const monthsAgo=Math.round((new Date()-new Date(lastDate))/(1000*60*60*24*30));
    if(monthsAgo>=6){
      insights.push(`<div style="padding:10px 14px;border-radius:var(--r);background:var(--bg3);font-size:12px;margin-bottom:12px;color:var(--t2);line-height:1.7">
        ℹ️ 마지막 Notice: <strong>${lastDate}</strong> (${monthsAgo}개월 전)
      </div>`);
    }
  }

  const secD=insights.length?`<div class="sec"><div class="sh"><div class="st">Insights</div></div>${insights.join('')}</div>`:'';

  return`<div>${secA}${secB}${secC}${secD}</div>`;
}

/* ===== PORTFOLIO DEMO: Fund merge + Notice move animation ===== */
let _pfDemoTimer=null;
let _pfDemoRan=false; // only run once per session
function pfRunDemoAnim(){
  if(_pfDemoRan) return;
  if(_pfDemoTimer){clearTimeout(_pfDemoTimer);_pfDemoTimer=null;}

  const wrap=document.getElementById('pfCardsWrap');
  const cursor=document.getElementById('pfDemoCursor');
  const tip=document.getElementById('pfDemoTip');
  const helpText=document.getElementById('pfHelpText');
  const fundName0=document.getElementById('pfFundName0');
  const fundHdr1=document.getElementById('pfFundHdr1');
  const notice0=document.getElementById('pfNotice0');
  const lpSec1=document.getElementById('pfLp1_0');
  if(!wrap||!cursor||!tip||!helpText||!fundName0||!fundHdr1||!notice0||!lpSec1) return;
  _pfDemoRan=true;

  const wrapRect=()=>wrap.getBoundingClientRect();
  function relPos(el){
    const r=el.getBoundingClientRect();
    const w=wrapRect();
    return{x:r.left-w.left+r.width/2, y:r.top-w.top+r.height/2};
  }

  // Show tooltip near first fund name at start
  const fn0=relPos(fundName0);
  tip.style.transition='none';
  tip.style.left=(fn0.x+30)+'px'; tip.style.top=Math.max(fn0.y-40,0)+'px';
  tip.style.transform='scale(1)';
  requestAnimationFrame(()=>{
    tip.style.transition='opacity .5s';
    tip.style.opacity='1';
  });

  const steps=[
    {from:fundName0, to:fundHdr1, hlColor:'var(--indigo)', repeat:2, label:'fund'},
    {from:notice0, to:lpSec1, hlColor:'var(--blue)', repeat:2, label:'notice'},
  ];

  let stepIdx=0, repeatIdx=0;

  function runStep(){
    if(stepIdx>=steps.length){
      // All done — collapse tooltip into helpText position
      cursor.style.transition='opacity .3s'; cursor.style.opacity='0';

      // Animate tooltip → helpText position
      const helpRect=helpText.getBoundingClientRect();
      const wR=wrapRect();
      const targetX=helpRect.left-wR.left;
      const targetY=helpRect.top-wR.top;
      tip.style.transition='left .6s ease, top .6s ease, opacity .6s ease, transform .6s ease';
      tip.style.left=targetX+'px';
      tip.style.top=targetY+'px';
      tip.style.transform='scale(0.7)';
      tip.style.opacity='0';

      // After animation, show static text
      _pfDemoTimer=setTimeout(()=>{
        tip.style.display='none';
        helpText.style.opacity='.6';
      },700);
      return;
    }
    const step=steps[stepIdx];
    const from=relPos(step.from);
    const to=relPos(step.to);

    // Move tooltip near source on each cycle
    tip.style.transition='left .4s ease, top .4s ease';
    tip.style.left=(from.x+30)+'px'; tip.style.top=Math.max(from.y-40,0)+'px';

    // Phase 1: appear at source (0ms)
    cursor.style.transition='none';
    cursor.style.left=from.x+'px'; cursor.style.top=from.y+'px';
    cursor.style.opacity='0';
    requestAnimationFrame(()=>{
      cursor.style.transition='opacity .3s'; cursor.style.opacity='0.8';
    });

    // Phase 2: highlight source (300ms)
    _pfDemoTimer=setTimeout(()=>{
      step.from.style.boxShadow='0 0 0 2px '+step.hlColor;
      step.from.style.opacity=step.label==='fund'?'.5':'';
    },300);

    // Phase 3: move cursor to target (600ms→1400ms)
    _pfDemoTimer=setTimeout(()=>{
      cursor.style.transition='left .8s ease-in-out, top .8s ease-in-out';
      cursor.style.left=to.x+'px'; cursor.style.top=to.y+'px';
    },600);

    // Phase 4: highlight target (1300ms)
    _pfDemoTimer=setTimeout(()=>{
      step.to.style.boxShadow='inset 0 0 0 2px '+step.hlColor;
      step.to.style.background=step.label==='fund'?'rgba(29,53,87,.08)':'rgba(45,127,249,.06)';
    },1300);

    // Phase 5: reset (2100ms)
    _pfDemoTimer=setTimeout(()=>{
      cursor.style.transition='opacity .2s'; cursor.style.opacity='0';
      step.from.style.boxShadow=''; step.from.style.opacity='';
      step.to.style.boxShadow=''; step.to.style.background=step.label==='fund'?'var(--bg4)':'';
    },2100);

    // Phase 6: next iteration or next step (2600ms)
    _pfDemoTimer=setTimeout(()=>{
      repeatIdx++;
      if(repeatIdx>=step.repeat){
        stepIdx++; repeatIdx=0;
      }
      runStep();
    },2600);
  }

  // Start after a short delay
  _pfDemoTimer=setTimeout(runStep,800);
}

/* Demo animation: Phase A (standalone→new group ×2) then Phase B (group1 chip→group2 ×2) */
let _aeDemoTimer=null;
let _aeDemoRan=false;
function aeRunDemoAnim(){
  if(_aeDemoRan) return;
  if(_aeDemoTimer){clearTimeout(_aeDemoTimer);_aeDemoTimer=null;}

  const cursor=document.getElementById('aeDemoCursor');
  const panel=document.getElementById('aePanel');
  if(!cursor||!panel) return;

  const chip=document.getElementById('aeFirstChip');
  const newGrp=document.getElementById('aeNewGroupArea');
  const grpChip=document.getElementById('aeGrpChip0');
  const grp2=document.querySelector('[data-ae-grp2]');

  const hasPhaseA=chip&&newGrp;
  const hasPhaseB=grpChip&&grp2;
  if(!hasPhaseA&&!hasPhaseB) return;
  _aeDemoRan=true;

  function relPos(el){
    const pr=panel.getBoundingClientRect();
    const r=el.getBoundingClientRect();
    return{x:r.left-pr.left+r.width/2, y:r.top-pr.top+r.height/2};
  }

  // Build step sequence
  const steps=[];
  if(hasPhaseA){
    steps.push({from:chip, to:newGrp, fromBg:'var(--bg4)', fromCol:'var(--t2)', tgtReset:{borderColor:'var(--bdr)',background:'',color:'var(--t3)'}});
    steps.push({from:chip, to:newGrp, fromBg:'var(--bg4)', fromCol:'var(--t2)', tgtReset:{borderColor:'var(--bdr)',background:'',color:'var(--t3)'}});
  }
  if(hasPhaseB){
    const isC=(grpChip.style.fontWeight==='600');
    steps.push({from:grpChip, to:grp2, fromBg:isC?'var(--indigo-d)':'var(--bg4)', fromCol:isC?'var(--indigo)':'var(--t2)', tgtReset:{borderColor:'var(--bdr)'}});
    steps.push({from:grpChip, to:grp2, fromBg:isC?'var(--indigo-d)':'var(--bg4)', fromCol:isC?'var(--indigo)':'var(--t2)', tgtReset:{borderColor:'var(--bdr)'}});
  }

  let si=0;
  function runStep(){
    if(si>=steps.length){
      cursor.style.transition='opacity .3s'; cursor.style.opacity='0';
      return;
    }
    const s=steps[si];
    const from=relPos(s.from);
    const to=relPos(s.to);

    // Appear
    cursor.style.transition='none';
    cursor.style.left=from.x+'px'; cursor.style.top=from.y+'px'; cursor.style.opacity='0';
    requestAnimationFrame(()=>{cursor.style.transition='opacity .3s';cursor.style.opacity='0.8';});

    // Highlight source (300ms)
    _aeDemoTimer=setTimeout(()=>{
      s.from.style.background='var(--blue-d)'; s.from.style.color='var(--blue)';
      s.from.style.boxShadow='0 0 0 2px var(--blue)';
    },300);

    // Move (600→1400ms)
    _aeDemoTimer=setTimeout(()=>{
      cursor.style.transition='left .8s ease-in-out, top .8s ease-in-out';
      cursor.style.left=to.x+'px'; cursor.style.top=to.y+'px';
    },600);

    // Highlight target (1400ms)
    _aeDemoTimer=setTimeout(()=>{
      s.to.style.borderColor='var(--blue)';
      if(s.tgtReset.background!==undefined) s.to.style.background='rgba(45,127,249,.06)';
      if(s.tgtReset.color!==undefined) s.to.style.color='var(--blue)';
    },1400);

    // Reset (2200ms)
    _aeDemoTimer=setTimeout(()=>{
      cursor.style.transition='opacity .2s'; cursor.style.opacity='0';
      s.from.style.background=s.fromBg; s.from.style.color=s.fromCol; s.from.style.boxShadow='';
      Object.entries(s.tgtReset).forEach(([k,v])=>{s.to.style[k]=v;});
    },2200);

    // Next (2800ms)
    _aeDemoTimer=setTimeout(()=>{si++;runStep();},2800);
  }

  _aeDemoTimer=setTimeout(runStep,500);
}

function aeScrollToGroup(canonical){
  // Open panel if closed
  if(!S._aePanel){ S._aePanel=true; R(); }
  // Wait for DOM to update, then scroll and blink
  setTimeout(()=>{
    const cardId='ae-card-'+canonical.replace(/[^a-zA-Z0-9]/g,'_');

    const panel=document.getElementById('aePanel');
    if(!card||!panel) return;
    // Scroll card into view within panel
    card.scrollIntoView({behavior:'smooth',block:'center'});

function aeStartRename(el, fundKey, oldCanonical){
  const input=document.createElement('input');
  input.type='text';
  input.value=oldCanonical;
  input.style.cssText='font-size:11px;font-weight:600;border:1px solid var(--blue);border-radius:3px;padding:1px 4px;outline:none;width:'+Math.max(120,el.offsetWidth+20)+'px';

  const finish=(save)=>{
    const newName=input.value.trim();
    if(save && newName && newName!==oldCanonical){
      // Rename: update all overrides and AI groups that reference oldCanonical
      if(!S._assetGroupOverrides[fundKey]) S._assetGroupOverrides[fundKey]={};
      // Find all raw names currently mapped to oldCanonical
      const aiGroups=S._assetGroups[fundKey]||{};
      const members=aiGroups[oldCanonical]||[];
      // Also check overrides pointing to oldCanonical
      const overrides=S._assetGroupOverrides[fundKey]||{};
      Object.entries(overrides).forEach(([raw,target])=>{
        if(target===oldCanonical) S._assetGroupOverrides[fundKey][raw]=newName;
      });
      // Remap AI group members to new name
      members.forEach(m=>{
        if(!S._assetGroupOverrides[fundKey][m]) S._assetGroupOverrides[fundKey][m]=newName;
      });
      // Update AI groups too
      if(aiGroups[oldCanonical]){
        aiGroups[newName]=aiGroups[oldCanonical];
        delete aiGroups[oldCanonical];
        // Save AI groups
        authFetch(`${API}/api/asset-groups/${encodeURIComponent(fundKey)}`,{
          method:'PUT', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({groups:aiGroups})
        }).catch(()=>{});
      }
      _aeSaveOverrides(fundKey);
      R();
    } else {
      // Restore original text
      el.textContent=oldCanonical;
      el.style.display='';
      input.remove();
    }
  };

  input.addEventListener('keydown',(ev)=>{
    if(ev.key==='Enter'){ev.preventDefault();finish(true);}
    if(ev.key==='Escape'){ev.preventDefault();finish(false);}
  });
  input.addEventListener('blur',()=>finish(true));

  el.style.display='none';
  el.parentNode.insertBefore(input, el);
  input.focus();
  input.select();
}

function _aeSaveOverrides(fundKey){
  // Merge overrides into effective AI groups and save
  const aiGroups=S._assetGroups[fundKey]||{};
  const overrides=S._assetGroupOverrides[fundKey]||{};

  // Build effective groups
  const effective={};
  // Start from AI groups
  Object.entries(aiGroups).forEach(([canonical, members])=>{
    if(!effective[canonical]) effective[canonical]=[];
    (members||[]).forEach(m=>{
      const target=overrides[m]||canonical;
      if(!effective[target]) effective[target]=[];
      if(!effective[target].includes(m)) effective[target].push(m);
    });
  });
  // Handle overrides for items not in AI groups
  Object.entries(overrides).forEach(([raw, target])=>{
    if(!effective[target]) effective[target]=[];
    if(!effective[target].includes(raw)) effective[target].push(raw);
  });

  // Save merged groups to backend
  if(Object.keys(effective).length>0){
    S._assetGroups[fundKey]=effective;
    authFetch(`${API}/api/asset-groups/${encodeURIComponent(fundKey)}`,{
      method:'PUT', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({groups:effective})
    }).catch(()=>{});
  }
}
async function runAssetGroupAI(fundKey){
  if(S._aeLoading) return;

  // Collect all raw names from current exposure context
  const n=S.notices.find(x=>x.id===S.activeNoticeId);
  if(!n) return;
  const lpCode=n.header.LP_code||'';
  const lpFull=n.header.LP_Name_full||'';
  const allFundLp=S.notices.filter(x=>{
    if(x.is_voided) return false;
    if(getFundKey(x.header)!==fundKey) return false;
    if(lpCode) return (x.header.LP_code||'')===lpCode;
    return (x.header.LP_Name_full||'')===lpFull;
  });
  const allRaw=new Set();
  allFundLp.forEach(notice=>{
    realItems(notice.lineItems||[]).forEach(it=>{ if(it.item_name) allRaw.add(it.item_name); });
  });
  const names=[...allRaw];
  if(names.length<2){ alert('그룹화할 자산이 2개 미만입니다.'); return; }

  S._aeLoading=fundKey;
  R();

  try{
    const resp=await authFetch(`${API}/api/asset-groups`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({fund_key:fundKey, asset_names:names, model:S.geminiModel})
    });
    if(!resp.ok) throw new Error(`서버 오류: ${resp.status}`);

    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let buffer='';

    while(true){
      const {done,value}=await reader.read();
      if(done) break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');
      buffer=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: ')) continue;
        let evt;
        try{evt=JSON.parse(line.slice(6).trim());}catch(e){continue;}

        if(evt.stage==='done'){
          S._assetGroups[fundKey]=evt.groups;
          S._aeLoading=null;
          R();
          return;
        }
        if(evt.stage==='error'){
          throw new Error(evt.detail||'AI 그룹화 실패');
        }
        // progress — update UI
        if(evt.stage==='progress'){
          const el=document.querySelector('.spin-s');
          // Just keep spinning, R() would be too expensive during streaming
        }
      }
    }
    S._aeLoading=null;
    R();
  }catch(e){
    S._aeLoading=null;
    console.error('Asset group AI error:',e);
    R();
    // Show error inline
    setTimeout(()=>{
      const el=document.querySelector('.result-tabs')?.parentElement;
      if(el){
        const toast=document.createElement('div');
        toast.className='al err';
        toast.style.cssText='margin:8px 0;animation:fi .3s ease';
        toast.innerHTML=`<span class="ai">✕</span><div>AI 그룹화 실패: ${escH(e.message)}</div>`;
        el.insertBefore(toast, el.children[1]);
        setTimeout(()=>toast.remove(),5000);
      }
    },100);
  }
}

function checkWireConsistency(currentNotice){
  const h=currentNotice.header;
  const currentWire=(h.wire_info||[])[0];
  if(!currentWire) return {status:'no_data'};

  const thisFund=getFundKey(h);
  const thisLp=(h.LP_code||normalizeLpName(h.LP_Name_full)||'').toLowerCase();
  const thisNet=pN(h.LP_net_amount);
  const thisDir=thisNet>0?'outbound':thisNet<0?'inbound':'adjustment';

  // Only compare with same-direction siblings dated BEFORE this notice
  const thisDate=fmtDate(h.issue_date||h.due_date||'');
  const siblings=S.notices.filter(n=>{
    if(n.id===currentNotice.id) return false;
    if(getFundKey(n.header)!==thisFund) return false;
    if(((n.header.LP_code||normalizeLpName(n.header.LP_Name_full)||'').toLowerCase())!==thisLp) return false;
    if(!(n.header.wire_info||[]).length) return false;
    const sibNet=pN(n.header.LP_net_amount);
    const sibDir=sibNet>0?'outbound':sibNet<0?'inbound':'adjustment';
    if(sibDir!==thisDir) return false;
    const sibDate=fmtDate(n.header.issue_date||n.header.due_date||'');
    if(!sibDate||sibDate==='N/A') return false;
    if(!thisDate||thisDate==='N/A') return false;
    return sibDate<thisDate;
  });
  if(!siblings.length) return {status:'first'};

  const sorted=siblings.slice().sort((a,b)=>{
    const da=fmtDate(a.header.issue_date||a.header.due_date||'');
    const db=fmtDate(b.header.issue_date||b.header.due_date||'');
    return db.localeCompare(da);
  });
  const prevWire=(sorted[0].header.wire_info||[])[0];
  if(!prevWire) return {status:'first'};

  // ── Effective Destination Extractor ──
  // Some GPs put the actual bank info in "beneficiary" fields,
  // others put it in "beneficiary_bank" fields. We extract the
  // "effective" destination by preferring beneficiary_bank_* but
  // falling back to beneficiary_* when beneficiary_bank_* is empty.
  function getEffective(w){
    const v=(f)=>((w[f]||'')||'').trim();
    const noVal=(s)=>!s||s==='N/A';
    return {
      swift: !noVal(v('beneficiary_bank_swift_code')) ? v('beneficiary_bank_swift_code')
           : !noVal(v('beneficiary_swift_code')) ? v('beneficiary_swift_code') : '',
      acct:  !noVal(v('beneficiary_bank_account_number')) ? v('beneficiary_bank_account_number')
           : !noVal(v('beneficiary_account_number')) ? v('beneficiary_account_number') : '',
      aba:   !noVal(v('beneficiary_bank_aba_routing')) ? v('beneficiary_bank_aba_routing')
           : !noVal(v('beneficiary_aba_routing')) ? v('beneficiary_aba_routing') : '',
      bank:  !noVal(v('beneficiary_bank_name')) ? v('beneficiary_bank_name')
           : !noVal(v('beneficiary_name')) ? v('beneficiary_name')
           : !noVal(v('beneficiary_account_name')) ? v('beneficiary_account_name') : '',
    };
  }

  const ePrev=getEffective(prevWire);
  const eCurr=getEffective(currentWire);

  // RED: effective destination SWIFT or Account Number differs
  const criticalDiffs=[];
  if(ePrev.swift&&eCurr.swift&&ePrev.swift!==eCurr.swift)
    criticalDiffs.push({field:'SWIFT (송금처)',prev:ePrev.swift,curr:eCurr.swift});
  if(ePrev.acct&&eCurr.acct&&ePrev.acct!==eCurr.acct)
    criticalDiffs.push({field:'계좌번호 (송금처)',prev:ePrev.acct,curr:eCurr.acct});

  // AMBER: effective bank name, ABA, or intermediary differs
  const importantDiffs=[];
  if(ePrev.bank&&eCurr.bank&&ePrev.bank!==eCurr.bank)
    importantDiffs.push({field:'은행명 (송금처)',prev:ePrev.bank,curr:eCurr.bank});
  if(ePrev.aba&&eCurr.aba&&ePrev.aba!==eCurr.aba)
    importantDiffs.push({field:'ABA (송금처)',prev:ePrev.aba,curr:eCurr.aba});

  // INFO: intermediary changes
  const infoDiffs=[];
  const intFields=[['intermediary_bank_name','중개은행'],['intermediary_swift_code','SWIFT (중개)'],['intermediary_account_number','계좌번호 (중개)']];
  intFields.forEach(([f,label])=>{
    const p=((prevWire[f]||'')||'').trim();
    const c=((currentWire[f]||'')||'').trim();
    if(p&&p!=='N/A'&&c&&c!=='N/A'&&p!==c) infoDiffs.push({field:label,prev:p,curr:c});
  });

  if(criticalDiffs.length) return {status:'critical',diffs:criticalDiffs,importantDiffs,infoDiffs,prevNotice:sorted[0]};
  if(importantDiffs.length) return {status:'important',diffs:[],importantDiffs,infoDiffs,prevNotice:sorted[0]};
  if(infoDiffs.length) return {status:'info',diffs:[],importantDiffs:[],infoDiffs,prevNotice:sorted[0]};
  return {status:'match'};
}

function buildWireHistory(currentNotice){
  const h=currentNotice.header;
  const thisFund=getFundKey(h);
  const thisLp=(h.LP_code||normalizeLpName(h.LP_Name_full)||'').toLowerCase();

  const related=S.notices.filter(n=>
    getFundKey(n.header)===thisFund&&
    ((n.header.LP_code||normalizeLpName(n.header.LP_Name_full)||'').toLowerCase())===thisLp
  ).sort((a,b)=>{
    const da=fmtDate(a.header.issue_date||a.header.due_date||'');
    const db=fmtDate(b.header.issue_date||b.header.due_date||'');
    return da.localeCompare(db);
  });

  // Track previous wire per direction — use effective destination fields
  const prev={outbound:{swift:null,acct:null},inbound:{swift:null,acct:null}};
  return related.map(n=>{
    const w=(n.header.wire_info||[])[0];
    const net=pN(n.header.LP_net_amount);
    const dir=net>0?'outbound':net<0?'inbound':'adjustment';
    // Effective destination: prefer beneficiary_bank_*, fall back to beneficiary_*
    const swift=w?.beneficiary_bank_swift_code||w?.beneficiary_swift_code||'';
    const acct=w?.beneficiary_bank_account_number||w?.beneficiary_account_number||'';
    const acctName=w?.beneficiary_bank_name||w?.beneficiary_name||w?.beneficiary_account_name||'';
    let matchStatus='no_data';
    if(w && (dir==='outbound'||dir==='inbound')){
      const p=prev[dir];
      if(p.swift===null) matchStatus='first';
      else if(swift===p.swift&&acct===p.acct) matchStatus='match';
      else if(swift===p.swift&&!acct&&!p.acct) matchStatus='match';
      else matchStatus='mismatch';
      prev[dir]={swift,acct};
    } else if(w){
      matchStatus='first';
    }
    return {
      id:n.id,
      date:fmtDate(n.header.issue_date||n.header.due_date||'N/A'),
      dir,swift,acct,acctName,matchStatus
    };
  });
}
