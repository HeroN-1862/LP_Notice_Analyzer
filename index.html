<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LP Notice Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- PDF.js for client-side PDF rendering (no server-side poppler needed) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.mjs" type="module"></script>
<script>
  window._pdfjsReady = import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.mjs').then(m => {
    m.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.worker.min.mjs';
    window.pdfjsLib = m;
  });
</script>
<!-- SheetJS for Excel/CSV export -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<!-- JSZip for CSV multi-file export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --bg0:#f5f6f8;--bg1:#ffffff;--bg2:#ffffff;--bg3:#f9fafb;--bg4:#f0f2f5;
  --bdr:#e2e5ea;--bdr2:#d0d5dd;
  --t1:#111827;--t2:#4b5563;--t3:#9ca3af;
  --blue:#2d7ff9;--blue-d:rgba(45,127,249,.08);
  --indigo:#1D3557;--indigo-d:rgba(29,53,87,.08);
  --teal:#4E9A6D;--teal-d:rgba(78,154,109,.08);
  --emerald:#4E9A6D;--emerald-d:rgba(78,154,109,.08);
  --red:#dc2626;--red-d:rgba(220,38,38,.08);
  --amber:#d97706;--amber-d:rgba(217,119,6,.08);
  --purple:#7c3aed;--purple-d:rgba(124,58,237,.08);
  --slate:#64748b;--slate-d:rgba(100,116,139,.08);
  --r:7px;--rl:11px;
  --f:'Inter','Noto Sans KR',sans-serif;
  --fm:'JetBrains Mono',monospace;
  --sw:248px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg0);color:var(--t1);min-height:100vh;line-height:1.5;font-size:13px}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#d0d5dd;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:#9ca3af}

.app{display:flex;min-height:100vh}

/* === SIDEBAR === */
.sb{width:var(--sw);flex-shrink:0;background:var(--bg1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;overflow:hidden;box-shadow:2px 0 8px rgba(0,0,0,.04)}
.sb-head{padding:14px 16px 13px;border-bottom:1px solid var(--bdr);min-height:56px;box-sizing:border-box;display:flex;align-items:center}
.sb-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;letter-spacing:-.02em}
.sb-logo i{width:24px;height:24px;background:var(--blue);border-radius:5px;display:grid;place-items:center;font-size:11px;font-weight:700;color:#fff;font-style:normal}

.sb-nav{flex:1;overflow-y:auto;padding:8px 6px}
.sb-gl{padding:9px 10px 3px;font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase}
.sb-it{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:5px;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .12s;margin-bottom:1px}
.sb-it:hover{background:rgba(0,0,0,.04);color:var(--t1)}
.sb-it.act{background:rgba(45,127,249,.1);color:var(--blue)}
.sb-it.dis{opacity:.28;pointer-events:none}
.sb-it .ic{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sb-it .badge{margin-left:auto;padding:1px 5px;border-radius:8px;font-size:11px;font-weight:700}
.sb-it .badge.proc{background:var(--amber-d);color:var(--amber);animation:pulse 1.5s ease infinite}
.sb-it .badge.ok{background:var(--teal-d);color:var(--teal)}
.sb-it .badge.err{background:var(--red-d);color:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.sb-div{height:1px;background:var(--bdr);margin:6px 10px}

/* Sidebar notice list */
.sb-notice{display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:5px;font-size:12px;color:var(--t2);cursor:pointer;transition:all .12s;margin-bottom:1px;overflow:hidden;border-left:3px solid transparent}
.sb-notice:hover{background:rgba(0,0,0,.04);color:var(--t1)}
.sb-notice.act{background:rgba(79,70,229,.08);color:var(--indigo);border-left-color:var(--indigo)}
.sb-notice .n-icon{font-size:12px;flex-shrink:0;display:flex;align-items:center}
.sb-notice .n-text{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-variant-numeric:tabular-nums}
.sb-notice .n-type{flex-shrink:0;padding:1px 4px;border-radius:3px;font-size:11px;font-weight:700}

/* Sidebar fund groups */
.sb-fund{margin-bottom:2px}
.sb-fund-h{display:flex;align-items:center;gap:5px;padding:5px 10px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;border-radius:5px;transition:all .12s}
.sb-fund-h:hover{background:rgba(0,0,0,.03);color:var(--t1)}
.sb-fund-h .sb-arrow{font-size:11px;color:var(--t3);transition:transform .2s;width:10px}
.sb-fund-h .sb-arrow.open{transform:rotate(90deg)}
.sb-fund-h .sb-cnt{margin-left:auto;font-size:11px;color:var(--t3);font-weight:500}
.sb-fund-notices{padding-left:16px}

/* Drag & drop */
.pt-notice[draggable=true]{cursor:grab}
.pt-notice[draggable=true]:active{cursor:grabbing}
.pt-notice.dragging{opacity:.3}
.pt-fund-h.drag-over{background:rgba(37,99,235,.08);border:1px dashed var(--blue);border-radius:var(--r)}
.drop-indicator{padding:6px 12px;margin:4px 0;border:2px dashed var(--blue);border-radius:var(--r);background:rgba(45,127,249,.06);color:var(--blue);font-size:11px;text-align:center;display:none}
.drop-indicator.visible{display:block}

.sb-foot{padding:10px 12px;border-top:1px solid var(--bdr);font-size:11px;color:var(--t3)}
.sb-foot .mdl{;font-size:11px;color:var(--teal);font-weight:500}

/* === MAIN === */
.main{margin-left:var(--sw);flex:1;min-height:100vh;display:flex;flex-direction:column}
.pg-h{padding:14px 24px 13px;border-bottom:1px solid var(--bdr);background:rgba(255,255,255,.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:40;min-height:56px;box-sizing:border-box}
.pg-h h1{font-size:16px;font-weight:700;letter-spacing:-.02em}
.pg-h p{font-size:12px;color:var(--t2);margin-top:1px}
.pg-b{padding:20px 24px 44px;flex:1}

/* Toast */
.toast{display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:14px;background:linear-gradient(135deg,rgba(45,127,249,.07),rgba(14,196,169,.05));border:1px solid rgba(45,127,249,.18);border-radius:var(--r);font-size:11px;animation:fi .3s ease}
.spin-s{width:14px;height:14px;border:2px solid var(--bdr);border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

/* Common */
label.fl{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:3px;letter-spacing:.05em;text-transform:uppercase}
input[type=text],input[type=password],select,textarea{width:100%;padding:7px 10px;background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r);color:var(--t1);font-family:var(--f);font-size:12px;transition:border-color .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue)}
textarea{resize:vertical;min-height:70px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-family:var(--f);font-size:11px;font-weight:600;border:none;cursor:pointer;transition:all .2s}
.btn-p{background:var(--blue);color:#fff}.btn-p:hover{background:#3d8bfa}.btn-p:disabled{opacity:.35;cursor:not-allowed}
.btn-s{background:transparent;color:var(--t2);border:1px solid var(--bdr)}.btn-s:hover{border-color:var(--t2);color:var(--t1)}
.btn-sm{padding:4px 9px;font-size:12px}
.btn-danger{background:var(--red);color:#fff;font-size:12px;padding:4px 9px}

/* Glowing border animation for AI grouping button */
.ae-glow-btn{position:relative;z-index:0;border:none!important;padding:4px 12px!important}
.ae-glow-btn::before{content:'';position:absolute;inset:-1px;border-radius:var(--r);background:linear-gradient(90deg,var(--bdr),var(--blue),var(--purple),var(--blue),var(--bdr));background-size:300% 100%;animation:ae-border-flow 3s linear infinite;z-index:-2}
.ae-glow-btn::after{content:'';position:absolute;inset:1px;border-radius:calc(var(--r) - 1px);background:var(--bg1);z-index:-1}
@keyframes ae-border-flow{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.ae-glow-btn:hover::before{background:linear-gradient(90deg,var(--blue),var(--purple),var(--blue),var(--purple),var(--blue));background-size:300% 100%;animation:ae-border-flow 1.5s linear infinite}

/* Upload */
.uz{border:2px dashed var(--bdr);border-radius:var(--rl);padding:40px 24px;text-align:center;transition:all .3s;cursor:pointer}
.uz:hover,.uz.dragover{border-color:var(--blue);background:rgba(45,127,249,.03)}
.uz .uzi{width:44px;height:44px;margin:0 auto 10px;background:var(--bg3);border:1px solid var(--bdr);border-radius:9px;display:grid;place-items:center;font-size:18px}
.uz h3{font-size:13px;font-weight:600;margin-bottom:3px}.uz p{font-size:12px;color:var(--t2)}

/* Grid */
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1px;background:var(--bdr);border-radius:var(--r);overflow:hidden}
.dc{background:var(--bg2);padding:9px 12px}
.dc .dl{font-size:11px;color:var(--t3);font-weight:600;margin-bottom:2px;letter-spacing:.04em;text-transform:uppercase}
.dc .dv{font-size:12px;font-weight:500;font-variant-numeric:tabular-nums}.dc .dv.mo{;font-size:11px}.dc .dv.na{color:var(--t3);font-style:italic}
.dc.ed{cursor:pointer;position:relative}.dc.ed:hover{background:var(--bg4)}

/* Table */
.tw{overflow-x:auto;border:1px solid var(--bdr);border-radius:var(--r)}
table.it{width:100%;border-collapse:collapse;font-size:12px}
table.it th{background:var(--bg0);padding:7px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--t2);letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;border-bottom:2px solid var(--bdr);position:sticky;top:0;z-index:2}
table.it td{padding:7px 10px;border-bottom:1px solid var(--bdr);white-space:nowrap}
table.it tr:last-child td{border-bottom:none}
table.it tbody tr:nth-child(even) td{background:rgba(0,0,0,.015)}
table.it tbody tr:hover td{background:rgba(79,70,229,.06)}
table.it td.amt{text-align:right;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.ap{color:var(--t1)}.an{color:var(--t1)}

/* Tag */
.tg{display:inline-flex;align-items:center;padding:1px 5px;border-radius:3px;font-size:11px;font-weight:600}

/* Inline edit */
.edit-cell{background:var(--bg3);border:1px solid var(--blue);border-radius:4px;padding:3px 6px;font-size:12px;font-family:var(--f);color:var(--t1);width:100%;box-sizing:border-box}
.edit-cell:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(45,127,249,.15)}
.edit-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.edit-bar .btn-edit{padding:5px 12px;font-size:11px;font-weight:600;border-radius:6px;cursor:pointer;border:none;font-family:var(--f);transition:all .15s}
.edit-bar .btn-edit.on{background:var(--blue);color:#fff}
.edit-bar .btn-edit.off{background:var(--bg4);color:var(--t2)}
.tg-c{background:var(--indigo-d);color:var(--indigo)}.tg-d{background:var(--emerald-d);color:var(--emerald)}.tg-a{background:var(--slate-d);color:var(--slate)}
.tg-y{background:var(--indigo-d);color:var(--indigo)}.tg-n{background:rgba(88,104,128,.1);color:var(--t3)}

/* Validation */
.vc{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:9px;position:relative;overflow:hidden}
.vc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.vc.pass::before{background:var(--teal)}.vc.fail::before{background:var(--red)}.vc.skip::before{background:var(--t3)}
.vc .vh{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.vc .vt{font-size:11px;font-weight:600}
.vc .vs{padding:2px 6px;border-radius:3px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.vc.pass .vs{background:var(--teal-d);color:var(--teal)}.vc.fail .vs{background:var(--red-d);color:var(--red)}.vc.skip .vs{background:rgba(88,104,128,.15);color:var(--t3)}
.vc .vb{font-size:12px;color:var(--t2);line-height:1.7}
.vc .vf{font-variant-numeric:tabular-nums;font-size:12px;color:var(--t1);background:var(--bg0);padding:8px 11px;border-radius:5px;margin-top:6px;line-height:1.8}
details>summary{list-style:none}details>summary::-webkit-details-marker{display:none}details>summary::before{content:'▶';display:inline-block;margin-right:6px;font-size:11px;color:var(--t3);transition:transform .2s}details[open]>summary::before{transform:rotate(90deg)}

/* Alert */
.al{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border-radius:var(--r);margin-bottom:12px;font-size:12px;line-height:1.6}
.al.warn{background:var(--amber-d);border:1px solid rgba(217,119,6,.15);color:var(--amber)}
.al.info{background:rgba(45,127,249,.07);border:1px solid rgba(45,127,249,.18);color:var(--blue)}
.al.err{background:var(--red-d);border:1px solid rgba(220,38,38,.15);color:var(--red)}
.al .ai{font-size:13px;flex-shrink:0;margin-top:0}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--bdr);margin-bottom:14px}
.tb{padding:6px 12px;font-size:12px;font-weight:500;color:var(--t2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:var(--f);transition:all .2s}
.tb:hover{color:var(--t1)}.tb.act{color:var(--blue);border-bottom-color:var(--blue)}

/* Result page tabs (Chrome-style) */
.result-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--bdr)}
.result-tab{padding:9px 22px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none}
.result-tab:hover{color:var(--t1)}
.result-tab.act{color:var(--indigo);border-bottom-color:var(--indigo);font-weight:600}

/* Wire info */
.wire-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.wire-card .wc-title{font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
.wire-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid rgba(0,0,0,.04)}
.wire-row:last-child{border-bottom:none}
.wire-row .wl{color:var(--t3);font-weight:500;min-width:100px}
.wire-row .wv{color:var(--t1);font-weight:500;text-align:right;word-break:break-all}

.sec{margin-bottom:18px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.st{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.st .nm{width:17px;height:17px;border-radius:4px;background:var(--blue-d);color:var(--blue);font-size:11px;font-weight:700;display:grid;place-items:center}

/* Modal */
.mo-bg{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center}
.mo{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rl);padding:20px;width:90%;max-width:400px}
.mo h3{font-size:14px;font-weight:600;margin-bottom:4px}.mo p{font-size:12px;color:var(--t2);margin-bottom:12px}
.mo-act{display:flex;gap:6px;justify-content:flex-end}

.email-d{background:var(--bg0);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;margin-top:10px}
.email-d h4{font-size:12px;font-weight:600;margin-bottom:7px;color:var(--amber)}

.cen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 60px)}
.scard{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rl);padding:24px;width:100%;max-width:440px}
.scard h2{font-size:16px;font-weight:600;margin-bottom:2px}.scard>p{font-size:12px;color:var(--t2);margin-bottom:16px;line-height:1.6}

.fi{animation:fin .3s ease}@keyframes fin{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Result split layout */
.rsplit{padding-right:410px;transition:padding .3s}
.rsplit.full{padding-right:0}
@media(max-width:1100px){.rsplit{padding-right:0}}

/* Right panel — fixed to viewport, not scroll */
.rpanel{position:fixed;top:96px;right:24px;width:390px;max-height:calc(100vh - 108px);display:flex;flex-direction:column;z-index:45}
.seg-ctrl{display:flex;border:1px solid var(--bdr);border-radius:8px;overflow:hidden;margin-bottom:12px}
.seg-btn{flex:1;padding:7px 4px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:var(--bg2);color:var(--t2);transition:all .15s;text-align:center;font-family:var(--f)}
.seg-btn:not(:last-child){border-right:1px solid var(--bdr)}
.seg-btn:hover{background:var(--bg4);color:var(--t1)}
.seg-btn.act{background:var(--t1);color:#fff}
.seg-btn-hide{flex:0 0 36px}

/* Expand button when hidden */
.rpanel-expand{position:fixed;right:16px;z-index:45;width:28px;height:28px;border-radius:6px;background:var(--bg2);border:1px solid var(--bdr);display:grid;place-items:center;cursor:pointer;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.rpanel-expand:hover{background:var(--bg4);border-color:var(--t3)}

/* QA Chat */
.qa-wrap{display:flex;flex-direction:column;height:calc(100vh - 140px);border:1px solid var(--bdr);border-radius:var(--rl);overflow:hidden;background:var(--bg2)}
.qa-msgs{flex:1;overflow-y:auto;padding:14px}
.qa-msg{margin-bottom:12px;display:flex;gap:8px}
.qa-msg .qa-avatar{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;font-size:11px;font-weight:700;flex-shrink:0}
.qa-msg.user .qa-avatar{background:var(--blue-d);color:var(--blue)}
.qa-msg.ai .qa-avatar{background:var(--teal-d);color:var(--teal)}
.qa-msg .qa-bubble{font-size:12px;line-height:1.6;color:var(--t1);max-width:100%}
.qa-msg.ai .qa-bubble{color:var(--t2)}
.qa-input{display:flex;gap:6px;padding:10px 12px;border-top:1px solid var(--bdr);background:var(--bg3)}
.qa-input input{flex:1;padding:8px 12px;border:1px solid var(--bdr);border-radius:var(--r);font-family:var(--f);font-size:12px;background:var(--bg2);color:var(--t1)}
.qa-input input:focus{outline:none;border-color:var(--blue)}

/* PDF Viewer */
.pdf-wrap{border:1px solid var(--bdr);border-radius:var(--rl);overflow:hidden;background:var(--bg2);transition:box-shadow .3s;flex:1;display:flex;flex-direction:column;min-height:0}
.pdf-wrap.expanded{position:fixed;top:60px;right:24px;width:680px;max-width:50vw;max-height:calc(100vh - 80px);z-index:100;border-radius:var(--rl);box-shadow:0 8px 40px rgba(0,0,0,.2)}
.pdf-toolbar{display:flex;align-items:center;gap:6px;padding:7px 12px;border-bottom:1px solid var(--bdr);background:var(--bg3);font-size:11px;position:sticky;top:0;z-index:5;user-select:none}
.pdf-wrap.expanded .pdf-toolbar{cursor:grab}
.pdf-wrap.expanded .pdf-toolbar:active{cursor:grabbing}
.pdf-toolbar .pdf-nav{display:flex;align-items:center;gap:4px;margin-left:auto}
.pdf-toolbar .pdf-zoom{display:flex;align-items:center;gap:4px}
.pdf-canvas-wrap{flex:1;overflow:auto;position:relative;background:#e8e8e8;min-height:0}
.pdf-wrap.expanded .pdf-canvas-wrap{max-height:calc(100vh - 140px);cursor:grab}
.pdf-wrap.expanded .pdf-canvas-wrap:active{cursor:grabbing}
.pdf-highlight{position:absolute;background:rgba(255,220,50,.25);border:2px solid rgba(255,180,0,.7);border-radius:4px;pointer-events:none;transition:all .3s ease;z-index:5;transform:scale(1);box-shadow:0 0 0 rgba(0,0,0,0)}

<body>
<div class="app">
  <aside class="sb" id="sb"></aside>
  <div class="main"><div class="pg-h" id="ph"></div><div class="pg-b" id="pb"></div></div>
</div>
<script>
/*
 * ============================================================
 * [FONT POLICY] 모든 숫자/금액 텍스트는 Inter 폰트를 사용할 것.
 * JetBrains Mono 등 monospace 폰트를 숫자에 적용하지 말 것.
 * ============================================================
 * [ARCHITECTURE] Frontend calls Backend API (same origin)
 * No direct Gemini API calls from frontend.
 * PDF images served from backend. Data persisted in SQLite.
 * ============================================================
 */
const API=location.origin; // auto-detect: works for localhost and deployed URLs

/* ===== AUTH ===== */
let _sb = null; // Supabase client
let _session = null; // current session
let _userRole = 'uploader'; // 'admin' | 'uploader' | 'viewer'

async function initAuth() {
  // Step 1: Create Supabase client (plain fetch — no auth needed)
  try {
    const cfg = await fetch(`${API}/api/auth/config`).then(r=>r.json());
    if (cfg.supabase_url && cfg.supabase_anon_key) {
      _sb = supabase.createClient(cfg.supabase_url, cfg.supabase_anon_key);
    }
  } catch(e) { console.warn('Auth config failed:', e); }

  if (!_sb) return false;

  // Step 2: Check existing session (returning user)
  try {
    const { data } = await _sb.auth.getSession();
    if (data?.session) {
      _session = data.session;
      loadUserRole().catch(()=>{});
      return true;
    }
  } catch(e) { console.warn('Session check:', e.message); }

  return false;
}

async function loadUserRole() {
  try {
    const r = await authFetch(`${API}/api/auth/me`);
    if (r.ok) {
      const d = await r.json();
      _userRole = d.role || 'uploader';
      console.log('[AUTH] role=', _userRole, 'org=', d.org_id||'none');
      S._userOrg = d.org || null;
      S._adminViewUser = null;
    }
  } catch(e) { _userRole = 'uploader'; }
  // Load favorites
  try {
    const r = await authFetch(`${API}/api/favorites`);
    if (r.ok) { S._favorites = await r.json(); S._favoritesActive = S._favorites.length > 0; }
  } catch(e) {}
}

async function authFetch(url, opts = {}) {
  if (!_session) throw new Error('Not authenticated');
  if (!opts.headers) opts.headers = {};
  opts.headers['Authorization'] = `Bearer ${_session.access_token}`;
  const resp = await fetch(url, opts);
  if (resp.status === 401) {
    // Try refresh
    if (_sb) {
      const { data } = await _sb.auth.refreshSession();
      if (data.session) {
        _session = data.session;
        opts.headers['Authorization'] = `Bearer ${_session.access_token}`;
        return fetch(url, opts);
      }
    }
    _session = null;
    S.page = 'login'; R();
  }
  return resp;
}

async function doLogin(email, password) {
  if (!_sb) return { error: 'Auth not initialized' };
  const { data, error } = await _sb.auth.signInWithPassword({ email, password });
  if (error) return { error: error.message };
  _session = data.session;
  await loadUserRole();
  return { ok: true };
}

async function doRegister(email, password) {
  if (!_sb) return { error: 'Auth not initialized' };
  const { data, error } = await _sb.auth.signUp({ email, password });
  if (error) return { error: error.message };
  // If email confirmation required, data.user exists but session may be null
  if (data.user && !data.session) return { needsConfirmation: true };
  _session = data.session;
  return { ok: true };
}

async function doLogout() {
  if (_sb) await _sb.auth.signOut();
  _session = null;
  _userRole = 'uploader';
  S._userOrg = null;
  S._favorites = [];
  S._favoritesActive = false;
  S._adminOrgs = [];
  S._adminTotalUnique = 0;
  S._adminOrgFilter = null;
  S.notices = [];
  S.page = 'login';
  R();
}

/* ===== STATE ===== */
const S = {
  page:'login', models:[], selectedModel:'',
  connected:false,
  notices: [],
  activeNoticeId: null,
  jobs: [],
  nameReg: { fund:{}, lp:{} },
  activeTab:'overview', showLpModal:false,
  selectedFund:null,
  showCorrection:null,
  editMode:false, // inline edit mode for line items
  rightPanel:'pdf',
  resultTab:'notice', // 'notice' | 'wire' | 'exposure'
  qaMessages:[], qaLoading:false,
  treeOpen: {},
  sbOpen: {},
  geminiModel: 'gemini-3-flash-preview',
  geminiTemperature: 0.1,
  geminiModels: [],
  showDuplicate: null,  // duplicate notice popup data  // fetched from /api/models
  showMultiLp: null,    // multi-LP selection popup data
  showLpMove: null,     // LP move confirmation popup data
  _assetGroups: {},     // fundKey → { canonical: [raw1, raw2, ...] }
  _assetGroupOverrides: {}, // fundKey → { rawName: targetCanonical }
  _aeLoading: null,     // asset group AI loading state
  _aePanel: false,      // hierarchy panel open/closed
  showFundMerge: null,  // fund merge confirmation popup
  _adminViewUser: null,  // admin viewing another user's data
  _adminUsers: [],       // admin user list cache
  _userOrg: null,        // { id, name }
  _favorites: [],        // ['fund_key_1', ...]
  _favoritesActive: false,
  _adminOrgFilter: null, // admin org filter: org_id or 'all'
  _adminOrgs: [],        // admin org list cache
  _adminTotalUnique: 0,  // total unique notices across all orgs
  _orgAssign: null,      // org assignment popup data
  _noticeOrgMap: null,   // admin portfolio management data
  _lpEdit: null,         // LP edit popup data
  _exportPopup: null,    // export popup: {format:'xlsx', scope:'current'}
};
let _noticeCounter = 0;
let _batchCounter = 0;

/* ===== BACKEND PERSISTENCE ===== */
async function loadFromBackend(){
  try{
    const resp=await authFetch(`${API}/api/notices`);
    if(!resp.ok) return;
    const data=await resp.json();
    S.notices=data;
    // Store org_id for admin org assignment
    S.notices.forEach(n=>{ n._raw_org_id = n.org_id || ''; });
    if(S.notices.length) S.page='portfolio';
    // Rebuild name registry + derive missing fields (2-pass: cross-ref needs all notices loaded first)
    S.notices.forEach(n=>{normalizeNames(n.header);deriveHeaderFields(n.header);});
    // Pass 2: re-derive for notices that missed cross-ref on first pass
    S.notices.forEach(n=>{if(pN(n.header.Commitment_original)==null||pN(n.header.Unfunded_prior)==null) deriveHeaderFields(n.header);});
    // Pass 2.5: refine LP display names — emphasize distinctive parts within each fund
    refineLpDisplayNames();
    // Pass 3: void cross-referencing — clear stale flags then re-derive
    _suppressVoidSave=true; // don't save to DB during batch rebuild
    const _prevVoided=S.notices.filter(n=>n.is_voided).map(n=>n.id);
    S.notices.forEach(n=>{n.is_voided=false; n.voided_by=null;});
    const _voidCandidates=S.notices.filter(n=>n.header.voids_prior_notice&&n.header.voids_prior_notice!=='N/A')
      .sort((a,b)=>{
        const da=fmtDate(a.header.issue_date||'9999');
        const db=fmtDate(b.header.issue_date||'9999');
        return db.localeCompare(da); // newest first
      });
    _voidCandidates.forEach(n=>crossRefVoid(n.id, n.header));
    _suppressVoidSave=false;
    // Sync DB: un-void incorrectly voided, void newly detected
    _prevVoided.forEach(id=>{
      const n=S.notices.find(x=>x.id===id);
      if(n && !n.is_voided){
        authFetch(`${API}/api/notices/${id}/header`,{method:'PUT',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({is_voided:false,voided_by:null})}).catch(()=>{});
      }
    });
    S.notices.filter(n=>n.is_voided && !_prevVoided.includes(n.id)).forEach(n=>{
      authFetch(`${API}/api/notices/${n.id}/header`,{method:'PUT',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({is_voided:true,voided_by:n.voided_by})}).catch(()=>{});
    });
    S.connected=true;
    // Load saved settings
    try{
      const sr=await authFetch(`${API}/api/settings`);
      if(sr.ok){const sd=await sr.json();S.geminiModel=sd.gemini_model;S.geminiTemperature=sd.gemini_temperature;}
    }catch(e){}
    loadGeminiModels();
    loadAssetGroups();
    // Admin: load org list for portfolio cards + upload selector
    if(_userRole==='admin') loadAdminOrgs();
    R();
  }catch(e){console.warn('Backend load failed:',e);R();}
}

function saveState(){/* No-op: backend persists on write */}

/* Recalculate all derived fields without re-parsing PDFs */
function recalcAll(){
  let count=0;
  S.notices.forEach(n=>{
    Object.keys(n.header).filter(k=>k.startsWith('_derived_')||k.startsWith('_mismatch_')).forEach(k=>delete n.header[k]);
    deriveHeaderFields(n.header);
    detectSubtotals(n.lineItems);
    n._statusCache=null;
    n._statusCacheHash=null;
    count++;
  });
  // Pass 2: cross-ref for notices that missed on first pass
  S.notices.forEach(n=>{if(pN(n.header.Commitment_original)==null||pN(n.header.Unfunded_prior)==null) deriveHeaderFields(n.header);});
  refineLpDisplayNames();
  R();
  alert(`${count}건 Notice 재계산 완료`);
}

function clearStorage(){
  if(!confirm('서버의 모든 데이터를 삭제하시겠습니까?')) return;
  Promise.all(S.notices.map(n=>authFetch(`${API}/api/notices/${n.id}`,{method:'DELETE'}))).then(()=>{
    S.notices=[];S.nameReg={fund:{},lp:{}};R();
  });
}

// Load on start — check auth first
(async function startup() {
  const authed = await initAuth();
  if (authed) {
    S.page = 'upload';
    R();  // Show upload page immediately
    await loadFromBackend();
  } else {
    S.page = 'login';
    R();
  }
})();

/* ===== RENDER ===== */
function R(){
  const isAuth=S.page==='login'||S.page==='register'||S.page==='verify_email';
  const sbEl=document.getElementById('sb');
  if(sbEl) sbEl.style.display=isAuth?'none':'';
  const mainEl=document.querySelector('.main');
  if(mainEl) mainEl.style.marginLeft=isAuth?'0':'';
  // Save sidebar scroll position before re-render
  const sbNav=document.querySelector('.sb-nav');
  const sbScroll=sbNav?sbNav.scrollTop:0;
  try{ if(!isAuth) renderSB(); }catch(e){ console.error('renderSB error:',e); }
  try{ renderPG(); }catch(e){ console.error('renderPG error:',e); }
  bindEv();saveState();
  // Restore sidebar scroll position
  requestAnimationFrame(()=>{
    const sbNav2=document.querySelector('.sb-nav');
    if(sbNav2) sbNav2.scrollTop=sbScroll;
  });
  // Adjust right panel top to clear the actual header height
  requestAnimationFrame(()=>{
    const hdr=document.querySelector('.pg-h');
    const rp=document.querySelector('.rpanel');
    if(hdr&&rp){
      const h=hdr.getBoundingClientRect().bottom;
      rp.style.top=h+8+'px';
      rp.style.maxHeight='calc(100vh - '+(h+20)+'px)';
    }
    // Position expand button below header
    const rpExp=document.querySelector('.rpanel-expand');
    if(rpExp&&hdr){
      rpExp.style.top=(hdr.getBoundingClientRect().bottom+12)+'px';
    }
    // Sync sidebar header height with main page header
    const sbHead=document.querySelector('.sb-head');
    if(sbHead&&hdr){
      sbHead.style.minHeight=hdr.offsetHeight+'px';
    }
  });
  // Trigger asset grouping demo animation if exposure panel is open with standalone items
  if(S.resultTab==='exposure'&&S._aePanel){
    setTimeout(()=>{ if(document.getElementById('aeDemoCursor')) aeRunDemoAnim(); },400);
  }
  // Trigger portfolio drag-drop demo on first visit with 2+ funds
  if(S.page==='portfolio'){
    setTimeout(()=>{ if(document.getElementById('pfFundName0')&&document.getElementById('pfFundHdr1')) pfRunDemoAnim(); },600);
  }
}

let _sbAllCollapsed=false; // tracks last bulk action for button label

function sbCollapseAll(){
  if(_sbAllCollapsed){
    // Expand all
    if(window._sbFundKeys) window._sbFundKeys.forEach(k=>{ S.sbOpen[k]=true; });
    _sbAllCollapsed=false;
  } else {
    // Collapse all

      ${_userRole==='admin'?`<div class="sb-it ${S.page==='admin'?'act':''}" onclick="goAdmin()"><span class="ic">👤</span><span>사용자 관리</span></div>
      <div class="sb-it ${S.page==='admin_portfolio'?'act':''}" onclick="go('admin_portfolio')"><span class="ic">📋</span><span>Portfolio 관리</span></div>`:''}
      ${notices.length?`<div class="sb-div"></div><div class="sb-gl" style="display:flex;align-items:center;justify-content:space-between">
        <span>Notices (${window._sbFilteredCount!==undefined?window._sbFilteredCount:notices.length})</span>

      </div>`:''}
    </div>
    <nav class="sb-nav">
      ${(()=>{
        if(!notices.length) return '';
        // Favorites filter: show only subscribed funds
        let _sbNotices=notices;
        if(S._favoritesActive && favs.length){
          _sbNotices=notices.filter(n=>{
            const fk=(n.header.Fund_ID_Key||'').toLowerCase();
            return favs.some(f=>f.toLowerCase()===fk);
          });
        }
        window._sbFilteredCount=_sbNotices.length;
        if(!_sbNotices.length) return '<div style="padding:12px;font-size:11px;color:var(--t3);text-align:center">Favorites에 해당하는 Notice가 없습니다</div>';
        // Phase 1: LP_code-based Fund Alias — legacy fallback only (same as buildTree)
        const _sbHasFundIdKey=_sbNotices.some(n=>n.header.Fund_ID_Key);
        const _sbAliasMap={};
        if(!_sbHasFundIdKey){
          const _sbLpToFund={};
          _sbNotices.forEach(n=>{
            const fFull=n.header.Underlying_Fund_Name_full||n.header.Underlying_Fund_Name_short||'Unknown';
            const fKey=normalizeFundName(fFull)||fFull;
            const lpCode=n.header.LP_code||'';
            if(lpCode){
              if(!_sbLpToFund[lpCode]) _sbLpToFund[lpCode]=new Map();
              if(!_sbLpToFund[lpCode].has(fKey)||fFull.length>_sbLpToFund[lpCode].get(fKey))
                _sbLpToFund[lpCode].set(fKey,fFull.length);
            }
          });
          Object.values(_sbLpToFund).forEach(m=>{
            if(m.size<=1)return;
            const entries=[...m.entries()].sort((a,b)=>b[1]-a[1]);
            const canonical=entries[0][0];
            entries.slice(1).forEach(([alias])=>{_sbAliasMap[alias]=canonical;});
          });
        }

        // Phase 2: Group by Fund → LP (2-tier, matching buildTree)
        const fundGroups={};
        _sbNotices.forEach(n=>{
          const fFull=n.header.Underlying_Fund_Name_full||n.header.Underlying_Fund_Name_short||'Unknown';
          const fShort=n.header.Underlying_Fund_Name_short||n.header.Underlying_Fund_Name_full||'Unknown';
          let fKey=getFundKey(n.header);
          fKey=_sbAliasMap[fKey]||fKey;
          if(!fundGroups[fKey]) fundGroups[fKey]={fFull,fShort,lps:{},count:0};
          if(fFull.length>fundGroups[fKey].fFull.length){fundGroups[fKey].fFull=fFull;fundGroups[fKey].fShort=fShort;}
          fundGroups[fKey].count++;

          const _sbLpRawFull=n.header.LP_Name_full||n.header.LP_Name_short||'';
          const _sbLpRawShort=n.header.LP_Name_short||n.header.LP_Name_full||'';
          const _sbLpIsNA=!_sbLpRawFull||_sbLpRawFull==='N/A'||_sbLpRawFull==='Unknown LP';
          const lpFull=_sbLpIsNA?(_sbLpRawFull||'Unknown LP'):_sbLpRawFull;
          const lpShort=_sbLpIsNA?(n.header.LP_code||_sbLpRawShort||'Unknown LP'):(_sbLpRawShort||_sbLpRawFull);
          const lpKey=n.header.LP_code||normalizeLpName(lpFull)||lpFull;
          if(!fundGroups[fKey].lps[lpKey]) fundGroups[fKey].lps[lpKey]={lpFull,lpShort,lpCode:n.header.LP_code||'',notices:[]};
          fundGroups[fKey].lps[lpKey].notices.push(n);
        });

        // Register short names for display
        Object.values(fundGroups).forEach(fg=>{
          regName(S.nameReg.fund, fg.fFull, fg.fShort);
          Object.values(fg.lps).forEach(lp=>regName(S.nameReg.lp, lp.lpFull, lp.lpShort));
        });

        const sbSorted=Object.entries(fundGroups).sort((a,b)=>{
          const na=S.nameReg.fund[a[1].fFull]||a[1].fShort;
          const nb=S.nameReg.fund[b[1].fFull]||b[1].fShort;
          return na.localeCompare(nb,undefined,{sensitivity:'base'});
        });
        window._sbFundKeys=sbSorted.map(e=>e[0]);
        return sbSorted.map(([fKey,fg],fi)=>{
          const isOpen=S.sbOpen[fKey]!==false;
          const dispName=S.nameReg.fund[fg.fFull]||fg.fShort;
          const lpEntries=Object.entries(fg.lps);
          const multiLp=lpEntries.length>1;

          return`<div class="sb-fund">
            <div class="sb-fund-h" onclick="toggleSbFund(${fi})">
              <span class="sb-arrow ${isOpen?'open':''}">▶</span>
              <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escH(fg.fFull)}">${escH(dispName)}</span>
              <span class="sb-cnt">${fg.count}</span>
            </div>
            ${isOpen?`<div class="sb-fund-notices">
              ${lpEntries.map(([lpKey,lp])=>{
                const _sbLpNA2=!lp.lpFull||lp.lpFull==='N/A'||lp.lpFull==='Unknown LP';
                const lpDispName=_sbLpNA2?(lp.lpCode||'N/A'):(S.nameReg.lp[lp.lpFull]||lp.lpShort);
                const lpLabel=(!_sbLpNA2&&lp.lpCode)?lpDispName+' · '+lp.lpCode:lpDispName;
                const sorted=lp.notices.slice().sort((a,b)=>{
                  const da=fmtDate(a.header.issue_date||a.header.due_date||'');
                  const db=fmtDate(b.header.issue_date||b.header.due_date||'');
                  return da.localeCompare(db);
                });
                return`${multiLp?`<div style="padding:3px 10px 2px 26px;font-size:11px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px" title="${escH(lp.lpFull)}"><span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:var(--slate-d);color:var(--slate);font-size:8px;font-weight:700;text-align:center;line-height:12px;margin-right:3px;vertical-align:middle">LP</span>${escH(lpLabel)}</div>`:''}
                ${sorted.map(n=>{
                  const isPendingLp=!!n.header._pending_lp;
                  const due=isPendingLp?'LP 입력 대기':fmtDate(n.header.issue_date||n.header.due_date||'N/A');
                  const st=isPendingLp?'none':getNoticeStatus(n);
                  const statusDot=isPendingLp?'<span style="font-size:8px;font-weight:600;color:var(--amber);background:var(--amber-d);padding:0 4px;border-radius:2px;line-height:14px;flex-shrink:0">LP</span>'
                    :st==='pass'?''
                    :st==='fixable'?'<span style="width:7px;height:7px;border-radius:50%;background:var(--amber);display:inline-block;flex-shrink:0;animation:pulse 1.5s ease infinite"></span>'
                    :st==='fail'?'<span style="width:7px;height:7px;border-radius:50%;background:var(--red);display:inline-block;flex-shrink:0"></span>'
                    :'<span style="width:7px;height:7px;border-radius:50%;border:1.5px solid var(--t3);display:inline-block;flex-shrink:0"></span>';
                  const isSuperseding=n.header.voids_prior_notice&&n.header.voids_prior_notice!=='N/A'&&!n.is_voided;
                  const supersedeBadge=isSuperseding?'<span style="font-size:8px;font-weight:700;color:var(--amber);background:var(--amber-d);padding:0 3px;border-radius:2px;line-height:14px;flex-shrink:0" title="이 Notice는 이전 Notice를 대체(Amend)합니다">Amd</span>':'';
                  return`<div class="sb-notice ${S.page==='result'&&S.activeNoticeId===n.id?'act':''} ${n.is_voided?'voided':''}" onclick="viewNotice('${n.id}'${st==='fixable'?',true':''})">
                    <span class="n-icon">${nIcon(n)}</span>
                    <span class="n-text" style="${n.is_voided?'text-decoration:line-through;opacity:.5':''}${isPendingLp?'color:var(--amber);font-style:italic':''}">${due}</span>
                    ${supersedeBadge}${statusDot}
                  </div>`;
                }).join('')}`;
              }).join('')}
            </div>`:''}
          </div>`;
        }).join('');
      })()}
    </nav>
    <div class="sb-foot">
      ${_session?`<div style="font-size:11px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:8px;padding:0 2px" title="${escH(_session.user?.email||'')}">${escH(_session.user?.email||'')}</div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <button class="btn btn-sm btn-s" style="flex:1;font-size:11px;padding:5px 0;${S.page==='settings'?'background:var(--bg4);font-weight:600':''}" onclick="go('settings')">⚙ 설정</button>
        <button class="btn btn-sm btn-s" style="flex:1;font-size:11px;padding:5px 0;color:var(--t3)" onclick="doLogout()">로그아웃</button>
        ${_userRole==='admin'?'<span style="font-size:9px;color:var(--indigo);font-weight:700;background:var(--indigo-d);padding:3px 7px;border-radius:3px;flex-shrink:0">ADMIN</span>'
          :_userRole==='viewer'?'<span style="font-size:9px;color:var(--slate);font-weight:700;background:var(--slate-d);padding:3px 7px;border-radius:3px;flex-shrink:0">VIEWER</span>'
          :'<span style="font-size:9px;color:var(--teal);font-weight:700;background:var(--teal-d);padding:3px 7px;border-radius:3px;flex-shrink:0">UPLOADER</span>'}
      </div>`:''}
      <div style="padding:0 2px">
        ${S.connected?'<span style="color:var(--teal);font-size:11px">● 연결됨</span>':'<span style="color:var(--red);font-size:11px">● 연결 안됨</span>'}
      </div>
    </div>`;
}

function go(p){
  if(p==='upload'&&!S.connected)return;
  if(p==='portfolio'&&!S.notices.length&&_userRole!=='admin')return;
  // Restore own notices when leaving admin user view
  if(S._adminViewUser && S._savedNotices){
    S.notices=S._savedNotices;
    S._savedNotices=null;
    S._adminViewUser=null;
  }
  S.page=p;R();
}

function goAdmin(){
  // Restore own notices first
  if(S._adminViewUser && S._savedNotices){
    S.notices=S._savedNotices;
    S._savedNotices=null;
    S._adminViewUser=null;
  }
  S._adminUsers=[]; // clear cache to trigger fresh load
  S.page='admin';R();
}
function toggleSbFund(idx){const k=window._sbFundKeys[idx];S.sbOpen[k]=S.sbOpen[k]===false?true:false;R();}
function viewNotice(id,autoCorrect){
  const n=S.notices.find(x=>x.id===id);

  // ── Pending LP notice: show LP code input popup instead of result page ──
  if(n && n.header._pending_lp){
    const ml={
      noticeId: n.id,
      investorIds: n.header._investor_ids||[],
      fundPreview: n.header._fund_preview||n.header.Underlying_Fund_Name_full||'',
      pageCount: n.page_count||0,
    };
    // Create a synthetic job for the popup
    const syntheticJob={
      id: 'defer_'+n.id,
      fileName: n.fileName,
      status: 'multi_lp',
      _multiLp: ml,
      _deferredNoticeId: n.id,  // track placeholder for deletion after parsing
    };
    S.showMultiLp={job: syntheticJob};
    _multiLpRows=[{code:'',mode:'select'}];
    R();
    return;
  }

  if(S.activeNoticeId!==id){S.qaMessages=[];_pdfNoticeId=null;}
  S.page='result';S.activeNoticeId=id;S.activeTab='validation';
  if(n){_pdfNoticeId=id;_pdfPage=1;_pdfPageCount=n.page_count||0;}
  R();
  if(autoCorrect)runAutoCorrection();
}

function renderPG(){
  const h=document.getElementById('ph'),b=document.getElementById('pb');
  // Auth pages — no sidebar needed
  if(S.page==='login'||S.page==='register'||S.page==='verify_email'){
    h.innerHTML='';
    if(S.page==='register'&&!window._regOrgs){
      fetch(`${API}/api/organizations`).then(r=>r.json()).then(d=>{window._regOrgs=d;R();}).catch(()=>{});
    }
    b.innerHTML=pgAuth();
    return;
  }
  switch(S.page){
    case'settings':h.innerHTML='<h1>설정</h1><p>서버 연결 · AI 모델 · Temperature</p>';b.innerHTML=pgSettings();loadGeminiModels();break;
    case'upload':h.innerHTML='<h1>PDF 업로드</h1><p>Notice PDF를 업로드하면 자동 분석 후 누적 관리됩니다</p>';b.innerHTML=pgUpload();if(_userRole==='admin'&&!S._adminOrgs.length)loadAdminOrgs();break;
    case'portfolio':h.innerHTML=`<h1>Portfolio Overview</h1><p>${S.notices.length}건의 Notice · Fund → LP → Class 계층 구조</p>`;b.innerHTML=(_userRole==='admin'?pgAdminOrgCards():'')+pgPortfolio();if(_userRole==='admin'){if(!S._adminOrgs.length)loadAdminOrgs();if(!S.notices.length&&!S._adminOrgFilter)adminFilterOrg('all');}break;
    case'favorites':h.innerHTML='<h1>★ 담당 펀드 설정</h1><p>관심 펀드를 선택하면 사이드바에 해당 펀드의 Notice만 표시됩니다</p>';b.innerHTML=pgFavorites();break;
    case'result':renderResultPG(h,b);break;
    case'admin':h.innerHTML='<h1>사용자 관리</h1><p>가입된 사용자 목록 및 데이터 관리</p>';b.innerHTML=pgAdmin();if(!S._adminUsers.length)loadAdminUsers();break;
    case'admin_portfolio':h.innerHTML='<h1>📋 Portfolio 관리</h1><p>Notice의 기관 배정을 관리합니다</p>';b.innerHTML=pgAdminPortfolio();if(!S._noticeOrgMap)loadNoticeOrgMap();break;
  }
  // Global popups — render regardless of current page
  let globalPopups='';
  if(S.showMultiLp) globalPopups+=rMultiLpPopup();
  if(S.showDuplicate && S.page!=='result') globalPopups+=rDuplicatePopup();
  if(S.showLpMove) globalPopups+=rLpMovePopup();
  if(S.showFundMerge) globalPopups+=rFundMergePopup();
  if(S._orgAssign) globalPopups+=rOrgAssignPopup();
  if(S._lpEdit) globalPopups+=rLpEditPopup();
  if(S._exportPopup) globalPopups+=rExportPopup();
  if(globalPopups){
    let gp=document.getElementById('_globalPopups');
    if(!gp){gp=document.createElement('div');gp.id='_globalPopups';document.body.appendChild(gp);}
    gp.innerHTML=globalPopups;
  } else {
    const gp=document.getElementById('_globalPopups');
    if(gp) gp.innerHTML='';
  }
}

async function doAuthSubmit(){
  const email=(document.getElementById('authEmail')?.value||'').trim();
  const pw=document.getElementById('authPw')?.value||'';
  const errEl=document.getElementById('authError');
  const btn=document.getElementById('authBtn');
  function showErr(msg){if(errEl){errEl.textContent=msg;errEl.style.display='block';}}

  if(!email||!pw){showErr('이메일과 비밀번호를 입력해주세요');return;}

  if(S.page==='register'){
    const pw2=document.getElementById('authPw2')?.value||'';
    const orgSel=document.getElementById('authOrg')?.value||'';
    const orgCustom=(document.getElementById('authOrgCustom')?.value||'').trim();
    const nameEnLast=(document.getElementById('authNameEnLast')?.value||'').trim();
    const nameEnFirst=(document.getElementById('authNameEnFirst')?.value||'').trim();
    const nameKrLast=(document.getElementById('authNameKrLast')?.value||'').trim();
    const nameKrFirst=(document.getElementById('authNameKrFirst')?.value||'').trim();
    if(pw.length<8){showErr('비밀번호는 8자 이상이어야 합니다');return;}
    if(pw!==pw2){showErr('비밀번호가 일치하지 않습니다');return;}
    if(!nameEnLast||!nameEnFirst){showErr('영문 이름을 입력해주세요');return;}
    if(!nameKrLast||!nameKrFirst){showErr('한글 이름을 입력해주세요');return;}
    if(!orgSel){showErr('소속기관을 선택해주세요');return;}
    if(orgSel==='_custom'&&!orgCustom){showErr('기관명을 입력해주세요');return;}
    if(btn)btn.disabled=true;
    const res=await doRegister(email,pw);
    if(btn)btn.disabled=false;
    if(res.error){showErr(res.error);return;}
    if(res.needsConfirmation){S.page='verify_email';R();return;}
    // Register org + name
    try{
      const orgBody=orgSel==='_custom'?{org_name:orgCustom}:{org_id:orgSel};
      orgBody.name_en_last=nameEnLast;
      orgBody.name_en_first=nameEnFirst;
      orgBody.name_kr_last=nameKrLast;
      orgBody.name_kr_first=nameKrFirst;
      await authFetch(`${API}/api/auth/register-org`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(orgBody)});
    }catch(e){console.warn('Org registration:',e);}
    S.page='upload';R();await loadFromBackend();return;
  }

  // Login
  if(btn)btn.disabled=true;
  const res=await doLogin(email,pw);
  if(btn)btn.disabled=false;
  if(res.error){showErr(res.error);return;}
  S.page='upload';
  R();  // Show upload page immediately before loading data
  await loadFromBackend();
}

function pgFavorites(){

    const fk=(n.header.Fund_ID_Key||'').toLowerCase();
    const fn=n.header.Underlying_Fund_Name_short||n.header.Underlying_Fund_Name_full||fk;
    if(fk){

      fundMap[fk].count++;
      if(fn.length>fundMap[fk].name.length) fundMap[fk].name=fn;

  const funds=Object.entries(fundMap).sort((a,b)=>a[1].name.localeCompare(b[1].name));

async function execOrgAssign(mode){
  const d=S._orgAssign; if(!d) return;
  const cbs=document.querySelectorAll('.oa-cb:not(:disabled)');
  const selected=[];
  cbs.forEach(cb=>{if(cb.checked)selected.push(cb.dataset.org);});
  if(!selected.length){alert('기관을 선택해주세요');return;}

  try{
    if(mode==='move'){
      if(selected.length>1){alert('이동은 1개 기관만 선택 가능합니다');return;}
      if(!confirm(`이 Notice를 "${(S._adminOrgs||[]).find(o=>o.id===selected[0])?.name||selected[0]}"(으)로 이동하시겠습니까?`))return;
      await authFetch(`${API}/api/admin/notices/${d.noticeId}/move`,{
        method:'PUT',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({org_id:selected[0]})
      });
      // Update local state
      const n=S.notices.find(x=>x.id===d.noticeId);
      if(n) n._raw_org_id=selected[0];
    } else {
      if(!confirm(`이 Notice를 ${selected.length}개 기관에 복사하시겠습니까?`))return;
      const resp=await authFetch(`${API}/api/admin/notices/${d.noticeId}/copy`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({org_ids:selected})
      });
      const result=await resp.json();
      if(result.created&&result.created.length){
        alert(`${result.created.length}개 기관에 복사 완료:\n${result.created.map(c=>c.org_name).join(', ')}`);
      }
    }
    S._orgAssign=null;
    // Reload notices to reflect changes
    await loadFromBackend();
  }catch(e){
    alert('기관 배정 실패: '+e.message);
  }
}

function pgAdminPortfolio(){
  const m=S._noticeOrgMap;
  if(!m) return'<div style="text-align:center;padding:60px;color:var(--t3)">데이터를 불러오는 중...</div>';
  const notices=m.notices||[];
  const orgs=m.orgs||[];
  if(!notices.length) return'<div style="text-align:center;padding:60px;color:var(--t3)">Notice가 없습니다</div>';
  if(!orgs.length) return'<div style="text-align:center;padding:60px;color:var(--t3)">기관이 없습니다</div>';

  // Group by duplicate_key to find which orgs have copies
  const groups={};
  notices.forEach(n=>{
    const gk=n.duplicate_key||n.pdf_hash||n.id;
    if(!groups[gk]) groups[gk]={key:gk,notices:[],fund:'',date:'',type:'',net:null,fileName:''};
    groups[gk].notices.push(n);
    if(!groups[gk].fund) groups[gk].fund=n.fund;
    if(!groups[gk].date) groups[gk].date=n.issue_date;
    if(!groups[gk].type) groups[gk].type=n.notice_type;
    if(groups[gk].net===null) groups[gk].net=n.net_amount;
    if(!groups[gk].fileName) groups[gk].fileName=n.file_name;
  });

  const groupList=Object.values(groups).sort((a,b)=>{
    const fa=a.fund.toLowerCase(),fb=b.fund.toLowerCase();
    if(fa!==fb) return fa.localeCompare(fb);
    return (b.date||'').localeCompare(a.date||'');
  });

  const typeColor=(t)=>t==='Call'?'var(--indigo)':t==='Distribution'?'var(--teal)':'var(--amber)';

  return'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">'
    +'<thead><tr style="background:var(--bg4);border-bottom:2px solid var(--bdr)">'
    +'<th style="padding:8px 10px;text-align:left;font-weight:600;white-space:nowrap">Fund</th>'
    +'<th style="padding:8px 6px;text-align:left;font-weight:600">Date</th>'
    +'<th style="padding:8px 6px;text-align:left;font-weight:600">Type</th>'
    +'<th style="padding:8px 6px;text-align:right;font-weight:600">Net Amount</th>'
    +orgs.map(o=>'<th style="padding:8px 6px;text-align:center;font-weight:600;min-width:80px">'+escH(o.name)+'</th>').join('')
    +'</tr></thead><tbody>'
    +groupList.map(g=>{
      // For each org, find if a notice copy exists
      const orgMap={};
      g.notices.forEach(n=>{ orgMap[n.org_id]=n.id; });
      // Pick a source notice id (any one for copying)
      const sourceId=g.notices[0].id;

      return'<tr style="border-bottom:1px solid var(--bdr);transition:background .1s" onmouseover="this.style.background=\'var(--bg4)\'" onmouseout="this.style.background=\'\'">'
        +'<td style="padding:6px 10px;font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+escH(g.fileName)+'">'+escH(g.fund||g.fileName)+'</td>'
        +'<td style="padding:6px;color:var(--t2)">'+escH(g.date||'')+'</td>'
        +'<td style="padding:6px"><span style="font-size:11px;font-weight:600;color:'+typeColor(g.type)+'">'+escH(g.type||'')+'</span></td>'
        +'<td style="padding:6px;text-align:right;font-family:var(--f);font-variant-numeric:tabular-nums">'+(g.net!=null?fA(g.net):'')+'</td>'
        +orgs.map(o=>{
          const hasIt=!!orgMap[o.id];
          const nid=orgMap[o.id]||sourceId;
          return'<td style="padding:6px;text-align:center">'
            +'<input type="checkbox" '+(hasIt?'checked ':'')+' style="width:16px;height:16px;cursor:pointer" '
            +'onchange="toggleNoticeOrg(\''+nid+'\',\''+o.id+'\',this.checked,\''+sourceId+'\')"'
            +'/></td>';
        }).join('')
        +'</tr>';
    }).join('')
    +'</tbody></table></div>'
    +'<div style="margin-top:12px;font-size:11px;color:var(--t3)">체크박스를 클릭하면 해당 기관에 Notice가 추가/제거됩니다. 같은 Notice의 독립 복사본이 생성됩니다.</div>'
    +'<div style="margin-top:8px"><button class="btn btn-sm btn-s" onclick="S._noticeOrgMap=null;loadNoticeOrgMap()">↻ 새로고침</button></div>';
}

async function toggleNoticeOrg(noticeId, orgId, checked, sourceId){
  try{
    const resp=await authFetch(`${API}/api/admin/notice-org-toggle`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        notice_id: checked ? sourceId : noticeId,
        org_id: orgId,
        action: checked ? 'add' : 'remove'
      })
    });
    const result=await resp.json();
    if(!result.ok && result.detail){
      alert(result.detail);
    }
    // Reload all admin data so Portfolio/sidebar reflect changes
    S._noticeOrgMap=null;
    S._adminOrgs=[];
    await Promise.all([loadNoticeOrgMap(), loadAdminOrgs()]);
    // Reload notices list (so Portfolio page and sidebar update)
    try{
      const orgFilter=S._adminOrgFilter;
      const url=orgFilter&&orgFilter!=='all'?`${API}/api/notices?org_id=${encodeURIComponent(orgFilter)}`:`${API}/api/notices`;
      const nr=await authFetch(url);
      if(nr.ok){
        S.notices=await nr.json();
        S.notices.forEach(n=>{ n._raw_org_id=n.org_id||''; });
        S.notices.forEach(n=>{normalizeNames(n.header);deriveHeaderFields(n.header);});
      }
    }catch(e){}
  }catch(e){
    alert('기관 배정 변경 실패: '+e.message);
    S._noticeOrgMap=null;
    loadNoticeOrgMap();
  }
}

/* ===== PORTFOLIO ===== */
function pgPortfolio(){
  const tree = buildTree();
  const allNotices=S.notices.filter(n=>!n.is_voided);

  // Timeline data
  const dates=allNotices.map(n=>fmtDate(n.header.issue_date||n.header.due_date||'')).filter(d=>d&&d!=='N/A').sort();
  const minYear=dates.length?parseInt(dates[0]):new Date().getFullYear();
  const maxYear=new Date().getFullYear();
  const today=new Date();
  const todayStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

  // Build quarter grid from minYear Q1 to max(current quarter, latest data quarter)
  // No padding quarters — so dots fill to the right edge
  const quarters=[];
  const curQ=Math.ceil((today.getMonth()+1)/3);
  const curY=today.getFullYear();
  // Find the latest date across all notices to ensure grid covers all data
  const maxDate=dates.length?dates[dates.length-1]:'';
  const maxDataYear=maxDate?parseInt(maxDate):curY;
  const maxDataMonth=maxDate?parseInt(maxDate.substring(5,7)):((curQ-1)*3+1);
  const maxDataQ=Math.ceil(maxDataMonth/3);
  // End quarter = whichever is later: current quarter or latest data quarter
  let endY=Math.max(curY,maxDataYear);
  let endQ=(endY===curY&&endY===maxDataYear)?Math.max(curQ,maxDataQ):(endY===curY?curQ:maxDataQ);
  for(let y=minYear;y<=endY;y++) for(let q=1;q<=4;q++){
    quarters.push({y,q,label:q===1?String(y):'Q'+q,start:`${y}-${String((q-1)*3+1).padStart(2,'0')}-01`});
    if(y===endY && q>=endQ) break;
  }

  // Cache for live timeline drag updates
  window._tlCache={tree,quarters,todayStr,totalQ:quarters.length};

  // Timeline zoom range (0=first quarter, 1=last quarter)
  const totalQ=quarters.length;

/* ===== TIMELINE CONTENT BUILDER (for live drag updates) ===== */
function _buildTlContent(){
  const c=window._tlCache;
  if(!c||!c.quarters||!c.tree) return '';
  const {tree,quarters,todayStr,totalQ}=c;

  if(typeof window._tlZoomL==='undefined'){window._tlZoomL=0;window._tlZoomR=1;}
  const zL=Math.max(0,Math.floor(window._tlZoomL*totalQ));
  const zR=Math.min(totalQ,Math.ceil(window._tlZoomR*totalQ));
  const visQ=quarters.slice(zL,zR);
  if(!visQ.length) return '';

  // Quarter-index-based date positioning
  function zDatePos(d){
    if(!d||d==='N/A')return -1;
    const dt=new Date(d);
    if(isNaN(dt.getTime()))return -1;
    const dy=dt.getFullYear(),dm=dt.getMonth()+1;
    const dq=Math.ceil(dm/3);
    const qIdx=visQ.findIndex(q=>q.y===dy&&q.q===dq);
    if(qIdx<0) return -1;
    const qsm=(visQ[qIdx].q-1)*3+1;
    const qs=new Date(dy,qsm-1,1);
    const qem=qsm+3;
    const qe=new Date(qem>12?dy+1:dy,(qem>12?qem-12:qem)-1,1);
    const frac=Math.max(0,Math.min(1,(dt.getTime()-qs.getTime())/(qe.getTime()-qs.getTime())));
    return Math.max(0,Math.min(100,((qIdx+frac)/visQ.length)*100));
  }

  const mw=visQ.length*44;
  let html='';
  // Quarter headers
  html+=`<div style="display:flex">
    <div style="width:220px;min-width:220px;flex-shrink:0"></div>
    <div style="flex:1;min-width:${mw}px;display:flex;border-bottom:1px solid var(--bdr);padding-bottom:4px;margin-bottom:2px">
      ${visQ.map(q=>`<div style="flex:1;min-width:44px;font-size:11px;color:${q.q===1?'var(--t1)':'var(--t3)'};font-weight:${q.q===1?'700':'400'};box-sizing:border-box;${q.q===1?'border-left:1.5px solid var(--t3);padding-left:4px':'border-left:1px solid var(--bdr);padding-left:4px'}">${q.label}</div>`).join('')}
    </div>
  </div>`;
  // Fund+LP rows
  tree.forEach(fund=>{
    const lpRows=[];
    fund.lps.forEach(lp=>{const lpN=[];lp.classes.forEach(cls=>cls.notices.forEach(n=>lpN.push(n)));if(lpN.length)lpRows.push({lp,notices:lpN});});
    const multiLp=lpRows.length>1;
    const gridCells=visQ.map(q=>`<div style="flex:1;min-width:44px;box-sizing:border-box;border-left:1px solid ${q.q===1?'rgba(0,0,0,.1)':'rgba(0,0,0,.04)'}"></div>`).join('');
    if(multiLp){
      html+=`<div style="display:flex;align-items:center;min-height:22px">
        <div style="width:220px;min-width:220px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escH(fund.fullName)}"><span style="font-size:11px;font-weight:600;color:var(--t1)">${escH(fund.displayName)}</span></div>
        <div style="flex:1;min-width:${mw}px;display:flex;height:22px">${gridCells}</div>
      </div>`;
    }
    lpRows.forEach(row=>{
      const lpShort=row.lp.displayName||row.lp.lpCode||'';
      const labelHtml=multiLp
        ?`<span style="font-size:10px;color:var(--t3);padding-left:10px">ㄴ ${escH(lpShort)}</span>`
        :`<span style="font-size:11px;font-weight:600;color:var(--t1)">${escH(fund.displayName)}</span>`;
      const dots=row.notices.map(n=>{
        const d=fmtDate(n.header.issue_date||n.header.due_date||'');
        const pos=zDatePos(d);if(pos<0)return'';
        const tp=n.header.notice_type;
        const col=n.is_voided?'#ccc':(n.header.voids_prior_notice&&n.header.voids_prior_notice!=='N/A')?'var(--amber)':tp==='Call'?'var(--indigo)':tp==='Distribution'?'var(--emerald)':'var(--amber)';
        return`<div onclick="viewNotice('${n.id}')" title="${escH((n.header.notice_title||'Notice')+' · '+d)}" style="position:absolute;left:${pos}%;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;background:${col};cursor:pointer;z-index:2;border:2px solid var(--bg2)" onmouseover="this.style.transform='translate(-50%,-50%) scale(1.4)'" onmouseout="this.style.transform='translate(-50%,-50%)'"></div>`;
      }).join('');
      html+=`<div style="display:flex;align-items:center;min-height:26px">
        <div style="width:220px;min-width:220px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escH(multiLp?row.lp.fullName:fund.fullName)}">${labelHtml}</div>
        <div style="flex:1;min-width:${mw}px;display:flex;height:24px;position:relative">${gridCells}${dots}</div>
      </div>`;
    });
  });
  // Legend
  html+=`<div style="display:flex;gap:14px;margin-top:8px;font-size:11px;color:var(--t3)">
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--indigo);vertical-align:middle;margin-right:3px"></span>Capital Call</span>
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--emerald);vertical-align:middle;margin-right:3px"></span>Distribution</span>
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--amber);vertical-align:middle;margin-right:3px"></span>Adjustment</span>
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#ccc;vertical-align:middle;margin-right:3px"></span>Void</span>
  </div>`;
  return html;
}

/* ===== TIMELINE RANGE SELECTOR ===== */
function _tlRangeDown(e){
  const bar=document.getElementById('_tlRange');
  if(!bar) return;
  const rect=bar.getBoundingClientRect();
  const barW=rect.width;
  const startX=e.clientX;

  const thumb=e.target.closest('[data-thumb]');
  const mode=thumb?thumb.dataset.thumb:'pan';
  const origL=window._tlZoomL, origR=window._tlZoomR;

  // Snap value to nearest quarter boundary
  const tQ=parseInt(bar.dataset.totalq)||20;
  const qStep=1/tQ;
  function snap(v){return Math.round(v*tQ)/tQ;}
  const minSpan=qStep*2;

  function onMove(ev){
    const dx=(ev.clientX-startX)/barW;
    let newL=origL, newR=origR;
    if(mode==='L'){
      newL=snap(Math.max(0,Math.min(origR-minSpan, origL+dx)));
    } else if(mode==='R'){
      newR=snap(Math.min(1,Math.max(origL+minSpan, origR+dx)));
    } else {
      let dl=snap(dx);
      if(origL+dl<0) dl=-snap(origL);
      if(origR+dl>1) dl=snap(1-origR);
      newL=origL+dl;
      newR=origR+dl;
    }
    window._tlZoomL=newL;
    window._tlZoomR=newR;
    // Update selection bar
    const sel=document.getElementById('_tlSel');
    if(sel){sel.style.left=(newL*100)+'%';sel.style.width=((newR-newL)*100)+'%';}
    // Live-update timeline content (no full R() — no flicker)
    const tlEl=document.getElementById('_tlContent');
    if(tlEl) tlEl.innerHTML=_buildTlContent();
  }
  function onUp(){
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    // Final snap
    window._tlZoomL=snap(window._tlZoomL);
    window._tlZoomR=snap(window._tlZoomR);
    if(window._tlZoomR-window._tlZoomL<minSpan) window._tlZoomR=Math.min(1,window._tlZoomL+minSpan);
    // Apply final snap to UI
    const sel=document.getElementById('_tlSel');
    if(sel){sel.style.left=(window._tlZoomL*100)+'%';sel.style.width=((window._tlZoomR-window._tlZoomL)*100)+'%';}
    const tlEl=document.getElementById('_tlContent');
    if(tlEl) tlEl.innerHTML=_buildTlContent();
  }
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
  e.preventDefault();
}

function buildTree(){
  // Phase 1: LP_code-based Fund Alias Resolution — ONLY as legacy fallback
  // If Fund_ID_Key is available (new notices), alias is unnecessary and causes over-merging
  const hasFundIdKey=S.notices.some(n=>n.header.Fund_ID_Key);
  const fundAliasMap={}; // normalizedKey → canonicalKey
  if(!hasFundIdKey){
    const lpCodeToFundKeys={};
    S.notices.forEach(n=>{
      const fFull=n.header.Underlying_Fund_Name_full||n.header.Underlying_Fund_Name_short||'Unknown Fund';
      const fKey=normalizeFundName(fFull)||fFull;
      const lpCode=n.header.LP_code||'';
      if(lpCode){
        if(!lpCodeToFundKeys[lpCode]) lpCodeToFundKeys[lpCode]=new Map();
        if(!lpCodeToFundKeys[lpCode].has(fKey)||fFull.length>lpCodeToFundKeys[lpCode].get(fKey))
          lpCodeToFundKeys[lpCode].set(fKey,fFull.length);
      }
    });
    Object.values(lpCodeToFundKeys).forEach(fKeyMap=>{
      if(fKeyMap.size<=1) return;
      const entries=[...fKeyMap.entries()].sort((a,b)=>b[1]-a[1]);
      const canonical=entries[0][0];
      entries.slice(1).forEach(([alias])=>{fundAliasMap[alias]=canonical;});
    });
  }

  // Phase 2: Group by Fund → LP → Class
  const funds={};
  S.notices.forEach(n=>{
    const fFull=n.header.Underlying_Fund_Name_full||n.header.Underlying_Fund_Name_short||'Unknown Fund';
    const fShort=n.header.Underlying_Fund_Name_short||n.header.Underlying_Fund_Name_full||'Unknown Fund';
    const lpCode=n.header.LP_code||'';
    const _lpRawFull=n.header.LP_Name_full||n.header.LP_Name_short||'';
    const _lpRawShort=n.header.LP_Name_short||n.header.LP_Name_full||'';
    const _lpIsNA=!_lpRawFull||_lpRawFull==='N/A'||_lpRawFull==='Unknown LP';
    const lpFull=_lpIsNA?(_lpRawFull||'Unknown LP'):_lpRawFull;
    const lpShort=_lpIsNA?(lpCode||_lpRawShort||'Unknown LP'):(_lpRawShort||_lpRawFull);
    const cls=n.header.Investment_Class||'LP Interest';
    let fKey=getFundKey(n.header);
    fKey=fundAliasMap[fKey]||fKey;
    const fDisp=S.nameReg.fund[fFull]||fShort;
    if(!funds[fKey])funds[fKey]={fullName:fFull,displayName:fDisp,lps:{},noticeCount:0};
    // Prefer longer display name
    if(fFull.length>funds[fKey].fullName.length){funds[fKey].fullName=fFull;funds[fKey].displayName=S.nameReg.fund[fFull]||fShort;}
    funds[fKey].noticeCount++;
    const lpKey=lpCode||normalizeLpName(lpFull)||lpFull;
    const lpDisp=_lpIsNA?(lpCode||'N/A'):(S.nameReg.lp[lpFull]||lpShort);
    if(!funds[fKey].lps[lpKey])funds[fKey].lps[lpKey]={fullName:lpFull,displayName:lpDisp,lpCode:lpCode,classes:{},noticeCount:0};
    funds[fKey].lps[lpKey].noticeCount++;
    if(!funds[fKey].lps[lpKey].classes[cls])funds[fKey].lps[lpKey].classes[cls]={name:cls,notices:[]};
    funds[fKey].lps[lpKey].classes[cls].notices.push(n);
  });
  return Object.values(funds).map(f=>({
    ...f,lps:Object.values(f.lps).map(lp=>({...lp,classes:Object.values(lp.classes)}))
  })).sort((a,b)=>a.displayName.localeCompare(b.displayName));
}

let _dragNoticeId=null;

function handleNoticeDragStart(e,noticeId){
  _dragNoticeId=noticeId;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',noticeId);
  // Add dragging class after a tick
  setTimeout(()=>{e.target.classList.add('dragging');},0);
}

function handleNoticeDragEnd(e){
  e.target.classList.remove('dragging');
  _dragNoticeId=null;
  // Remove all drag-over highlights
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
}

function handleNoticeDrop(e,fundIdx){
  e.preventDefault();
  if(_isFundDrag) return; // fund drags handled by handleFundHeaderDrop

  const noticeId=_dragNoticeId||e.dataTransfer.getData('text/plain');
  if(!noticeId) return;
  const notice=S.notices.find(n=>n.id===noticeId);
  const targetFund=window._fundBtnNames?.[fundIdx]||window._fundNames?.[fundIdx];
  if(!notice||!targetFund) return;

  // Skip if already in same fund
  if(getFundKey(notice.header)===(targetFund.idKey||makeFundIdKey(targetFund.full))) return;

  const targetIdKey=targetFund.idKey||makeFundIdKey(targetFund.full);
  notice.header.Underlying_Fund_Name_full=targetFund.full;
  notice.header.Underlying_Fund_Name_short=targetFund.short;
  notice.header.Fund_ID_Key=targetIdKey;
  regName(S.nameReg.fund, targetFund.full, targetFund.short);

  // Save to backend
  authFetch(`${API}/api/notices/${noticeId}/header`,{method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({Underlying_Fund_Name_full:targetFund.full,Underlying_Fund_Name_short:targetFund.short,Fund_ID_Key:targetIdKey})}).catch(()=>{});

  _dragNoticeId=null;
  R();
}

function handleFundHeaderDrop(e, targetFundIdx){
  e.preventDefault();
  e.stopPropagation();
  try{
    const raw=e.dataTransfer.getData('text/plain');
    const parsed=JSON.parse(raw);
    if(parsed&&parsed.type==='fund_merge'){
      handleFundMergeDrop(parsed.srcFundIdx, targetFundIdx);
    }
  }catch(err){}
}

function handleFundMergeDrop(srcFundIdx, targetFundIdx){
  if(srcFundIdx===targetFundIdx) return;
  const tree=buildTree();
  if(srcFundIdx<0||srcFundIdx>=tree.length||targetFundIdx<0||targetFundIdx>=tree.length) return;

  const src=tree[srcFundIdx];
  const tgt=tree[targetFundIdx];

  // Count notices
  let srcCount=0,tgtCount=0;
  src.lps.forEach(lp=>lp.classes.forEach(cls=>srcCount+=cls.notices.length));
  tgt.lps.forEach(lp=>lp.classes.forEach(cls=>tgtCount+=cls.notices.length));

  // Get target fund info
  const tgtInfo=window._fundBtnNames?.[targetFundIdx]||{full:tgt.fullName,short:tgt.displayName,idKey:''};
  const tgtIdKey=tgtInfo.idKey||makeFundIdKey(tgtInfo.full);

  S.showFundMerge={
    srcFundIdx, targetFundIdx,
    srcName: src.displayName, srcFull: src.fullName, srcCount,
    tgtName: tgt.displayName, tgtFull: tgt.fullName, tgtCount,
    tgtIdKey, tgtShort: tgt.displayName
  };
  R();
}

function confirmFundMerge(){
  const m=S.showFundMerge; if(!m) return;
  const tree=buildTree();
  const src=tree[m.srcFundIdx];
  if(!src){S.showFundMerge=null;R();return;}

  // Collect source notice IDs
  const srcNoticeIds=new Set();
  src.lps.forEach(lp=>lp.classes.forEach(cls=>cls.notices.forEach(n=>srcNoticeIds.add(n.id))));

  // Update all source notices
  let count=0;
  S.notices.forEach(n=>{
    if(!srcNoticeIds.has(n.id)) return;
    n.header.Fund_ID_Key=m.tgtIdKey;
    n.header.Underlying_Fund_Name_full=m.tgtFull;
    n.header.Underlying_Fund_Name_short=m.tgtShort;
    authFetch(`${API}/api/notices/${n.id}/header`,{method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({Fund_ID_Key:m.tgtIdKey, Underlying_Fund_Name_full:m.tgtFull, Underlying_Fund_Name_short:m.tgtShort})}).catch(()=>{});
    count++;
  });

  S.nameReg.fund[m.tgtFull]=m.tgtShort;
  if(src.fullName!==m.tgtFull) delete S.nameReg.fund[src.fullName];

  S.showFundMerge=null;
  R();
}

function handleNoticeDropOnLp(e, fundIdx, lpIdx){
  e.preventDefault();
  e.stopPropagation(); // prevent bubbling to fund-level drop
  const noticeId=_dragNoticeId||e.dataTransfer.getData('text/plain');
  if(!noticeId) return;
  const notice=S.notices.find(n=>n.id===noticeId);
  if(!notice) return;
  const targetLpInfo=window._fundLpInfo?.[fundIdx]?.[lpIdx];
  if(!targetLpInfo) return;
  const tgtFundInfo=window._fundBtnNames?.[fundIdx];
  if(!tgtFundInfo) return;

  // Check if already in same LP
  const curLpCode=notice.header.LP_code||'';
  const curLpFull=notice.header.LP_Name_full||'';
  const tgtLpCode=targetLpInfo.lpCode||'';
  const tgtLpFull=targetLpInfo.lpNameFull||'';
  const tgtLpShort=targetLpInfo.lpNameShort||'';

  // Same LP? skip
  if(tgtLpCode && curLpCode===tgtLpCode) return;
  if(!tgtLpCode && curLpFull===tgtLpFull) return;

  // Build change summary
  const changes=[];
  const curFundFull=notice.header.Underlying_Fund_Name_full||'';
  const tgtFundFull=tgtFundInfo.full||'';
  const tgtFundShort=tgtFundInfo.short||'';
  const tgtFundIdKey=tgtFundInfo.idKey||makeFundIdKey(tgtFundFull);

  const isCrossFund=(getFundKey(notice.header)!==tgtFundIdKey);
  if(isCrossFund){
    changes.push({field:'Fund', from:curFundFull||'N/A', to:tgtFundFull});
  }
  if(curLpFull!==tgtLpFull && tgtLpFull){
    changes.push({field:'LP Name', from:curLpFull||'N/A', to:tgtLpFull});
  }
  if(tgtLpShort && (notice.header.LP_Name_short||'')!==tgtLpShort){
    changes.push({field:'LP Short', from:notice.header.LP_Name_short||'N/A', to:tgtLpShort});
  }
  if(tgtLpCode && curLpCode!==tgtLpCode){
    changes.push({field:'LP Code', from:curLpCode||'N/A', to:tgtLpCode});
  }

  if(!changes.length) return; // nothing to change

  S.showLpMove={
    noticeId, notice,
    fundIdx, lpIdx,
    targetFundFull:tgtFundFull, targetFundShort:tgtFundShort, targetFundIdKey:tgtFundIdKey,
    targetLpFull:tgtLpFull, targetLpShort:tgtLpShort, targetLpCode:tgtLpCode,
    isCrossFund, changes,
    noticeName: notice.header.notice_title || notice.fileName || noticeId,
    noticeDate: fmtDate(notice.header.issue_date||notice.header.due_date||'') || 'N/A',
    targetLpDisplay: targetLpInfo.displayName || tgtLpFull || tgtLpCode || 'N/A',
  };
  _dragNoticeId=null;
  R();
}

function confirmLpMove(){
  const m=S.showLpMove; if(!m) return;
  const n=S.notices.find(x=>x.id===m.noticeId);
  if(!n){S.showLpMove=null;R();return;}

  // Apply changes
  const updates={};
  if(m.isCrossFund){
    n.header.Underlying_Fund_Name_full=m.targetFundFull;
    n.header.Underlying_Fund_Name_short=m.targetFundShort;
    n.header.Fund_ID_Key=m.targetFundIdKey;
    updates.Underlying_Fund_Name_full=m.targetFundFull;
    updates.Underlying_Fund_Name_short=m.targetFundShort;
    updates.Fund_ID_Key=m.targetFundIdKey;
    regName(S.nameReg.fund, m.targetFundFull, m.targetFundShort);
  }
  if(m.targetLpFull){
    n.header.LP_Name_full=m.targetLpFull;
    updates.LP_Name_full=m.targetLpFull;
  }
  if(m.targetLpShort){
    n.header.LP_Name_short=m.targetLpShort;
    updates.LP_Name_short=m.targetLpShort;
  }
  if(m.targetLpCode){
    n.header.LP_code=m.targetLpCode;
    updates.LP_code=m.targetLpCode;
  }
  if(m.targetLpFull) regName(S.nameReg.lp, m.targetLpFull, m.targetLpShort);

  // Re-derive fields after LP change
  normalizeNames(n.header);
  deriveHeaderFields(n.header);
  n._statusCache=null;

  // Save to backend
  authFetch(`${API}/api/notices/${m.noticeId}/header`,{method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(updates)}).catch(()=>{});

  S.showLpMove=null;
  R();
}

/* Switch right panel tab without full R() — avoids flicker */
function switchRightPanel(tab){
  if(S.rightPanel===tab) return;
  S.rightPanel=tab;
  // Update active button
  document.querySelectorAll('.seg-btn').forEach(btn=>{
    const t=btn.textContent.trim();
    const isAct=(t==='PDF'&&tab==='pdf')||(t==='ILPA'&&tab==='ilpa')||(t==='Q&A'&&tab==='qa');
    btn.classList.toggle('act',isAct);
  });
  // Swap content
  const rpanel=document.querySelector('.rpanel');
  if(!rpanel) return;
  const contentArea=rpanel.querySelector('.seg-ctrl');
  if(!contentArea) return;
  // Remove old content (everything after seg-ctrl)
  while(contentArea.nextSibling) contentArea.nextSibling.remove();
  // Render new content
  const n=S.notices.find(x=>x.id===S.activeNoticeId);
  if(!n) return;
  const h=n.header;
  const tmp=document.createElement('div');
  tmp.innerHTML=tab==='ilpa'?rILPA(h):tab==='pdf'?rPdfViewer(n):tab==='qa'?rQaChat(n):'';
  while(tmp.firstChild) rpanel.appendChild(tmp.firstChild);
  // If PDF tab, trigger render
  if(tab==='pdf') setTimeout(()=>pdfRenderPage(),50);
}

/* ===== RIGHT PANEL: PDF VIEWER (Backend Image API) ===== */
let _pdfPage=1, _pdfExpanded=false, _pdfNoticeId=null, _pdfPageCount=0;
let _pdfZoom=100;
let _pdfDoc=null; // current active PDF.js document

// ── LRU PDF Cache (방안 D) ──
const _pdfCache=new Map(); // noticeId → pdfDoc
const PDF_CACHE_MAX=5;

function _pdfCacheGet(noticeId){
  if(!_pdfCache.has(noticeId)) return null;
  const doc=_pdfCache.get(noticeId);
  // Move to end (most recently used)
  _pdfCache.delete(noticeId);
  _pdfCache.set(noticeId, doc);
  return doc;
}

function _pdfCacheSet(noticeId, doc){
  if(_pdfCache.has(noticeId)) _pdfCache.delete(noticeId);
  _pdfCache.set(noticeId, doc);
  // Evict oldest if over limit
  while(_pdfCache.size>PDF_CACHE_MAX){
    const oldest=_pdfCache.keys().next().value;
    _pdfCache.delete(oldest);
  }
}

// ── IndexedDB PDF Cache (방안 G) — 영구 디스크 캐시 ──
const IDB_NAME='lp_pdf_cache', IDB_STORE='pdfs', IDB_VER=1, IDB_MAX=50;
function _idbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(IDB_NAME,IDB_VER);
    r.onupgradeneeded=()=>{const db=r.result;if(!db.objectStoreNames.contains(IDB_STORE))db.createObjectStore(IDB_STORE,{keyPath:'id'});};
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
async function _idbGet(noticeId){
  try{
    const db=await _idbOpen();
    return new Promise(res=>{
      const tx=db.transaction(IDB_STORE,'readonly');
      const req=tx.objectStore(IDB_STORE).get(noticeId);
      req.onsuccess=()=>res(req.result?.data||null);
      req.onerror=()=>res(null);
    });
  }catch(e){return null;}
}
async function _idbSet(noticeId,arrayBuf){
  try{
    const db=await _idbOpen();
    const tx=db.transaction(IDB_STORE,'readwrite');
    const store=tx.objectStore(IDB_STORE);
    store.put({id:noticeId,data:arrayBuf,ts:Date.now()});
    const allReq=store.getAll();
    allReq.onsuccess=()=>{
      const all=allReq.result;
      if(all.length>IDB_MAX){
        all.sort((a,b)=>a.ts-b.ts);
        all.slice(0,all.length-IDB_MAX).forEach(item=>store.delete(item.id));
      }
    };
  }catch(e){}
}
async function _idbDelete(noticeId){
  try{const db=await _idbOpen();const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).delete(noticeId);}catch(e){}
}
