/* ===== LOGIC ===== */
function pN(v){if(v==null||v==='N/A'||v==='')return null;if(typeof v==='number')return v;const c=String(v).replace(/[,$\s]/g,'').replace(/\(([^)]+)\)/,'-$1');const n=parseFloat(c);return isNaN(n)?null:n;}
function rd(n){return n==null?null:Math.round(n*100)/100;}
function fA(v,pad){if(v==null||v==='N/A')return'N/A';const n=typeof v==='number'?v:parseFloat(String(v).replace(/[,$]/g,''));if(isNaN(n))return String(v);const abs=Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});if(n<0)return'('+abs+')';return pad?abs+'<span style="visibility:hidden">)</span>':abs;}
function escH(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

/* Entity normalization for fund/LP grouping */
function normalizeFundName(name){
  if(!name||name==='N/A') return '';
  let s=name;
  s=s.replace(/\(.*?\)/g,'');           // remove parenthetical: (the "Main Fund")
  s=s.replace(/"[^"]*"/g,'');           // remove quoted aliases
  s=s.replace(/\s*[&]\s*.*/g,'');       // remove & parallel entities
  // Legal suffixes ONLY — keep Partners, Fund, Trust, Investment, Capital!
  s=s.replace(/,?\s*\b(L\.?P\.?|LLC|L\.?L\.?C\.?|Ltd\.?|SCSp|SCA|Inc\.?|Corp\.?|Limited)\b/gi,' ');
  // Vehicle/parallel distinguishers — remove so parallel funds merge
  s=s.replace(/\b(Parallel|Lux|Main|Feeder|Onshore|Offshore|Co-?Invest|AIV)\b/gi,'');
  // Roman numerals → Arabic (word-boundary to avoid "Victoria"→"5ictoria")
  const _roman=[['XVIII','18'],['XVII','17'],['XVI','16'],['XV','15'],['XIV','14'],['XIII','13'],['XII','12'],['XI','11'],['X','10'],['IX','9'],['VIII','8'],['VII','7'],['VI','6'],['V','5'],['IV','4'],['III','3'],['II','2']];
  _roman.forEach(([r,a])=>{s=s.replace(new RegExp('\\b'+r+'\\b','g'),a);});
  s=s.replace(/[,.:;'"]/g,'').replace(/\s+/g,' ').trim().toLowerCase();
  s=s.replace(/[\s-]+[a-c]$/,'').trim(); // trailing vehicle letter
  return s;
}
/* Generate Fund_ID_Key from full name (client-side mirror of backend _make_fund_id_key) */
function makeFundIdKey(name){
  if(!name||name==='N/A') return '';
  let s=name;
  s=s.replace(/\(.*?\)/g,'');
  s=s.replace(/"[^"]*"/g,'');
  s=s.replace(/\s*[&]\s*.*/g,'');
  s=s.replace(/,?\s*\b(L\.?P\.?|LLC|L\.?L\.?C\.?|Ltd\.?|SCSp|SCA|Inc\.?|Corp\.?|Limited)\b/gi,'');
  // Vehicle/parallel distinguishers — remove so parallel funds merge
  s=s.replace(/\b(Parallel|Lux|Main|Feeder|Onshore|Offshore|Co-?Invest|AIV)\b/gi,'');
  const _roman=[['XVIII','18'],['XVII','17'],['XVI','16'],['XV','15'],['XIV','14'],['XIII','13'],['XII','12'],['XI','11'],['X','10'],['IX','9'],['VIII','8'],['VII','7'],['VI','6'],['V','5'],['IV','4'],['III','3'],['II','2']];
  _roman.forEach(([r,a])=>{s=s.replace(new RegExp('\\b'+r+'\\b','g'),a);});
  s=s.replace(/[,.:;'"&]/g,'').replace(/\s+/g,' ').trim().toLowerCase();
  s=s.replace(/[\s-]+[a-c]$/,'').trim(); // trailing vehicle letter: -a, -b, -c
  return s;
}
/* Get the Fund grouping key: Fund_ID_Key (AI/server) → fallback to normalizeFundName */
function getFundKey(header){
  return header.Fund_ID_Key||normalizeFundName(header.Underlying_Fund_Name_full)||header.Underlying_Fund_Name_full||'';
}
function normalizeLpName(name){
  if(!name||name==='N/A') return '';
  let s=name;
  s=s.replace(/\(.*?\)/g,'');
  s=s.replace(/"[^"]*"/g,'');
  s=s.replace(/,?\s*(as\s+Trustee\s+for|as\s+Custodian\s+for|f\/b\/o)\s*/gi,' ');
  s=s.replace(/,?\s*(L\.?P\.?|LLC|L\.?L\.?C\.?|Ltd\.?|Inc\.?|Corp\.?|Co\.?|Limited)\s*/gi,' ');
  s=s.replace(/[,.:;'"]/g,'').replace(/\s+/g,' ').trim().toLowerCase();
  return s;
}

/* Normalize asset/investment name for Exposure grouping */
function normalizeAssetName(name){
  if(!name) return '';
  let s=name.trim();
  // 1. SUFFIX parenthetical (transaction-type qualifiers, not general adjectives like "refunded")
  s=s.replace(/\s*\([^)]*(?:Reallocation|Deemed\s+Dist|Return\s+of\s+Capital|Capital\s+Gain|Follow[\s-]*On|Co[\s-]*Invest|Amendment|True[\s-]*Up|Recall(?:able)?|Prior\s+(?:Capital|Dist)|Current\s+(?:Capital|Dist)|Subsequent|Offset)[^)]*\)/gi,'');
  // 1b. Trailing (Dist)/(Distribution)/(Distribut...)
  s=s.replace(/\s*\(Distribut[^)]*\)/gi,'');
  // 2. PREFIX "TransactionType - " (dash/colon separator) — covers:
  //    "Capital Call - X", "Reallocation Call - X", "Current Distribution - X",
  //    "Deemed Distribution - X", "Distribution - X", "Dist - X"
  s=s.replace(/^(?:(?:Reallocation|Current|Deemed)\s+)?(?:(?:Capital\s+)?Call|Distribution|Dist)\s*[-\u2013\u2014:]\s*/i,'');
  // 2b. PREFIX standalone "Reallocation - X"
  s=s.replace(/^Reallocation\s*[-\u2013\u2014:]\s*/i,'');
  // 3. PREFIX "Reallocation of Prior Capital Calls: X", "Return of Capital: X"
  s=s.replace(/^(?:Reallocation\s+of\s+Prior\s+(?:Capital\s+Calls?|Distributions?)|Return\s+of\s+Capital)\s*[-\u2013\u2014:]\s*/i,'');
  // 4. SUFFIX dash qualifiers: "X - Ticking Fee", "X - Reallocation", etc.
  s=s.replace(/\s+[-\u2013\u2014]\s+(?:Ticking\s+Fee|Reallocation|Return|Deemed|True[\s-]*Up|Recall|Current|Prior|Subsequent|Distribution|Capital\s+Call).*$/i,'');
  // 5. Standalone (Dist)/(Distribution)
  s=s.replace(/\s*\((?:Dist|Distribution)\)\s*$/gi,'');
  return s.trim();
}

/* Format date string to yyyy-mm-dd */
function fmtDate(s){
  if(!s||s==='N/A') return 'N/A';
  const d=new Date(s);
  if(!isNaN(d.getTime())){
    const y=d.getFullYear();
    const m=String(d.getMonth()+1).padStart(2,'0');
    const dd=String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${dd}`;
  }
  // Try manual parse for formats like "May 30, 2025" or "30 May 2025"
  const cleaned=s.trim();
  // Already yyyy-mm-dd
  if(/^\d{4}-\d{2}-\d{2}$/.test(cleaned)) return cleaned;
  return s; // return as-is if unparseable
}

/* Subtotal detection: AI classification + client-side sum-matching + commitment info */
function detectSubtotals(items){
  // Step 0: Mark commitment/balance info rows (NOT transaction items)
  const commitKw=/^(capital\s*commitment|recallable\s*capital|previous\s*capital\s*contribution|remaining\s*commitment|unfunded\s*commitment|total\s*commitment|current\s*contribution\s*to\s*be|cumulative\s*(contribution|distribution|capital))/i;
  items.forEach(it=>{
    if(!it.is_subtotal && commitKw.test((it.item_name||'').trim())){
      it.is_subtotal=true;
      it._subtotal_reason='commitment_info';
    }
  });

  // Step 1: keyword-based subtotal reinforcement
  const subKw=/^(gross|net|total|subtotal|amount\s*(due|payable|receivable))/i;
  items.forEach(it=>{
    if(!it.is_subtotal && subKw.test((it.item_name||'').trim())){
      it._kw_suspect=true; // keyword suspect, will verify with sum-match
    }
  });
  // Step 2: sum-matching — for each item, check if its abs amount = sum of some subset of non-subtotal items
  const nonSub=items.filter(it=>!it.is_subtotal && !it._kw_suspect);
  const subsetSums=new Set();
  // Generate all possible subset sums of nonSub absolute amounts (practical for <20 items)
  if(nonSub.length>0 && nonSub.length<=20){
    const amts=nonSub.map(it=>Math.abs(pN(it.LP_signed_amount)||0));
    const n=amts.length;
    for(let mask=1;mask<(1<<n);mask++){
      let s=0;for(let j=0;j<n;j++)if(mask&(1<<j))s+=amts[j];
      subsetSums.add(rd(s));
    }
  }
  items.forEach(it=>{
    if(it.is_subtotal) return; // AI already classified
    const absAmt=Math.abs(pN(it.LP_signed_amount)||0);
    if(absAmt===0) return;
    const matchesSubset=subsetSums.has(rd(absAmt));
    if(it._kw_suspect && matchesSubset){
      it.is_subtotal=true;
      it._subtotal_reason='keyword+sum_match';
    } else if(it._kw_suspect){
      // keyword match but no sum match — could still be subtotal, flag for review
      it.is_subtotal=true;
      it._subtotal_reason='keyword_only';
    }
    delete it._kw_suspect;
  });
}

/* Filter: get only real items (excluding subtotals) */
function realItems(items){ return (items||[]).filter(it=>!it.is_subtotal); }

function cV1(h,items){
  const ri=realItems(items);
  const net=pN(h.LP_net_amount);if(net===null||!ri.length)return{s:'skip',sc:0,sd:0,c:0,e:net,d:null};
  let sc=0,sd=0;ri.forEach(it=>{const a=pN(it.LP_signed_amount);if(a==null)return;it.Transaction_type==='call'?sc+=a:it.Transaction_type==='distribution'?sd+=a:0;});
  const c=sc+sd,d=rd(c-net);return{s:Math.abs(d)<.015?'pass':'fail',sc:rd(sc),sd:rd(sd),c:rd(c),e:net,d};
}
function cV2(h,items){
  const ri=realItems(items);
  const uP=pN(h.Unfunded_prior),uA=pN(h.Unfunded_after);if(uP==null||uA==null)return{s:'skip',uP,sca:0,c:null,e:uA,d:null};
  let s=0;ri.forEach(it=>{if(it.Commitment_affecting){const a=pN(it.LP_signed_amount);if(a!=null)s+=a;}});
  const c=rd(uP-s),d=rd(c-uA);return{s:Math.abs(d)<.015?'pass':'fail',uP,sca:rd(s),c,e:uA,d};
}
function genE(v1,v2,h){
  const f=h.Underlying_Fund_Name_full||'[Fund]',n=h.notice_number||'[#]',g=h.Underlying_Fund_GP_Name||'[GP]';
  let iss=[];if(v1.s==='fail')iss.push(`1. Net Amount: items sum (${fA(v1.c)}) ≠ Net (${fA(v1.e)}). Diff: ${fA(v1.d)}.`);
  if(v2.s==='fail')iss.push(`${iss.length+1}. Unfunded: prior (${fA(v2.uP)}) adjusted ≠ after (${fA(v2.e)}). Diff: ${fA(v2.d)}.`);
  return`Dear ${g} Team,\n\nRe: ${f} — ${n}\n\nRegarding the notice dated ${h.issue_date||'[Date]'}:\n\n${iss.join('\n\n')}\n\nPlease review.\n\nDue: ${h.due_date||'[Due]'}.\n\nBest regards,\n[Name]\n[Institution]`;
}

/* ===== BRUTE-FORCE VALIDATION SOLVERS ===== */

/* Generate combinations of size k from array indices [0..n-1] */
function* combos(n,k){
  if(k>n||k<=0) return;
  const idx=Array.from({length:k},(_,i)=>i);
  while(true){
    yield idx.slice();
    let i=k-1;
    while(i>=0 && idx[i]===n-k+i) i--;
    if(i<0) return;
    idx[i]++;
    for(let j=i+1;j<k;j++) idx[j]=idx[j-1]+1;
  }
}

/*
 * V1 Solver: find minimal type flips so Σ(signed) = netAmount
 * Flipping call↔dist = flipping sign, so delta_i = -2 * signed_amount_i
 */
function solveV1(items, netAmount){
  const ri=realItems(items);
  if(!ri.length || netAmount===null) return null;
  let currentSum=0;
  ri.forEach(it=>{const a=pN(it.LP_signed_amount);if(a!=null)currentSum+=a;});
  const gap=rd(currentSum-netAmount);
  if(Math.abs(gap)<0.02) return null; // already pass

  const n=ri.length;
  const maxFlips = n>40 ? 10 : n;
  const amts=ri.map(it=>pN(it.LP_signed_amount)||0);
  const deltas=amts.map(a=>rd(-2*a));

  for(let k=1;k<=maxFlips;k++){
    for(const combo of combos(n,k)){
      let dSum=0;
      for(const idx of combo) dSum+=deltas[idx];
      if(Math.abs(rd(dSum+gap))<0.02){
        // Found! Map back to original item indices
        return combo.map(ci=>{
          const it=ri[ci];
          const origIdx=(items||[]).indexOf(it);
          const newType=it.Transaction_type==='call'?'distribution':'call';
          const newSigned=rd(-amts[ci]);
          return{origIdx,itemName:it.item_name,oldType:it.Transaction_type,newType,oldSigned:amts[ci],newSigned};
        });
      }
    }
  }
  return n>40?'timeout':null;
}

/*
 * V2 Solver: find minimal commit flips so Unfunded_prior - Σ(CA signed) = Unfunded_after
 * Flipping CA Y→N: delta = +signed (removed from CA sum → computed increases)
 * Flipping CA N→Y: delta = -signed (added to CA sum → computed decreases)
 */
function solveV2(items, unfundedPrior, unfundedAfter){
  const ri=realItems(items);
  if(!ri.length || unfundedPrior===null || unfundedAfter===null) return null;
  let caSum=0;
  ri.forEach(it=>{if(it.Commitment_affecting){const a=pN(it.LP_signed_amount);if(a!=null)caSum+=a;}});
  const computed=rd(unfundedPrior-caSum);
  const gap=rd(computed-unfundedAfter);
  if(Math.abs(gap)<0.02) return null;

  const n=ri.length;
  const maxFlips = n>40 ? 10 : n;
  const amts=ri.map(it=>pN(it.LP_signed_amount)||0);
  // delta: what happens to computed (=uP - caSum) when we flip this item's CA
  const deltas=ri.map((it,i)=>{
    if(it.Commitment_affecting) return rd(amts[i]);   // Y→N: remove from CA → computed += amt
    else return rd(-amts[i]);                          // N→Y: add to CA → computed -= amt
  });

  for(let k=1;k<=maxFlips;k++){
    for(const combo of combos(n,k)){
      let dSum=0;
      for(const idx of combo) dSum+=deltas[idx];
      if(Math.abs(rd(dSum+gap))<0.02){
        return combo.map(ci=>{
          const it=ri[ci];
          const origIdx=(items||[]).indexOf(it);
          const newCA=!it.Commitment_affecting;
          return{origIdx,itemName:it.item_name,oldCA:it.Commitment_affecting,newCA};
        });
      }
    }
  }
  return n>40?'timeout':null;
}

/* Run both solvers and show correction popup */
function runAutoCorrection(){
  const n=S.notices.find(x=>x.id===S.activeNoticeId);
  if(!n)return;
  const h=n.header, items=n.lineItems;
  const v1=cV1(h,items), v2=cV2(h,items);

  let v1Fix=null, v2Fix=null;
  if(v1.s==='fail') v1Fix=solveV1(items, pN(h.LP_net_amount));
  // After hypothetically applying V1 fix, solve V2
  if(v2.s==='fail') v2Fix=solveV2(items, pN(h.Unfunded_prior), pN(h.Unfunded_after));

  // Calculate after-correction validation
  const simItems=items.map(it=>({...it})); // clone
  if(v1Fix && v1Fix!=='timeout'){
    v1Fix.forEach(f=>{
      simItems[f.origIdx].Transaction_type=f.newType;
      simItems[f.origIdx].LP_signed_amount=f.newSigned;
      simItems[f.origIdx].LP_cashDirection=f.newType==='call'?'outflow':'inflow';
    });
  }
  if(v2Fix && v2Fix!=='timeout'){
    v2Fix.forEach(f=>{simItems[f.origIdx].Commitment_affecting=f.newCA;});
  }
  const v1After=cV1(h,simItems), v2After=cV2(h,simItems);

  S.showCorrection={noticeId:S.activeNoticeId, v1Fix, v2Fix,
    v1Before:v1, v1After, v2Before:v2, v2After,
    totalChanges:((v1Fix&&v1Fix!=='timeout')?v1Fix.length:0)+((v2Fix&&v2Fix!=='timeout')?v2Fix.length:0)};
  R();
}

/* Apply correction */
function applyCorrection(){
  const c=S.showCorrection;if(!c)return;
  const n=S.notices.find(x=>x.id===c.noticeId);if(!n)return;

  // Apply to current notice
  _applyCorrectionToNotice(n, c);

  // Batch: apply auto-correction to all other notices if checkbox checked
  const batchEl=document.getElementById('corrBatchCheck');
  if(batchEl&&batchEl.checked){
    let batchCount=0;
    S.notices.forEach(other=>{
      if(other.id===n.id||other.is_voided) return;
      const oh=other.header, oi=other.lineItems;
      const ov1=cV1(oh,oi), ov2=cV2(oh,oi);
      if(ov1.s==='pass'&&ov2.s==='pass') return; // already pass
      let changed=false;
      if(ov1.s==='fail'){
        const fix=solveV1(oi, pN(oh.LP_net_amount));
        if(fix&&fix!=='timeout'){
          fix.forEach(f=>{
            oi[f.origIdx].Transaction_type=f.newType;
            oi[f.origIdx].LP_signed_amount=f.newSigned;
            oi[f.origIdx].LP_cashDirection=f.newType==='call'?'outflow':'inflow';
            oi[f.origIdx].LP_absolute_amount=Math.abs(f.newSigned);
          });
          changed=true;
        }
      }
      if(ov2.s==='fail'){
        const fix=solveV2(oi, pN(oh.Unfunded_prior), pN(oh.Unfunded_after));
        if(fix&&fix!=='timeout'){
          fix.forEach(f=>{oi[f.origIdx].Commitment_affecting=f.newCA;});
          changed=true;
        }
      }
      if(changed){
        other._statusCache=null;other._statusCacheHash=null;
        authFetch(`${API}/api/notices/${other.id}/items`,{method:'PUT',headers:{'Content-Type':'application/json'},
          body:JSON.stringify(oi)}).catch(e=>console.warn('Batch save failed:',e));
        batchCount++;
      }
    });
    if(batchCount>0) console.log(`[Batch correction] ${batchCount} notices auto-corrected`);
  }

  S.showCorrection=null;
  R();
}

function _applyCorrectionToNotice(n, c){
  if(c.v1Fix && c.v1Fix!=='timeout'){
    c.v1Fix.forEach(f=>{
      n.lineItems[f.origIdx].Transaction_type=f.newType;
      n.lineItems[f.origIdx].LP_signed_amount=f.newSigned;
      n.lineItems[f.origIdx].LP_cashDirection=f.newType==='call'?'outflow':'inflow';
      n.lineItems[f.origIdx].LP_absolute_amount=Math.abs(f.newSigned);
    });
  }
  if(c.v2Fix && c.v2Fix!=='timeout'){
    c.v2Fix.forEach(f=>{n.lineItems[f.origIdx].Commitment_affecting=f.newCA;});
  }
  n._statusCache=null;n._statusCacheHash=null;
  // Save to backend
  authFetch(`${API}/api/notices/${n.id}/items`,{method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(n.lineItems)}).catch(e=>console.warn('Save failed:',e));
}

/* ===== NAME REGISTRY ===== */
/* Register a full→short name mapping. Returns the canonical short name. */
function regName(registry, fullName, aiShortName){
  if(!fullName || fullName==='N/A') return aiShortName||'N/A';
  const full=fullName.trim();
  // Case-insensitive lookup: check if this full name (or a case variant) is already registered
  if(registry[full]) return registry[full];
  const fullLower=full.toLowerCase();
  for(const k in registry){
    if(k.toLowerCase()===fullLower) return registry[k];
  }

  // Reject generic / non-unique AI short names
  const genericNames=new Set(['combined fund','the fund','main fund','parallel fund','lux fund','fund','the partnership','partnership','n/a','unknown','lp','investor','trust','the trust']);
  const aiLower=(aiShortName||'').trim().toLowerCase();
  const isGeneric=!aiShortName||aiShortName==='N/A'||aiShortName===full||genericNames.has(aiLower);

  let short;
  if(!isGeneric){
    short=aiShortName.trim();
  } else {
    // Auto-generate from full name: strip legal suffixes + parenthetical, keep core
    short=full
      .replace(/\(.*?\)/g,'')
      .replace(/"[^"]*"/g,'')
      .replace(/\s*[&]\s*.*/g,'')
      .replace(/,?\s*(L\.?P\.?|LLC|L\.?L\.?C\.?|Ltd\.?|SCSp|SCA|Inc\.?|Corp\.?|Limited)\s*/gi,' ')
      .replace(/[,.:;'"]/g,'')
      .replace(/\s+/g,' ')
      .trim();
    // If still too long (>40 chars), abbreviate further
    if(short.length>40) short=short.substring(0,40).trim();
    if(!short) short=full;
  }

  // Check for collision: different full name → same short name
  const existingShorts=Object.values(registry);
  if(existingShorts.includes(short)){
    let suffix=2;
    let candidate=short+' ('+suffix+')';
    while(existingShorts.includes(candidate)){suffix++;candidate=short+' ('+suffix+')';}
    short=candidate;
  }
  registry[full]=short;
  return short;
}

/*
 * Refine LP display names within each fund:
 * When multiple LPs exist in the same fund and names are long (>20 chars),
 * emphasize DISTINCTIVE parts rather than common parts.
 *
 * Example: same fund has "Standard Chartered Bank Korea Limited"
 *          and "Standard Chartered Bank Hong Kong Branch"
 *   → common: "Standard Chartered Bank"
 *   → distinctive: "Korea" vs "Hong Kong"
 *   → short: "SCB Korea" vs "SCB Hong Kong"
 */
const _LEGAL_LP_SUFFIX=/\b(L\.?P\.?|LLC|L\.?L\.?C\.?|Ltd\.?|Inc\.?|Corp\.?|Co\.?|Limited|Pte|Private|Public|Branch|Trust|Trustee|Custodian)\b/gi;

function refineLpDisplayNames(){
  // Group LP full names by fund key
  const fundLps={}; // fundKey → Set of LP full names
  S.notices.forEach(n=>{
    const fk=getFundKey(n.header);
    const lpFull=n.header.LP_Name_full;
    if(!fk||!lpFull||lpFull==='N/A') return;
    if(!fundLps[fk]) fundLps[fk]=new Set();
    fundLps[fk].add(lpFull);
  });

  Object.entries(fundLps).forEach(([fk, lpSet])=>{
    const lpFullNames=[...lpSet];
    if(lpFullNames.length<2) return; // only 1 LP → keep original regName

    // Tokenize all LP names: remove legal suffixes, parenthetical, punctuation
    const tokenize=name=>{
      return name.replace(/\(.*?\)/g,'').replace(_LEGAL_LP_SUFFIX,'')
        .replace(/[,.:;'"]/g,'').split(/\s+/).map(w=>w.trim()).filter(w=>w.length>0);
    };
    const allTokenized=lpFullNames.map(name=>tokenize(name));
    const allTokenizedLower=allTokenized.map(tokens=>tokens.map(t=>t.toLowerCase()));

    // Find tokens common to ALL LP names
    const commonLower=new Set(allTokenizedLower[0]);
    allTokenizedLower.slice(1).forEach(tokens=>{
      const ts=new Set(tokens);
      commonLower.forEach(t=>{if(!ts.has(t)) commonLower.delete(t);});
    });

    // If nothing is common, or everything is common, skip
    if(commonLower.size===0) return;

    // Build abbreviated prefix from common tokens (e.g., "Standard Chartered Bank" → "SCB")
    const commonAbbrev=[...commonLower].map(t=>t.charAt(0).toUpperCase()).join('');

    // For each LP, extract distinctive tokens (preserving original case)
    lpFullNames.forEach((fullName, i)=>{
      const origTokens=allTokenized[i];
      const distinctive=origTokens.filter(w=>!commonLower.has(w.toLowerCase()));

      if(distinctive.length===0) return; // all tokens are common → can't differentiate

      let shortName=distinctive.join(' ');

      // If distinctive part is very short, prepend abbreviated common for context
      if(shortName.length<5 && commonAbbrev.length>=2){
        shortName=commonAbbrev+' '+shortName;
      }
      // If still too long, truncate
      if(shortName.length>30) shortName=shortName.substring(0,30).trim();

      // Update registry: only if current short name is long (>20ch = probably just truncated full name)
      // and our distinctive version is meaningfully shorter
      const current=S.nameReg.lp[fullName]||'';
      if(shortName && shortName.length>1 && current.length>20 && shortName.length<current.length){
        S.nameReg.lp[fullName]=shortName;
      }
    });
  });
}

/* Normalize names in a parsed header using the global registry */
function normalizeNames(header){
  // Fund_ID_Key: generate if missing (legacy notices from before this feature)
  if(!header.Fund_ID_Key || header.Fund_ID_Key==='N/A'){
    header.Fund_ID_Key=makeFundIdKey(header.Underlying_Fund_Name_full||'');
  }
  // voids_prior_date: extract from void description text if missing (legacy notices)
  if(header.voids_prior_notice && header.voids_prior_notice!=='N/A' && (!header.voids_prior_date || header.voids_prior_date==='N/A')){
    const parsed=_extractDatesFromText(String(header.voids_prior_notice).toLowerCase());
    if(parsed.length) header.voids_prior_date=parsed[0];
  }
  // Fund name
  const fundFull=header.Underlying_Fund_Name_full;
  if(fundFull && fundFull!=='N/A'){
    header.Underlying_Fund_Name_short=regName(S.nameReg.fund, fundFull, header.Underlying_Fund_Name_short);
  }
  // LP name — extract beneficiary part for better short name
  const lpFull=header.LP_Name_full;
  if(lpFull && lpFull!=='N/A'){
    const lpShortCandidate=_extractLpBeneficiary(lpFull, header.LP_Name_short);
    header.LP_Name_short=regName(S.nameReg.lp, lpFull, lpShortCandidate);
  }
}

/*
 * Extract the beneficiary (meaningful) part of an LP name.
 * "Standard Chartered Bank as Trustee of PineStreet US Infra Trust No.4" → "PineStreet US Infra Trust No.4"
 * "AAA Bank, as Custodian for BBB Fund LP" → "BBB Fund LP"
 * "AAA f/b/o BBB" → "BBB"
 * If no trustee/custodian pattern found, return the AI short name as-is.
 */
function _extractLpBeneficiary(fullName, aiShort){
  if(!fullName) return aiShort||'';
  // Patterns: "as Trustee of/for", "as Custodian of/for", "f/b/o", "FBO", "for benefit of"
  const m=fullName.match(/(?:,?\s*as\s+(?:Trustee|Custodian)\s+(?:of|for)\s+|,?\s*f\/b\/o\s+|,?\s*FBO\s+|,?\s*for\s+(?:the\s+)?benefit\s+of\s+)(.+)/i);
  if(m && m[1]){
    let beneficiary=m[1].trim();
    // Clean up trailing legal suffixes for display
    beneficiary=beneficiary
      .replace(/,?\s*(L\.?P\.?|LLC|Ltd\.?|Inc\.?|Corp\.?|Limited)\s*$/gi,'')
      .replace(/[,.:;'"]+$/,'')
      .trim();
    if(beneficiary.length>3) return beneficiary;
  }
  return aiShort||'';
}

/*
 * Derive missing header fields using commitment identity:
 *   Commitment = Unfunded + CumContrib  (both Prior and After)
 *
 * Also derives: CumContribAfter from Prior + Current_Commit_Contribution
 *               CumDistribAfter from Prior + Current_Commit_Distribution
 *
 * Flags _derived markers so UI can indicate computed vs parsed values.
 */
function deriveHeaderFields(h){
  // --- Cross-notice: borrow Commitment from same fund's other notices ---
  if(pN(h.Commitment_original)==null){
    const thisFund=getFundKey(h);
    const thisLp=(h.LP_code||normalizeLpName(h.LP_Name_full)||'').toLowerCase();
    if(thisFund){
      for(const n of S.notices){
        const nFund=getFundKey(n.header);
        const nLp=(n.header.LP_code||normalizeLpName(n.header.LP_Name_full)||'').toLowerCase();
        if(nFund===thisFund && nLp===thisLp && n.header!==h){
          const c=pN(n.header.Commitment_original);
          if(c!=null){ h.Commitment_original=c; h._derived_Commitment_xref=true; break; }
        }
      }
    }
  }

  const C=pN(h.Commitment_original);
  const UP=pN(h.Unfunded_prior);
  const UA=pN(h.Unfunded_after);
  const CCP=pN(h.CumContribPrior);
  const CCA=pN(h.CumContribAfter);
  const CDP=pN(h.CumDistribPrior);
  const CDA=pN(h.CumDistribAfter);
  const CC=pN(h.Current_Commit_Contribution);
  const CD=pN(h.Current_Commit_Distribution);

  // --- Prior identity: C = UP + CumContribPrior ---
  if(C!=null && UP!=null && CCP==null){
    h.CumContribPrior=rd(C-UP); h._derived_CumContribPrior=true;
  }
  if(C!=null && CCP!=null && UP==null){
    h.Unfunded_prior=rd(C-CCP); h._derived_Unfunded_prior=true;
  }
  if(UP!=null && CCP!=null && C==null){
    h.Commitment_original=rd(UP+CCP); h._derived_Commitment=true;
  }

  // --- After identity: C = UA + CumContribAfter ---
  const C2=pN(h.Commitment_original); // may have been derived above
  if(C2!=null && UA!=null && CCA==null){
    h.CumContribAfter=rd(C2-UA); h._derived_CumContribAfter=true;
  }
  if(C2!=null && CCA!=null && UA==null){
    h.Unfunded_after=rd(C2-CCA); h._derived_Unfunded_after=true;
  }

  // --- CumContribAfter from Prior + Current Contribution ---
  const CCP2=pN(h.CumContribPrior);
  const CCA2=pN(h.CumContribAfter);
  if(CCP2!=null && CC!=null && CCA2==null){
    h.CumContribAfter=rd(CCP2+CC); h._derived_CumContribAfter=true;
  }
  // --- CumDistribAfter from Prior + Current Distribution ---
  if(CDP!=null && CD!=null && CDA==null){
    h.CumDistribAfter=rd(CDP+Math.abs(CD)); h._derived_CumDistribAfter=true;
  }

  // --- Cross-check: if both parsed and derivable, flag mismatch ---
  if(C!=null && UP!=null && CCP!=null && !h._derived_CumContribPrior){
    const expected=rd(C-UP);
    if(Math.abs(expected-CCP)>0.02) h._mismatch_prior_identity=rd(expected-CCP);
  }
  if(C!=null && UA!=null && pN(h.CumContribAfter)!=null && !h._derived_CumContribAfter){
    const expected=rd(C-UA);
    if(Math.abs(expected-pN(h.CumContribAfter))>0.02) h._mismatch_after_identity=rd(expected-pN(h.CumContribAfter));
  }
}

/* Edit fund display name — user can rename how a fund appears everywhere */
function editFundName(fundIdx, fullName, currentShort){
  const newName=prompt('펀드 표시명 수정\n\n원래 이름: '+fullName+'\n현재 표시명: '+currentShort+'\n\n새 표시명:', currentShort);
  if(!newName || !newName.trim() || newName.trim()===currentShort) return;
  const trimmed=newName.trim();

  // Find Fund_ID_Key for this fund group
  const tree=buildTree();
  const fund=tree[fundIdx];
  if(!fund) return;
  let fundIdKey='';
  fund.lps.forEach(lp=>lp.classes.forEach(cls=>cls.notices.forEach(n=>{
    if(!fundIdKey && n.header.Fund_ID_Key) fundIdKey=n.header.Fund_ID_Key;
  })));
  if(!fundIdKey) fundIdKey=makeFundIdKey(fullName);

  // Update registry
  S.nameReg.fund[fullName]=trimmed;

  // Sync ALL notices in this fund group (by Fund_ID_Key match)
  S.notices.forEach(n=>{
    const nKey=n.header.Fund_ID_Key||makeFundIdKey(n.header.Underlying_Fund_Name_full||'');
    if(nKey===fundIdKey){
      n.header.Underlying_Fund_Name_short=trimmed;
      n.header.Underlying_Fund_Name_full=fullName;
      authFetch(`${API}/api/notices/${n.id}/header`,{method:'PUT',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({Underlying_Fund_Name_short:trimmed, Underlying_Fund_Name_full:fullName})}).catch(()=>{});
    }
  });
  R();
}

function editLpInfo(fundIdx, lpIdx){
  if(_userRole==='viewer') return;
  const tree=buildTree();
  const fund=tree[fundIdx];
  if(!fund) return;
  const lp=fund.lps[lpIdx];
  if(!lp) return;

  // Gather all notices for this LP
  const lpNotices=[];
  lp.classes.forEach(c=>c.notices.forEach(n=>lpNotices.push(n)));

  const curFull=lpNotices[0].header.LP_Name_full||'';
  const curShort=lpNotices[0].header.LP_Name_short||lp.displayName||'';

  // Show popup
  S._lpEdit={fundIdx, lpIdx, curFull, curShort, curCode, fundKey, noticeIds:lpNotices.map(n=>n.id)};
  R();
}

/* 숫자를 Excel용 raw number로 변환 (HTML 태그 없이) */

  return n!=null?n:null;
}

/* 같은 Fund+LP notices 수집 (날짜순) */
function _exFundLpNotices(notice){
  const h=notice.header;
  const fundKey=getFundKey(h);
  const lpCode=h.LP_code||'';
  const lpFull=h.LP_Name_full||'';
  return S.notices.filter(x=>{
    if(getFundKey(x.header)!==fundKey) return false;
    if(lpCode) return (x.header.LP_code||'')===lpCode;
    return (x.header.LP_Name_full||'')===lpFull;
  }).sort((a,b)=>(fmtDate(a.header.issue_date||'')).localeCompare(fmtDate(b.header.issue_date||'')));
}

/* Notice 시트 생성 (1건) */
function _exNoticeSheet(notice){
  const h=notice.header;
  const rows=[];
  // Header section
  rows.push(['Fund Name', h.Underlying_Fund_Name_full||h.Underlying_Fund_Name_short||'N/A']);
  rows.push(['Notice Type', h.notice_type||'N/A']);
  rows.push(['Notice Title', h.notice_title||'']);
  rows.push(['Notice Number', h.notice_number||'']);
  rows.push(['Issue Date', fmtDate(h.issue_date)||'N/A']);
  rows.push(['Due Date', fmtDate(h.due_date)||'N/A']);
  rows.push(['LP Name', h.LP_Name_full||h.LP_Name_short||'N/A']);
  rows.push(['LP Code', h.LP_code||'N/A']);
  rows.push(['Commitment', _exNum(h.Commitment_original)]);
  rows.push(['LP Interest %', h.pct_LP_Interest!=null?h.pct_LP_Interest:null]);
  rows.push([]);
  rows.push(['--- Prior to Current Notice ---']);
  rows.push(['Unfunded Commitment (Prior)', _exNum(h.Unfunded_prior)]);
  rows.push(['Cumul. Contributions (Prior)', _exNum(h.CumContribPrior)]);
  rows.push(['Cumul. Distributions (Prior)', _exNum(h.CumDistribPrior)]);
  rows.push([]);
  rows.push(['--- Current Notice ---']);
  rows.push(['Current Contributions', _exNum(h.Current_Commit_Contribution)]);
  rows.push(['Current Distributions', _exNum(h.Current_Commit_Distribution)]);
  rows.push(['LP Net Amount', _exNum(h.LP_net_amount)]);
  rows.push([]);
  rows.push(['--- After Current Notice ---']);
  rows.push(['Unfunded Commitment (After)', _exNum(h.Unfunded_after)]);
  rows.push(['Cumul. Contributions (After)', _exNum(h.CumContribAfter)]);
  rows.push(['Cumul. Distributions (After)', _exNum(h.CumDistribAfter)]);
  rows.push([]);
  rows.push([]);

  // Line Items section
  const ri=realItems(notice.lineItems||[]);
  rows.push(['#', 'Item Name', 'LP Amount', 'Type', 'Commitment Affecting']);
  ri.forEach((it,i)=>{
    rows.push([i+1, it.item_name||'', _exNum(it.LP_signed_amount), it.Transaction_type==='call'?'Call':'Distribution', it.Commitment_affecting?'Yes':'No']);
  });
  rows.push([]);

  // Summary
  let caCallS=0,caDistS=0,ncCallS=0,ncDistS=0;
  ri.forEach(it=>{
    const a=pN(it.LP_signed_amount);if(a==null)return;
    const isCall=it.Transaction_type==='call';
    const isCa=it.Commitment_affecting;
    if(isCa&&isCall)caCallS+=a;else if(isCa&&!isCall)caDistS+=a;
    else if(!isCa&&isCall)ncCallS+=a;else ncDistS+=a;
  });
  rows.push(['Summary']);
  rows.push(['', 'Commitment Affecting - Calls', rd(caCallS)]);
  rows.push(['', 'Commitment Affecting - Distributions', rd(caDistS)]);
  rows.push(['', 'Commitment Affecting - Subtotal', rd(caCallS+caDistS)]);
  rows.push(['', 'Non-Commitment - Calls', rd(ncCallS)]);
  rows.push(['', 'Non-Commitment - Distributions', rd(ncDistS)]);
  rows.push(['', 'Non-Commitment - Subtotal', rd(ncCallS+ncDistS)]);
  rows.push(['', 'Total Calls', rd(caCallS+ncCallS)]);
  rows.push(['', 'Total Distributions', rd(caDistS+ncDistS)]);
  rows.push(['', 'Net Amount', rd(caCallS+caDistS+ncCallS+ncDistS)]);

  return rows;
}

/* Exposure 시트 — AI 그룹화 반영 + Subtotal */
function _exExposureSheet(notice){
  const h=notice.header;
  const fundKey=getFundKey(h);
  const lpCode=h.LP_code||'';
  const lpFull=h.LP_Name_full||'';

  const allFundLp=_exFundLpNotices(notice);
  const nLen=allFundLp.length;

  // Collect raw items
  const rawItems=[];
  allFundLp.forEach((n,ni)=>{
    if(n.is_voided) return;
    realItems(n.lineItems||[]).forEach(it=>{
      const raw=it.item_name||'';
      if(!raw) return;
      rawItems.push({raw, amt:pN(it.LP_signed_amount)||0, ni});
    });
  });

  // Grouping logic (same as rExposure)
  const aiGroups=S._assetGroups[fundKey]||null;
  const overrides=S._assetGroupOverrides[fundKey]||{};
  const aiReverse={};
  if(aiGroups){
    Object.entries(aiGroups).forEach(([canonical, members])=>{
      (members||[]).forEach(m=>{ aiReverse[m]=canonical; });
    });
  }
  function getCanonical(rawName){
    if(overrides[rawName]) return overrides[rawName];
    if(aiReverse[rawName]) return aiReverse[rawName];
    return normalizeAssetName(rawName)||rawName;
  }

  // Build grouped data: canonical → { rawMap: { rawName → [amounts per notice] } }
  const groups={};
  rawItems.forEach(({raw, amt, ni})=>{
    const key=getCanonical(raw);
    if(!groups[key]) groups[key]={rawMap:{}};
    if(!groups[key].rawMap[raw]) groups[key].rawMap[raw]=new Array(nLen).fill(0);
    groups[key].rawMap[raw][ni]+=amt;
  });

  const canonicals=Object.keys(groups).sort((a,b)=>a.localeCompare(b,undefined,{sensitivity:'base'}));

  // Build header row
  const headerRow=['Canonical Group', 'Raw Item Name'];
  allFundLp.forEach((n,ni)=>{
    const d=fmtDate(n.header.issue_date||n.header.due_date||'');
    const tp=n.header.notice_type||'';
    headerRow.push(`#${ni+1} ${d} (${tp})`);
  });
  headerRow.push('Total');

  const rows=[];
  rows.push([`Asset Exposure Matrix — ${h.Underlying_Fund_Name_short||h.Underlying_Fund_Name_full||''} / ${h.LP_Name_short||h.LP_Name_full||''}`]);
  rows.push([]);
  rows.push(headerRow);

  const grandTotal=new Array(nLen).fill(0);

  canonicals.forEach(canonical=>{
    const g=groups[canonical];
    const rawNames=Object.keys(g.rawMap).sort();
    const groupTotal=new Array(nLen).fill(0);

    rawNames.forEach(raw=>{
      const amts=g.rawMap[raw];
      const row=[canonical, raw];
      let rowTotal=0;
      amts.forEach((a,ni)=>{
        row.push(a!==0?rd(a):null);
        groupTotal[ni]+=a;
        grandTotal[ni]+=a;
        rowTotal+=a;
      });
      row.push(rd(rowTotal));
      rows.push(row);
    });

    // Subtotal 행 — raw name이 2개 이상인 그룹만
    if(rawNames.length>1){
      const subRow=[`  Subtotal: ${canonical}`, ''];
      let subTotal=0;
      groupTotal.forEach(v=>{subRow.push(rd(v));subTotal+=v;});
      subRow.push(rd(subTotal));
      rows.push(subRow);
    }
  });

  // Grand Total
  const gtRow=['Grand Total', ''];
  let gt=0;
  grandTotal.forEach(v=>{gtRow.push(rd(v));gt+=v;});
  gtRow.push(rd(gt));
  rows.push([]);
  rows.push(gtRow);

  return rows;
}

/* Commitment 시트 */
function _exCommitmentSheet(notice){
  const h=notice.header;
  const fundKey=getFundKey(h);
  const lpCode=h.LP_code||'';
  const lpFull=h.LP_Name_full||'';
  const currency=h.Currency&&h.Currency!=='N/A'?h.Currency:'USD';

  const allNotices=_exFundLpNotices(notice);
  const dataRows=allNotices.filter(x=>!x.is_voided).map((n,i)=>{
    const hh=n.header;
    const commit=pN(hh.Commitment_original);
    const unfPrior=pN(hh.Unfunded_prior);
    const unfAfter=pN(hh.Unfunded_after);
    const funded=(commit!=null&&unfAfter!=null)?commit-unfAfter:null;
    const pct=(commit&&unfAfter!=null)?(1-unfAfter/commit)*100:null;
    let caAmount=0;
    realItems(n.lineItems||[]).forEach(it=>{
      if(it.Commitment_affecting){const a=pN(it.LP_signed_amount);if(a!=null)caAmount+=a;}
    });
    return{idx:i+1,commit,unfPrior,unfAfter,funded,pct:pct!=null?rd(pct):null,caAmount:rd(caAmount),
      date:fmtDate(hh.issue_date||''),type:hh.notice_type,isCurrent:n.id===notice.id};
  });

  // Deltas
  dataRows.forEach((r,i)=>{
    r.deltaPct=(i>0&&r.pct!=null&&dataRows[i-1].pct!=null)?rd(r.pct-dataRows[i-1].pct):(i===0&&r.pct!=null?rd(r.pct):null);
  });

  const latestCommit=dataRows.reduce((v,r)=>r.commit||v,null);
  const latest=dataRows.length?dataRows[dataRows.length-1]:null;
  const latestPct=latest?latest.pct:null;

  const rows=[];
  rows.push([`Commitment History — ${h.Underlying_Fund_Name_full||h.Underlying_Fund_Name_short||''} / ${h.LP_Name_full||h.LP_Name_short||''}`]);
  rows.push([`Commitment: ${latestCommit!=null?latestCommit:'N/A'}`, `Currency: ${currency}`, `Notices: ${dataRows.length}`]);
  rows.push([]);
  rows.push(['#', 'Date', 'Type', 'Unfunded Prior', 'CA Amount', 'Unfunded After', 'Funded', '소진율 (%)', 'Δ (%)']);

  dataRows.forEach(r=>{
    rows.push([
      r.isCurrent?`▶ ${r.idx}`:r.idx,
      r.date||'N/A',
      r.type||'',
      r.unfPrior,
      r.caAmount,
      r.unfAfter,
      r.funded,
      r.pct,
      r.deltaPct
    ]);
  });

  rows.push([]);
  rows.push(['Latest 소진율', latestPct!=null?latestPct+'%':'N/A']);

  return rows;
}

/* 메인 Export 실행 */
async function generateExport(){
  if(typeof XLSX==='undefined'){alert('SheetJS 라이브러리 로드 실패. 페이지 새로고침 후 다시 시도하세요.');return;}
  const d=S._exportPopup; if(!d) return;
  const notice=S.notices.find(x=>x.id===S.activeNoticeId);
  if(!notice){alert('선택된 Notice가 없습니다.');return;}

  const h=notice.header;
  const fundShort=_exSafeFileName(h.Underlying_Fund_Name_short||h.Underlying_Fund_Name_full||'Fund');
  const lpCode=_exSafeFileName(h.LP_code||h.LP_Name_short||'LP');
  const issueDate=fmtDate(h.issue_date)||'undated';

  const isXlsx=d.format==='xlsx';
  const isAll=d.scope==='all';

  try{
    const wb=XLSX.utils.book_new();

    if(!isAll){
      // 현재 Notice만 — 시트 4개
      const noticeWs=XLSX.utils.aoa_to_sheet(_exNoticeSheet(notice));
      _exApplyColWidths(noticeWs, [30,40,18,14,18]);
      XLSX.utils.book_append_sheet(wb, noticeWs, 'Notice');

      const wireWs=XLSX.utils.aoa_to_sheet(_exWireSheetSingle(notice));
      _exApplyColWidths(wireWs, [22,50]);
      XLSX.utils.book_append_sheet(wb, wireWs, 'Wire Info');

      const expWs=XLSX.utils.aoa_to_sheet(_exExposureSheet(notice));
      _exApplyColWidths(expWs, [30,30]);
      XLSX.utils.book_append_sheet(wb, expWs, 'Exposure');

      const cmtWs=XLSX.utils.aoa_to_sheet(_exCommitmentSheet(notice));

    } else {
      // 누적 Notice 모두 — Notice 시트 N개 + Wire/Exposure/Commitment 각 1개
      const allNotices=_exFundLpNotices(notice).filter(x=>!x.is_voided);
      allNotices.forEach((n,i)=>{
        const dt=fmtDate(n.header.issue_date||'');
        const sheetName=`Notice_${i+1}_${(dt||'undated').replace(/\//g,'-')}`.substring(0,31);

      const expWs=XLSX.utils.aoa_to_sheet(_exExposureSheet(notice));
      _exApplyColWidths(expWs, [30,30]);

      const cmtWs=XLSX.utils.aoa_to_sheet(_exCommitmentSheet(notice));
      _exApplyColWidths(cmtWs, [8,14,14,18,18,18,18,12,10]);
      XLSX.utils.book_append_sheet(wb, cmtWs, 'Commitment');
    }

    const baseName=`${fundShort}_${lpCode}_${isAll?'ALL':issueDate}`;

    if(isXlsx){
      // .xlsx 직접 다운로드
      XLSX.writeFile(wb, `${baseName}.xlsx`);
    } else {
      // .csv — 시트별 개별 CSV를 ZIP으로 묶기
      if(typeof JSZip==='undefined'){alert('JSZip 라이브러리 로드 실패.');return;}
      const zip=new JSZip();
      wb.SheetNames.forEach(name=>{
        const csv=XLSX.utils.sheet_to_csv(wb.Sheets[name]);
        zip.file(`${name}.csv`, csv);
      });
      const blob=await zip.generateAsync({type:'blob'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download=`${baseName}.zip`;
      document.body.appendChild(a);a.click();
      setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
    }

    S._exportPopup=null;
    R();
  }catch(e){
    console.error('Export failed:', e);
    alert('Export 실패: '+e.message);
  }
}

/* Merge this fund into another fund group — unifies Fund_ID_Key so they group together */
function mergeFund(srcFundIdx){
  const tree=buildTree();
  if(srcFundIdx<0||srcFundIdx>=tree.length) return;
  const src=tree[srcFundIdx];

  // Collect all notice IDs in source fund
  const srcNoticeIds=new Set();
  src.lps.forEach(lp=>lp.classes.forEach(cls=>cls.notices.forEach(n=>srcNoticeIds.add(n.id))));

  // Build list of other funds
  const others=tree.filter((_,i)=>i!==srcFundIdx);
  if(!others.length){alert('병합할 다른 펀드가 없습니다.');return;}

  const choices=others.map((f,i)=>`${i+1}. ${f.displayName} (${f.noticeCount}건)`).join('\n');
  const input=prompt(`"${src.displayName}" (${srcNoticeIds.size}건)을 다른 펀드에 병합합니다.\n\n병합 대상 번호:\n${choices}`);
  if(!input) return;
  const idx=parseInt(input)-1;
  if(isNaN(idx)||idx<0||idx>=others.length){alert('유효하지 않은 번호입니다.');return;}

  const target=others[idx];
  // Get target's Fund_ID_Key from its first notice
  let targetFundIdKey='', targetFullName=target.fullName, targetShortName=target.displayName;
  target.lps.forEach(lp=>lp.classes.forEach(cls=>cls.notices.forEach(n=>{
    if(!targetFundIdKey && n.header.Fund_ID_Key) targetFundIdKey=n.header.Fund_ID_Key;
  })));
  if(!targetFundIdKey) targetFundIdKey=makeFundIdKey(targetFullName);

  // Update all source notices to match target
  let count=0;
  S.notices.forEach(n=>{
    if(!srcNoticeIds.has(n.id)) return;
    n.header.Fund_ID_Key=targetFundIdKey;
    n.header.Underlying_Fund_Name_full=targetFullName;
    n.header.Underlying_Fund_Name_short=targetShortName;
    authFetch(`${API}/api/notices/${n.id}/header`,{method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({Fund_ID_Key:targetFundIdKey, Underlying_Fund_Name_full:targetFullName, Underlying_Fund_Name_short:targetShortName})}).catch(()=>{});
    count++;
  });

  S.nameReg.fund[targetFullName]=targetShortName;
  if(src.fullName!==targetFullName) delete S.nameReg.fund[src.fullName];

  alert(`${count}건 Notice → "${targetShortName}" 병합 완료`);
  R();
}

/* Auto-merge duplicate funds detected by same displayName */
function autoMergeDupeFunds(fundIdxs){
  const tree=buildTree();
  if(fundIdxs.length<2) return;

  // Pick the fund with most notices as canonical target
  let maxIdx=fundIdxs[0], maxCount=0;
  fundIdxs.forEach(i=>{
    if(tree[i]&&tree[i].noticeCount>maxCount){maxCount=tree[i].noticeCount;maxIdx=i;}
  });
  const target=tree[maxIdx];
  if(!target) return;

  // Get target's Fund_ID_Key
  let targetIdKey='';
  target.lps.forEach(lp=>lp.classes.forEach(cls=>cls.notices.forEach(n=>{
    if(!targetIdKey && n.header.Fund_ID_Key) targetIdKey=n.header.Fund_ID_Key;
  })));
  if(!targetIdKey) targetIdKey=makeFundIdKey(target.fullName);

  // Collect all notice IDs from non-target funds
  let count=0;
  fundIdxs.forEach(fi=>{
    if(fi===maxIdx) return;
    const src=tree[fi];
    if(!src) return;
    src.lps.forEach(lp=>lp.classes.forEach(cls=>cls.notices.forEach(n=>{
      n.header.Fund_ID_Key=targetIdKey;
      n.header.Underlying_Fund_Name_full=target.fullName;
      n.header.Underlying_Fund_Name_short=target.displayName;
      authFetch(`${API}/api/notices/${n.id}/header`,{method:'PUT',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({Fund_ID_Key:targetIdKey,Underlying_Fund_Name_full:target.fullName,Underlying_Fund_Name_short:target.displayName})}).catch(()=>{});
      count++;
    })));
  });

  S.nameReg.fund[target.fullName]=target.displayName;
  R();
}

/* ===== VOID CROSS-REFERENCING ===== */
/*
 * Strict void matching: a superseding notice voids exactly ONE prior notice.
 * Match criteria (ALL must be true):
 *   1. Same Fund (getFundKey)
 *   2. Same LP (LP_code or normalized LP name)
 *   3. Prior notice's issue_date === voids_prior_date (exact date match)
 *
 * voids_prior_date: extracted by AI from text like "previously issued on August 27, 2025"
 * Fallback: if AI didn't set voids_prior_date, parse it from voids_prior_notice text.
 */
function crossRefVoid(newNoticeId, header){
  const voidDesc=header.voids_prior_notice;
  if(!voidDesc || voidDesc==='N/A' || voidDesc===null) return;

  // Get the target date: AI-extracted or text-parsed fallback
  let targetDate=header.voids_prior_date||'';
  if(!targetDate || targetDate==='N/A'){
    // Fallback: parse date from void description text
    const parsed=_extractDatesFromText(String(voidDesc).toLowerCase());
    targetDate=parsed.length?parsed[0]:'';
  }
  if(!targetDate) return; // Can't void without knowing the prior notice's date

  const newFundKey=getFundKey(header);
  const newLpKey=(header.LP_code||normalizeLpName(header.LP_Name_full)||'').toLowerCase();

  for(const n of S.notices){
    if(n.id===newNoticeId) continue;
    if(n.is_voided) continue;

    // 1. Fund must match
    const nFundKey=getFundKey(n.header);
    if(newFundKey && nFundKey && newFundKey!==nFundKey) continue;

    // 2. LP must match
    const nLpKey=(n.header.LP_code||normalizeLpName(n.header.LP_Name_full)||'').toLowerCase();
    if(newLpKey && nLpKey && newLpKey!==nLpKey) continue;

    // 3. Exact date match: prior notice's issue_date === target date
    const nIso=fmtDate(n.header.issue_date||'');
    if(!nIso || nIso==='N/A') continue;
    if(nIso!==targetDate) continue;

    // All 3 matched — void this notice
    n.is_voided=true;
    n.voided_by=newNoticeId;
    _saveVoidStatus(n);
    console.log(`[VOID] "${header.notice_title||''}" voids "${n.header.notice_title||''}" (issue_date=${nIso}, fund=${nFundKey}, lp=${nLpKey})`);
    return; // Only void ONE notice
  }
}

/* Extract dates from free text like "August 27, 2025" or "27 August 2025" → "2025-08-27" */
const _MONTHS={january:'01',february:'02',march:'03',april:'04',may:'05',june:'06',
  july:'07',august:'08',september:'09',october:'10',november:'11',december:'12'};
function _extractDatesFromText(text){
  const results=[];
  // Pattern 1: "Month DD, YYYY" or "Month DD YYYY"
  const p1=/\b(january|february|march|april|may|june|july|august|september|october|november|december)\s+(\d{1,2}),?\s+(\d{4})\b/gi;
  let m;
  while((m=p1.exec(text))!==null){
    const mm=_MONTHS[m[1].toLowerCase()];
    if(mm) results.push(`${m[3]}-${mm}-${String(m[2]).padStart(2,'0')}`);
  }
  // Pattern 2: "DD Month YYYY"
  const p2=/\b(\d{1,2})\s+(january|february|march|april|may|june|july|august|september|october|november|december)\s+(\d{4})\b/gi;
  while((m=p2.exec(text))!==null){
    const mm=_MONTHS[m[2].toLowerCase()];
    if(mm) results.push(`${m[3]}-${mm}-${String(m[1]).padStart(2,'0')}`);
  }
  // Pattern 3: already ISO "YYYY-MM-DD"
  const p3=/\b(\d{4})-(\d{2})-(\d{2})\b/g;
  while((m=p3.exec(text))!==null){
    results.push(m[0]);
  }
  return results;
}

/* Check if a notice passes all validation */
function isNoticeValid(n){
  const v1=cV1(n.header,n.lineItems);
  const v2=cV2(n.header,n.lineItems);
  return v1.s==='pass'&&v2.s==='pass';
}

/*
 * Tri-state validation status with solver cache:
 * 'pass'    → V1+V2 both pass (green ✓)
 * 'fixable' → fail but brute-force found a fix (yellow ✓)
 * 'fail'    → fail and no fix found (red ✗)
 */
function getNoticeStatus(n){
  if(n.is_voided) return 'void';
  const v1=cV1(n.header,n.lineItems);
  const v2=cV2(n.header,n.lineItems);
  // pass or skip both count as "ok" for sidebar status
  const v1ok=v1.s==='pass'||v1.s==='skip';
  const v2ok=v2.s==='pass'||v2.s==='skip';
  if(v1ok&&v2ok) return 'pass';

  // Use cached result if items haven't changed
  const itemsHash=JSON.stringify(n.lineItems.map(it=>[it.Transaction_type,it.Commitment_affecting,it.LP_signed_amount]));
  if(n._statusCache && n._statusCacheHash===itemsHash) return n._statusCache;

  // Run solvers only for actual failures (not skip)
  let v1Fixable=false, v2Fixable=false;
  if(v1.s==='fail'){
    const v1Fix=solveV1(n.lineItems, pN(n.header.LP_net_amount));
    if(v1Fix && v1Fix!=='timeout') v1Fixable=true;
  }
  if(v2.s==='fail'){
    const v2Fix=solveV2(n.lineItems, pN(n.header.Unfunded_prior), pN(n.header.Unfunded_after));
    if(v2Fix && v2Fix!=='timeout') v2Fixable=true;
  }
  // fixable if at least one failing check has a solution
  const anyFixFound=v1Fixable||v2Fixable;
  const status = anyFixFound ? 'fixable' : 'fail';
  n._statusCache=status;
  n._statusCacheHash=itemsHash;
  return status;
}

function submitLp(){
  const inp=document.getElementById('lpI');
  const v=inp?inp.value.trim():'';if(!v)return;
  const field=inp?inp.getAttribute('data-field'):'name';
  const n=S.notices.find(x=>x.id===S.activeNoticeId);
  if(!n){S.showLpModal=false;R();return;}

  const fundKey=getFundKey(n.header);
  const updated=[n.id];

  if(field==='code'){
    // Inputting LP Code (LP Name already exists)
    n.header.LP_code=v;
    S.notices.forEach(other=>{
      if(other.id===n.id) return;
      if(getFundKey(other.header)!==fundKey) return;
      const lc=other.header.LP_code;
      if(lc&&lc!=='N/A') return;
      other.header.LP_code=v;
      updated.push(other.id);
    });
    updated.forEach(id=>{
      authFetch(`${API}/api/notices/${id}/header`,{method:'PUT',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({LP_code:v})}).catch(()=>{});
    });
  } else {
    // Inputting LP Name (default)
    const shortName=regName(S.nameReg.lp, v, v.length>20?v.substring(0,20)+'...':v);
    n.header.LP_Name_full=v;
    n.header.LP_Name_short=shortName;
    S.notices.forEach(other=>{
      if(other.id===n.id) return;
      if(getFundKey(other.header)!==fundKey) return;
      const lf=other.header.LP_Name_full;
      if(lf && lf!=='N/A' && lf!=='Unknown LP') return;
      other.header.LP_Name_full=v;
      other.header.LP_Name_short=shortName;
      updated.push(other.id);
    });
    updated.forEach(id=>{
      authFetch(`${API}/api/notices/${id}/header`,{method:'PUT',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({LP_Name_full:v, LP_Name_short:shortName})}).catch(()=>{});
    });

  syncNames();
  S.showLpModal=false;R();
}

async function reparseNotice(id){
  if(_userRole==='viewer') return;
  if(!confirm('이 Notice를 저장된 PDF로 재파싱하시겠습니까?\n기존 파싱 결과가 덮어씌워집니다.'))return;
  const oldNotice=S.notices.find(n=>n.id===id);
  const oldFileName=oldNotice?oldNotice.fileName:'';

  // Create a reparse job in the upload queue for progress tracking
  const reparseJob={
    id:'rp_'+id+'_'+Date.now(),
    fileName: oldFileName||id,
    file:null, _file:null,
    status:'processing',
    error:'', errorDetail:'',
    noticeId:id,
    batch:++_batchCounter,
    t0:Date.now(), tReadDone:Date.now(), tParsingStart:null, tApiDone:null, tParseDone:null, tDone:null, tokens:null,
    _isReparse:true,
  };
  S.jobs.push(reparseJob);
  S.page='upload';
  R();

  try{
    const url=`${API}/api/notices/${id}/reparse${S.geminiModel?'?model='+encodeURIComponent(S.geminiModel):''}`;
    const resp=await authFetch(url,{method:'POST'});
    if(!resp.ok){
      const msg=resp.status===404?'PDF 원본 파일이 서버에 없습니다. 재업로드가 필요합니다.':'서버 오류 '+resp.status;
      throw new Error(msg);
    }

    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let buffer='';

    while(true){
      const {done,value}=await reader.read();
      if(done) break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');
      buffer=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: ')) continue;
        let evt;
        try{evt=JSON.parse(line.slice(6).trim());}catch(e){continue;}

        if(evt.stage==='received'){
          reparseJob.status='processing';
          if(!updateJobCard(reparseJob.id)) R();
        }
        else if(evt.stage==='parsing'){
          reparseJob.tParsingStart=Date.now();
          reparseJob.status='processing';
          if(!updateJobCard(reparseJob.id)) R();
        }
        else if(evt.stage==='heartbeat'){
          // Server alive, AI still processing
        }
        else if(evt.stage==='done'){
          // Update notice in-place (same ID)
          const header=evt.header;
          const lineItems=evt.line_items;
          detectSubtotals(lineItems);
          normalizeNames(header);
          deriveHeaderFields(header);
          const n=S.notices.find(x=>x.id===id);
          if(n){
            n.header=header;
            n.lineItems=lineItems;
            n.analyzedAt=new Date().toISOString();
            n.page_count=evt.page_count;
          }
          reparseJob.tApiDone=Date.now();
          reparseJob.tDone=Date.now();
          reparseJob.tokens=evt.tokens;
          reparseJob.status='done';
          reparseJob.noticeId=id;
          // Navigate to result
          S.activeNoticeId=id;
          S.page='result'; S.activeTab='validation';
          R();
          return;
        }
        else if(evt.stage==='multi_lp_detect'){
          reparseJob.tDone=Date.now();
          reparseJob.status='done';
          const ml={noticeId:evt.notice_id, investorIds:evt.investor_ids||[], fundPreview:evt.fund_preview||'', pageCount:evt.page_count||0};
          const syntheticJob={id:'reparse_'+id, fileName:oldFileName, status:'multi_lp', _multiLp:ml};
          S.showMultiLp={job:syntheticJob};
          _multiLpRows=[{code:'',mode:'select'}];
          R();
          return;
        }
        else if(evt.stage==='error'){
          throw new Error(evt.detail||'재파싱 실패');
        }
      }
    }
  }catch(e){
    console.error('Reparse failed:',e);
    reparseJob.status='error';
    reparseJob.tDone=Date.now();
    reparseJob.error='재파싱 실패: '+e.message;
    R();
  }
}

function deleteFund(fi){
  if(_userRole==='viewer') return;
  const ids=window._fundNoticeIds&&window._fundNoticeIds[fi];
  const name=window._fundNames&&window._fundNames[fi];
  if(!ids||!ids.length) return;
  const label=name?name.short||name.full:'이 펀드';
  if(!confirm(`"${label}"의 Notice ${ids.length}건을 모두 삭제하시겠습니까?\n\n이 작업은 되돌릴 수 없습니다.`)) return;
  ids.forEach(id=>{
    authFetch(`${API}/api/notices/${id}`,{method:'DELETE'}).catch(e=>console.warn('Delete failed:',e));
  });
  const idSet=new Set(ids);
  S.notices=S.notices.filter(n=>!idSet.has(n.id));
  if(idSet.has(S.activeNoticeId)){
    S.activeNoticeId=S.notices.length?S.notices[S.notices.length-1].id:null;
    S.page=S.notices.length?'portfolio':'upload';
  }
  R();
}

/* Multi-file handling */
function handleFiles(fileList){
  const files=Array.from(fileList).filter(f=>f.type.includes('pdf'));
  if(!files.length){alert('PDF 파일만 지원합니다.');return;}
  _batchCounter++;
  const batch=_batchCounter;
  const newJobs=files.map(f=>({
    id:'j_'+(++_noticeCounter)+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
    fileName:f.name, file:f, status:'reading', error:'', errorDetail:'', noticeId:null,
    batch, t0:Date.now(), tReadDone:null, tParsingStart:null, tApiDone:null, tParseDone:null, tDone:null, tokens:null,
  }));
  S.jobs.push(...newJobs);
  R();
  newJobs.forEach(job=>uploadToBackend(job));
}

/* Partial DOM update for a single job card — avoids full R() flicker */
function _jobIco(j){return j.status==='done'?'✅':j.status==='error'?'❌':j.status==='processing'?'⏳':j.status==='reading'?'📖':j.status==='pending'?'⏸️':j.status==='duplicate'?'🔁':j.status==='skipped'?'⏭️':j.status==='multi_lp'?'👥':'⏸️';}
function _jobStColor(j){return j.status==='done'?'var(--teal)':j.status==='error'?'var(--red)':j.status==='pending'?'var(--t3)':j.status==='duplicate'?'var(--amber)':j.status==='skipped'?'var(--t3)':j.status==='multi_lp'?'var(--indigo)':'var(--amber)';}
function _jobStText(j){return j.status==='done'?'완료':j.status==='error'?'오류':j.status==='processing'?'AI 분석 중':j.status==='reading'?'서버 전송 중':j.status==='pending'?'대기':j.status==='duplicate'?'중복 감지':j.status==='skipped'?'건너뜀':j.status==='multi_lp'?'LP 선택 대기':'대기';}
function updateJobCard(jobId){
  const el=document.getElementById('job_'+jobId);
  if(!el) return false;
  const j=S.jobs.find(x=>x.id===jobId);
  if(!j) return false;
  const icoEl=el.querySelector('.job-ico');
  if(icoEl) icoEl.textContent=_jobIco(j);
  const stEl=el.querySelector('.job-st');
  if(stEl){stEl.textContent=_jobStText(j);stEl.style.color=_jobStColor(j);}
  const spinEl=el.querySelector('.job-spin');
  if(spinEl) spinEl.style.display=(j.status==='processing'||j.status==='reading')?'':'none';
  return true;
}

async function uploadToBackend(job){
  const MAX_COMM_RETRIES=3;   // 통신 오류 시 최대 재시도
  const RETRY_DELAY_MS=5000;  // 재시도 간격 5초
  const HEARTBEAT_TIMEOUT_MS=30000; // heartbeat 30초 이상 안 오면 통신 끊김 판정
  job._retries=job._retries||0;
  job._gotParsing=false;      // true once 'parsing' SSE received (AI started)
  job._lastHeartbeat=0;       // timestamp of last heartbeat or parsing event

  let _hbChecker=null;        // heartbeat timeout checker interval

  try{
    job.tReadDone=Date.now();
    job.status='processing';
    if(!updateJobCard(job.id)) R();

    const formData=new FormData();
    formData.append('file', job._file||job.file);
    if(S.geminiModel) formData.append('model', S.geminiModel);
    // Admin: pass target org_id
    if(_userRole==='admin'){
      const orgSel=document.getElementById('uploadOrgSelect');
      if(orgSel&&orgSel.value) formData.append('org_id', orgSel.value);
    }
    // Keep file reference for retries — only clear on success
    if(job.file){job._file=job.file;job.file=null;}

    // Create AbortController for timeout
    const abortCtrl=new AbortController();

    // Use SSE stream from backend
    const resp=await authFetch(`${API}/api/upload`,{method:'POST',body:formData,signal:abortCtrl.signal});
    if(!resp.ok){
      const errBody=await resp.text();
      throw new Error(`서버 오류 ${resp.status}: ${errBody.substring(0,200)}`);
    }

    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let buffer='';
    let finalData=null;

    // Start heartbeat checker once we enter parsing stage
    function startHeartbeatChecker(){
      job._lastHeartbeat=Date.now();
      if(_hbChecker) clearInterval(_hbChecker);
      _hbChecker=setInterval(()=>{
        if(!job._gotParsing) return;
        const elapsed=Date.now()-job._lastHeartbeat;
        if(elapsed>HEARTBEAT_TIMEOUT_MS){
          console.warn(`[HB TIMEOUT] No heartbeat for ${(elapsed/1000).toFixed(0)}s — aborting connection`);
          clearInterval(_hbChecker);
          _hbChecker=null;
          abortCtrl.abort();
        }
      },5000);
    }

    while(true){
      const {done,value}=await reader.read();
      if(done) break;
      buffer+=decoder.decode(value,{stream:true});

      // Parse SSE events from buffer
      const lines=buffer.split('\n');
      buffer=lines.pop()||''; // keep incomplete line in buffer
      for(const line of lines){
        if(!line.startsWith('data: ')) continue;
        const jsonStr=line.slice(6).trim();
        if(!jsonStr) continue;
        let evt;
        try{evt=JSON.parse(jsonStr);}catch(e){continue;}

        if(evt.stage==='received'){
          job.status='processing';
          if(!updateJobCard(job.id)) R();
        }
        else if(evt.stage==='parsing'){
          job._gotParsing=true;
          job.tParsingStart=Date.now();
          job.status='processing';
          startHeartbeatChecker();
          if(!updateJobCard(job.id)) R();
        }
        else if(evt.stage==='heartbeat'){
          // Server is alive, Gemini API is still processing
          job._lastHeartbeat=Date.now();
        }
        else if(evt.stage==='exact_duplicate'){
          job.tDone=Date.now();
          job.status='duplicate';
          job._file=null;
          job._dupInfo={type:'exact', existingId:evt.existing_id, existingFileName:evt.existing_file_name, existingDate:evt.existing_date, existingFund:evt.existing_fund, existingNet:evt.existing_net, newNoticeId:null};
          S.showDuplicate={job, info:job._dupInfo};
          R();
          if(_hbChecker){clearInterval(_hbChecker);_hbChecker=null;}
          return;
        }
        else if(evt.stage==='multi_lp_detect'){
          job.status='multi_lp';
          job._file=null;
          job._multiLp={
            noticeId: evt.notice_id,
            investorIds: evt.investor_ids||[],
            fundPreview: evt.fund_preview||'',
            pageCount: evt.page_count||0
          };
          if(_hbChecker){clearInterval(_hbChecker);_hbChecker=null;}
          if(_mlpAutoApply(job)){return;}
          if(!S.showMultiLp){S.showMultiLp={job};}
          R();
          return;
        }
        else if(evt.stage==='duplicate'){
          job.tApiDone=Date.now();
          job.tDone=Date.now();
          job.tokens=evt.tokens;
          job.status='duplicate';
          job._file=null;
          job._dupInfo={type:'content', existingId:evt.existing_id, existingFileName:evt.existing_file_name, existingDate:evt.existing_date, existingFund:evt.existing_fund, existingNet:evt.existing_net, newNoticeId:evt.new_notice_id, header:evt.header, lineItems:evt.line_items, pageCount:evt.page_count};
          S.showDuplicate={job, info:job._dupInfo};
          R();
          if(_hbChecker){clearInterval(_hbChecker);_hbChecker=null;}
          return;
        }
        else if(evt.stage==='done'){
          finalData=evt;
        }
        else if(evt.stage==='error'){
          throw new Error(evt.detail||'서버 처리 실패');
        }
      }
    }

    if(_hbChecker){clearInterval(_hbChecker);_hbChecker=null;}

    if(!finalData) throw new Error('서버 응답이 완료되지 않았습니다.');

    job.tApiDone=Date.now();
    job.tParseDone=Date.now();
    job.tokens=finalData.tokens;
    job._file=null;

    // Store in local state
    const header=finalData.header;
    const lineItems=finalData.line_items;
    detectSubtotals(lineItems);
    normalizeNames(header);
    deriveHeaderFields(header);

    const noticeId=finalData.notice_id;
    S.notices.push({id:noticeId,fileName:job.fileName,analyzedAt:new Date().toISOString(),
      header,lineItems,rawAiResponse:'',is_voided:false,voided_by:null,
      page_count:finalData.page_count});

    crossRefVoid(noticeId, header);

    job.tDone=Date.now();
    job.status='done';job.noticeId=noticeId;

    const stillActive=S.jobs.filter(j=>j.status==='reading'||j.status==='pending'||j.status==='processing');
    if(!stillActive.length && S.page==='upload'){
      const doneInBatch=S.jobs.filter(j=>j.status==='done');
      if(doneInBatch.length===1){S.activeNoticeId=noticeId;S.page='result';S.activeTab='validation';}
      else{S.page='portfolio';}
    }
    R();
  }catch(e){
    if(_hbChecker){clearInterval(_hbChecker);_hbChecker=null;}
    if(job.status==='duplicate'||job.status==='multi_lp') return;

    // Determine if this is a retryable error:
    // 1. Never got to parsing stage (connection failed before AI started)
    // 2. AbortError from heartbeat timeout (server alive but Gemini hung)
    // 3. Network error during parsing (fetch interrupted)
    const isAbort=e.name==='AbortError';
    const isCommError=!job._gotParsing;
    const isHbTimeout=isAbort && job._gotParsing;
    const isRetryable=isCommError || isHbTimeout;

    if(isRetryable && job._retries < MAX_COMM_RETRIES && job._file){
      job._retries++;
      job._gotParsing=false;
      job._lastHeartbeat=0;
      job.status='processing';
      job.error=``;
      const reason=isHbTimeout?'Heartbeat 타임아웃 (API 응답 없음)':'통신 오류';
      console.warn(`[RETRY] ${reason} — ${RETRY_DELAY_MS/1000}초 후 재시도 ${job._retries}/${MAX_COMM_RETRIES}: ${e.message}`);
      const el=document.getElementById('jt_'+job.id);
      if(el) el.textContent=`🔄 ${reason} — ${RETRY_DELAY_MS/1000}초 후 재시도 (${job._retries}/${MAX_COMM_RETRIES})`;
      if(!updateJobCard(job.id)) R();
      await new Promise(r=>setTimeout(r,RETRY_DELAY_MS));
      return uploadToBackend(job);
    }

    job.tDone=Date.now();
    job.status='error';
    const prefix=isHbTimeout?`[API 응답 없음 · ${job._retries}회 재시도 후 실패] `
      :isCommError?`[통신 오류 · ${job._retries}회 재시도 후 실패] `
      :'[AI 파싱 오류] ';
    job.error=prefix+e.message;
    console.error(e);R();
  }
}

/* ===== DUPLICATE RESOLUTION ===== */
async function resolveDuplicate(action){
  const d=S.showDuplicate; if(!d) return;
  const info=d.info, job=d.job;
  S.showDuplicate=null;

  if(action==='keep_existing'){
    job.status='skipped'; job.error='기존 Notice 유지';
    R(); return;
  }

  if(action==='replace_with_new'){
    if(info.type==='exact'){
      // Exact duplicate — reparse from stored PDF via backend
      job.status='processing'; R();
      try{
        const url=`${API}/api/notices/${info.existingId}/reparse${S.geminiModel?'?model='+encodeURIComponent(S.geminiModel):''}`;
        const resp=await authFetch(url,{method:'POST'});
        if(!resp.ok) throw new Error(`서버 오류 ${resp.status}`);

        const reader=resp.body.getReader();
        const decoder=new TextDecoder();
        let buffer='';
        while(true){
          const {done,value}=await reader.read();
          if(done) break;
          buffer+=decoder.decode(value,{stream:true});
          const lines=buffer.split('\n');
          buffer=lines.pop()||'';
          for(const line of lines){
            if(!line.startsWith('data: ')) continue;
            let evt; try{evt=JSON.parse(line.slice(6).trim());}catch(e){continue;}

            if(evt.stage==='parsing'){
              job.tParsingStart=Date.now();
              if(!updateJobCard(job.id)) R();
            }
            else if(evt.stage==='multi_lp_detect'){
              job.status='multi_lp';
              job._multiLp={noticeId:evt.notice_id,investorIds:evt.investor_ids||[],fundPreview:evt.fund_preview||'',pageCount:evt.page_count||0};
              // Remove old notice from local state
              S.notices=S.notices.filter(n=>n.id!==info.existingId);
              if(_mlpAutoApply(job)){return;}
              if(!S.showMultiLp){S.showMultiLp={job};}
              R(); return;
            }
            else if(evt.stage==='done'){
              // Remove old notice from local state
              S.notices=S.notices.filter(n=>n.id!==(evt.old_notice_id||info.existingId));
              const header=evt.header; const lineItems=evt.line_items;
              detectSubtotals(lineItems); normalizeNames(header); deriveHeaderFields(header);
              S.notices.push({id:evt.notice_id,fileName:job.fileName,analyzedAt:new Date().toISOString(),
                header,lineItems,rawAiResponse:'',is_voided:false,voided_by:null,page_count:evt.page_count});
              crossRefVoid(evt.notice_id, header);
              job.tApiDone=Date.now(); job.tDone=Date.now(); job.tokens=evt.tokens;
              job.status='done'; job.noticeId=evt.notice_id;
              // Navigate
              const stillActive=S.jobs.filter(j=>j.status==='reading'||j.status==='pending'||j.status==='processing');
              if(!stillActive.length){S.activeNoticeId=evt.notice_id;S.page='result';S.activeTab='validation';}
              R(); return;
            }
            else if(evt.stage==='error'){
              throw new Error(evt.detail||'재파싱 실패');
            }
          }
        }
      }catch(e){
        job.status='error'; job.tDone=Date.now(); job.error='재파싱 실패: '+e.message;
        R();
      }
      return;
    }

    // Content-based duplicate — use existing resolve endpoint
    try{
      const resp=await authFetch(`${API}/api/notices/${info.newNoticeId}/resolve-duplicate`,{
        method:'PUT', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action, existing_id:info.existingId})
      });
      const data=await resp.json();
      if(data.ok){
        S.notices=S.notices.filter(n=>n.id!==info.existingId);
        const header=info.header; const lineItems=info.lineItems;
        detectSubtotals(lineItems); normalizeNames(header); deriveHeaderFields(header);
        S.notices.push({id:info.newNoticeId, fileName:job.fileName, analyzedAt:new Date().toISOString(),
          header, lineItems, rawAiResponse:'', is_voided:false, voided_by:null, page_count:info.pageCount});
        crossRefVoid(info.newNoticeId, header);
        job.status='done'; job.noticeId=info.newNoticeId;
      }
    }catch(e){
      job.status='error'; job.error='중복 해결 실패: '+e.message;
    }
    R();
  }
}
