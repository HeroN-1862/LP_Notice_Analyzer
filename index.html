          <div style="font-size:11px;color:var(--amber);margin-top:2px">동일 PDF를 AI로 재분석합니다</div>
        </div>
      </div>
    </div>
  </div>`;
}

function retryJob(jobId){
  // Can't retry in backend mode without file — remove job
  alert('파일을 다시 업로드해주세요.');
  S.jobs=S.jobs.filter(j=>j.id!==jobId);
  R();
}

/* ===== MULTI-LP (OMNIBUS) NOTICE POPUP ===== */
let _multiLpRows=[{code:'',mode:'select'}]; // [{code, mode:'select'|'input'}]
/* Memory: remember LP code selections per fund so user doesn't re-enter for same fund */
let _multiLpMemory={}; // fundFingerprint → {codes:['975','8078'], fundPreview:'KKR...'}

function _mlpFingerprint(investorIds){
  // Same fund = same set of Investor IDs in the schedule
  return (investorIds||[]).slice().sort((a,b)=>a-b).join(',');
}

function _mlpAutoApply(job){
  /* Check if we already have LP codes for this fund. If yes, auto-submit. Returns true if auto-applied. */
  const ml=job._multiLp; if(!ml) return false;
  const fp=_mlpFingerprint(ml.investorIds);
  if(!fp) return false;
  const mem=_multiLpMemory[fp];
  if(!mem || !mem.codes || !mem.codes.length) return false;

  console.log(`[MULTI-LP] Auto-applying remembered LP codes for "${mem.fundPreview}": ${mem.codes.join(', ')}`);
  job.status='done'; job.tDone=Date.now();
  _doMultiLpParse(job, mem.codes);
  return true;
}

function rMultiLpPopup(){
  const m=S.showMultiLp; if(!m) return'';
  const job=m.job;
  const ml=job._multiLp; if(!ml) return'';
  const ids=ml.investorIds||[];
  const rows=_multiLpRows;
  const validCount=rows.filter(r=>r.code.trim()).length;

  return`<div class="mo-bg" onclick="if(event.target===this){cancelMultiLp()}">
    <div style="background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rl);padding:0;width:95%;max-width:520px">
      <div style="padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px">
        <span style="font-size:16px">👥</span>
        <div><div style="font-size:14px;font-weight:700">Multi-LP Notice 감지</div>
          <div style="font-size:11px;color:var(--t3);margin-top:2px">여러 LP의 데이터가 포함된 Omnibus Notice</div></div>
      </div>
      <div style="padding:16px 20px">
        <div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 14px;margin-bottom:12px">
          <div style="font-size:10px;color:var(--t3);margin-bottom:4px">파일</div>
          <div style="font-size:12px;font-weight:600;color:var(--t1)">${escH(job.fileName)}</div>
          ${ml.fundPreview?`<div style="font-size:11px;color:var(--t2);margin-top:3px">${escH(ml.fundPreview)}</div>`:''}
          <div style="font-size:11px;color:var(--t3);margin-top:3px">Investor ID ${ids.length}개 감지 · ${ml.pageCount||0} 페이지</div>
        </div>

        <div style="font-size:12px;font-weight:600;color:var(--t1);margin-bottom:8px">파싱할 LP Code (Investor ID) 선택</div>
        <div id="_mlpRows">
          ${rows.map((r,i)=>`
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
              <span style="font-size:11px;color:var(--t3);width:18px;text-align:right">${i+1}.</span>
              ${r.mode==='select'?`
                <select style="flex:1;padding:7px 10px;border:1px solid var(--bdr);border-radius:var(--r);font-size:12px;background:var(--bg1);color:var(--t1)" onchange="mlpRowChange(${i},this.value)">
                  <option value="">— Investor ID 선택 —</option>
                  ${ids.map(id=>`<option value="${id}" ${r.code===id?'selected':''}>${id}</option>`).join('')}
                  <option value="__custom__">직접 입력...</option>
                </select>`:`
                <input type="text" value="${escH(r.code)}" placeholder="Investor ID 직접 입력" style="flex:1;padding:7px 10px;border:1px solid var(--bdr);border-radius:var(--r);font-size:12px;background:var(--bg1);color:var(--t1)" oninput="mlpInputChange(${i},this.value)"/>
                <button style="padding:2px 6px;font-size:11px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg2);color:var(--t3);cursor:pointer" onclick="mlpSwitchToSelect(${i})" title="목록에서 선택">▼</button>`}
              ${rows.length>1?`<button style="padding:2px 6px;font-size:14px;border:none;background:none;color:var(--t3);cursor:pointer" onclick="mlpRemoveRow(${i})" title="삭제">🗑</button>`:'<span style="width:26px"></span>'}
            </div>
          `).join('')}
        </div>
        <button style="margin-top:4px;padding:4px 10px;font-size:11px;border:1px dashed var(--bdr);border-radius:var(--r);background:none;color:var(--t2);cursor:pointer;width:100%" onclick="mlpAddRow()">+ LP Code 추가</button>

        <div style="margin-top:12px;padding:8px 10px;background:var(--indigo-d);border:1px solid rgba(79,70,229,.12);border-radius:var(--r);font-size:11px;color:var(--indigo)">
          💡 같은 펀드의 추가 PDF 업로드 시 동일 LP Code가 자동 적용됩니다.
        </div>
      </div>
      <div style="padding:12px 20px;border-top:1px solid var(--bdr);display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-s" onclick="cancelMultiLp()">취소</button>
        <button class="btn" style="background:var(--amber-d);color:var(--amber);border:1px solid rgba(217,119,6,.15)" onclick="deferMultiLp()">추후 입력</button>
        <button class="btn btn-p" onclick="submitMultiLp()" ${validCount===0?'disabled style="opacity:.5"':''}>파싱 시작 (${validCount}건)</button>
      </div>
    </div>
  </div>`;
}

function mlpRowChange(i,val){
  if(val==='__custom__'){_multiLpRows[i]={code:'',mode:'input'};}
  else{_multiLpRows[i]={code:val,mode:'select'};}
  R();
}
function mlpInputChange(i,val){_multiLpRows[i].code=val;}
function mlpSwitchToSelect(i){_multiLpRows[i]={code:'',mode:'select'};R();}
function mlpAddRow(){if(_multiLpRows.length<10){_multiLpRows.push({code:'',mode:'select'});R();}}
function mlpRemoveRow(i){if(_multiLpRows.length>1){_multiLpRows.splice(i,1);R();}}

function cancelMultiLp(){
  const m=S.showMultiLp;
  if(m && m.job) m.job.status='skipped';
  S.showMultiLp=null;
  _multiLpRows=[{code:'',mode:'select'}];
  R();
}

async function deferMultiLp(){
  const m=S.showMultiLp; if(!m) return;
  const job=m.job;
  const ml=job._multiLp; if(!ml) return;

  S.showMultiLp=null;
  job.status='done'; job.tDone=Date.now();
  _multiLpRows=[{code:'',mode:'select'}];

  // Save placeholder to backend
  try{
    const resp=await authFetch(`${API}/api/notices/defer-lp`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        notice_id: ml.noticeId,
        file_name: job.fileName,
        fund_preview: ml.fundPreview||'',
        investor_ids: ml.investorIds||[],
        page_count: ml.pageCount||0,
      })
    });
    if(!resp.ok) throw new Error(`서버 오류 ${resp.status}`);
    const data=await resp.json();

    // Add or update placeholder notice in S.notices (중복 방지)
    const header=data.header;
    normalizeNames(header);
    const existIdx=S.notices.findIndex(x=>x.id===data.notice_id);
    if(existIdx>=0){
      // 이미 존재 — header만 갱신 (재 defer 시 push 중복 방지)
      S.notices[existIdx].header=header;
    } else {
      S.notices.push({
        id: data.notice_id,
        fileName: job.fileName,
        analyzedAt: new Date().toISOString(),
        header,
        lineItems: [],
        rawAiResponse: '',
        is_voided: false,
        voided_by: null,
        page_count: data.page_count,
      });
    }
    console.log(`[DEFER] Saved placeholder for "${ml.fundPreview}" (${ml.investorIds.length} IDs)`);
  }catch(e){
    console.error('Defer save failed:', e);
    alert('추후 입력 저장에 실패했습니다: '+e.message);
  }
  R();
}

async function submitMultiLp(){
  const m=S.showMultiLp; if(!m) return;
  const job=m.job;
  const ml=job._multiLp;

  // Collect valid, deduplicated LP codes
  const codes=[...new Set(_multiLpRows.map(r=>r.code.trim()).filter(Boolean))];
  if(!codes.length){alert('LP Code를 1개 이상 선택하세요.');return;}

  S.showMultiLp=null;
  job.status='done';
  job.tDone=Date.now();
  _multiLpRows=[{code:'',mode:'select'}];

  // If this was a deferred notice, remove from local state
  // (DB + file cleanup happens in all_done after parse-lp copies files)
  const deferredId=job._deferredNoticeId;
  if(deferredId){
    S.notices=S.notices.filter(n=>n.id!==deferredId);
    console.log(`[DEFER] Removed placeholder ${deferredId} from UI, starting real parse`);
  }

  // Save to memory so subsequent same-fund uploads auto-apply
  const fp=_mlpFingerprint(ml.investorIds);
  if(fp) _multiLpMemory[fp]={codes, fundPreview:ml.fundPreview||''};

  // Start parsing for this job
  _doMultiLpParse(job, codes);

  // Auto-apply to any other pending multi_lp jobs with same fund fingerprint
  if(fp){
    S.jobs.filter(j=>j.status==='multi_lp'&&j._multiLp&&j.id!==job.id).forEach(otherJob=>{
      const otherFp=_mlpFingerprint(otherJob._multiLp.investorIds);
      if(otherFp===fp){
        console.log(`[MULTI-LP] Auto-applying to queued job: ${otherJob.fileName}`);
        otherJob.status='done'; otherJob.tDone=Date.now();
        _doMultiLpParse(otherJob, codes);
      }
    });
    R();
  }
}

async function _doMultiLpParse(job, codes){
  const ml=job._multiLp; if(!ml) return;

  // Create sub-jobs for each LP code
  const subJobs=codes.map(code=>({
    id:`${Date.now()}_${code}`,
    fileName:`${job.fileName} [LP:${code}]`,
    status:'processing',
    t0:Date.now(),
    batch:job.batch,
    _lpCode:code
  }));
  S.jobs.push(...subJobs);
  R();

  // Call backend
  try{
    const formData=new FormData();
    formData.append('notice_id', ml.noticeId);
    formData.append('lp_codes', JSON.stringify(codes));
    if(S.geminiModel) formData.append('model', S.geminiModel);

    const resp=await authFetch(`${API}/api/upload/parse-lp`,{method:'POST',body:formData});
    if(!resp.ok) throw new Error(`서버 오류 ${resp.status}`);

    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let buffer='';

    while(true){
      const {done,value}=await reader.read();
      if(done) break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');
      buffer=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: ')) continue;
        let evt;
        try{evt=JSON.parse(line.slice(6).trim());}catch(e){continue;}

        if(evt.stage==='lp_parsing'){
          const sj=subJobs.find(j=>j._lpCode===evt.lp_code);
          if(sj){sj.status='processing';sj.tParsingStart=Date.now();if(!updateJobCard(sj.id))R();}
        }
        else if(evt.stage==='lp_done'){
          const sj=subJobs.find(j=>j._lpCode===evt.lp_code);
          if(sj){
            sj.status=evt.skipped_duplicate?'skipped':'done';
            sj.tApiDone=Date.now();sj.tDone=Date.now();
            sj.tokens=evt.tokens;sj.noticeId=evt.notice_id;
          }
          // Add to notices — but skip if duplicate (already exists in S.notices)
          if(evt.skipped_duplicate){
            console.log(`[MULTI-LP] LP ${evt.lp_code}: duplicate skipped (existing: ${evt.notice_id})`);
            if(sj) sj.status='skipped';
          } else if(!S.notices.find(n=>n.id===evt.notice_id)){
            const header=evt.header;
            const lineItems=evt.line_items;
            detectSubtotals(lineItems);
            normalizeNames(header);
            deriveHeaderFields(header);
            S.notices.push({id:evt.notice_id,fileName:`${job.fileName.replace('.pdf','')}_LP${evt.lp_code}.pdf`,
              analyzedAt:new Date().toISOString(),header,lineItems,
              rawAiResponse:'',is_voided:false,voided_by:null,page_count:evt.page_count});
          }
          R();
        }
        else if(evt.stage==='lp_error'){
          const sj=subJobs.find(j=>j._lpCode===evt.lp_code);
          if(sj){sj.status='error';sj.tDone=Date.now();sj.error=evt.detail||'파싱 실패';}
          R();
        }
        else if(evt.stage==='all_done'){
          // If this was a deferred notice, now safe to delete the placeholder
          // (parse-lp has already copied PDF files to sub-notice paths)
          // Only delete if at least one LP was successfully parsed
          if(job._deferredNoticeId && evt.notice_ids && evt.notice_ids.length>0){
            authFetch(`${API}/api/notices/${job._deferredNoticeId}`,{method:'DELETE'}).catch(()=>{});
            S.notices=S.notices.filter(n=>n.id!==job._deferredNoticeId);
            console.log(`[DEFER] Cleaned up placeholder ${job._deferredNoticeId}`);
          }
          // Check if any active jobs remain
          const stillActive=S.jobs.filter(j=>j.status==='reading'||j.status==='pending'||j.status==='processing');
          if(!stillActive.length){
            const doneInBatch=subJobs.filter(j=>j.status==='done');
            if(doneInBatch.length===1 && doneInBatch[0].noticeId){
              S.activeNoticeId=doneInBatch[0].noticeId;S.page='result';S.activeTab='validation';
            } else if(doneInBatch.length>1){
              S.page='portfolio';
            }
            R();
          }
        }
      }
    }
  }catch(e){
    console.error('Multi-LP parse error:',e);
    subJobs.forEach(sj=>{if(sj.status==='processing'){sj.status='error';sj.error=e.message;sj.tDone=Date.now();}});
    R();
  }
}

R();

/* Auto-init: check backend connection */
(async()=>{
  try{
    const r=await fetch(`${API}/api/health`);
    if(r.ok){S.connected=true;if(S.page==='settings')S.page='upload';}
    R();
  }catch(e){S.connected=false;S.page='settings';R();}
})();

/* Live timer — update job timing display without full DOM rebuild */
setInterval(()=>{
  const now=Date.now();
  S.jobs.forEach(j=>{
    if(j.status!=='reading'&&j.status!=='processing') return;
    const el=document.getElementById('jt_'+j.id);
    if(!el) return;  // Element not in DOM yet — wait for next R() cycle, don't force re-render
    const elapsed=((now-j.t0)/1000).toFixed(0);
    const tRead=j.tReadDone?((j.tReadDone-j.t0)/1000).toFixed(1):null;
    const aiElapsed=j.tParsingStart?((now-j.tParsingStart)/1000).toFixed(0):null;
    const serverElapsed=j.tReadDone?((now-j.tReadDone)/1000).toFixed(0):null;
    el.textContent='⏱️ '+elapsed+'s 경과'
      +(j._retries?' • 🔄재시도 '+j._retries+'/3':'')
      +(tRead!=null?' • 📤전송 '+tRead+'s':'')
      +(aiElapsed!=null?' • 🤖AI '+aiElapsed+'s/180s':serverElapsed!=null?' • 🌐서버 '+serverElapsed+'s...':'');
  });
},1000);
</script>
